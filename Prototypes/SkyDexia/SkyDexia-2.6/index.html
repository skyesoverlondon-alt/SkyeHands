    function computeWorkspaceInsights() {
      const paths = state.files.map((file) => String(file.path || "").toLowerCase());
      const packageJson = getFile("package.json");
      const packageText = packageJson?.content || "";
      const languageCounts = state.files.reduce((acc, file) => {
        const language = fileLanguage(file.path);
        acc[language] = (acc[language] || 0) + 1;
        return acc;
      }, {});
      const languageSummary = Object.entries(languageCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 4)
        .map(([language, count]) => `${language} ${count}`)
        .join(" · ");
      const stack = [];
      if (/"vite"/i.test(packageText) || paths.includes("vite.config.ts") || paths.includes("vite.config.js")) stack.push("Vite");
      if (/"react"/i.test(packageText) || paths.some((path) => /\.(jsx|tsx)$/.test(path))) stack.push("React");
      if (paths.some((path) => path.startsWith("netlify/functions/")) || paths.includes("netlify.toml")) stack.push("Netlify Functions");
      if (paths.some((path) => path.startsWith("worker/"))) stack.push("Cloudflare Worker");
      if (state.integrationStatus.skyedrive?.connected) stack.push("SkyeDrive source attached");
      const aiTouchpoints = state.files.filter((file) => /\/api\/kaixu-generate|\/api\/ai-agent|0megaskyegate|OMEGA_GATE_URL|api\.openai\.com|generativelanguage\.googleapis\.com|anthropic/i.test(file.content)).length;
      const docCount = paths.filter((path) => path.startsWith("docs/") || /\.md$/.test(path)).length;
      const testCount = paths.filter((path) => /(^|\/)(test|tests|spec|scripts)\//.test(path) || /(\.test|\.spec)\./.test(path)).length;
      const diff = computeSnapshotDiff(activeSourceBaselineFiles());
      const risks = [];
      if (state.dirty || diff.changed.length || diff.untracked.length || diff.deleted.length) {
        risks.push("Save the workspace before release actions so SkyeDrive, GitHub, and Netlify use the latest snapshot.");
      }
      if (!paths.includes("package.json") && !paths.includes("index.html")) {
        risks.push("No package manifest or primary entry file is present in the current snapshot.");
      }
      if (!aiTouchpoints) {
        risks.push("No AI-connected files are visible in this snapshot, so prompt-driven edits may lack an obvious execution target.");
      }
      if (!docCount) {
        risks.push("No docs or markdown notes are present, which weakens handoff and workspace memory inside the lane.");
      }
      if (state.sknore?.patternsCount && state.sknore?.blockedCount) {
        risks.push(state.sknore.blockedCount + " files are SKNore-protected and will be excluded from SkyeDrive, GitHub, and Netlify release actions.");
      }
      const prompts = [
        {
          label: "Audit Risks",
          prompt: `Audit this workspace snapshot for regressions, release blockers, and missing tests. Focus on ${state.activePath || "the current workspace"} first.`
        },
        {
          label: "Refactor Active File",
          prompt: `Propose a focused refactor for ${state.activePath || "the active file"} that improves maintainability without changing behavior.`
        },
        {
          label: "Ship From SkyeDrive",
          prompt: "Prepare this workspace for a SkyeDrive-first release. List the exact save, sync, GitHub, and Netlify steps plus any missing config."
        },
        {
          label: "Map Architecture",
          prompt: "Summarize this workspace architecture, including frontend, Netlify functions, worker runtime, deploy path, and where AI entrypoints live."
        }
      ];
      return {
        summary: `${state.files.length} files · ${languageSummary || "no typed files yet"} · ${aiTouchpoints} AI touchpoint${aiTouchpoints === 1 ? "" : "s"}`,
        facts: [
          `stack: ${stack.length ? stack.join(" · ") : "static snapshot only"}`,
          `docs: ${docCount} · tests/scripts: ${testCount}`,
          `active focus: ${state.activePath || "no file selected"}`,
        ],
        risks: risks.length ? risks : ["Workspace looks ready for prompt-assisted editing and release actions."],
        prompts,
      };
    }

    async function applyAgentOperations(options = {}) {
      const policy = applyAgentOperationPolicy(state.agentRun?.operations, {
        operationBudget: state.agentRun?.report?.operationBudget || (state.agentRun?.autonomy === "autonomous" ? 64 : 28),
      });
      const operations = policy.operations;
      if (!operations.length) throw new Error("No staged agent operations are available.");
      const simulation = simulateAgentOperations(operations, state.files);
      if (!simulation.ok) {
        state.agentRun = state.agentRun || {};
        state.agentRun.report = {
          ...(state.agentRun.report || {}),
          operationCounts: policy.counts,
          policy: policy.policy,
          simulation,
        };
        state.agentRun.policyWarnings = [
          ...(Array.isArray(state.agentRun.policyWarnings) ? state.agentRun.policyWarnings : []),
          `${simulation.conflictCount} simulation conflict${simulation.conflictCount === 1 ? "" : "s"} blocked apply.`,
        ];
        renderAgentRun();
        const evidencePath = recordAutonomyEvidence("simulation-blocked", {
          saveAfterApply: Boolean(options.saveAfterApply),
          simulation,
        });
        const preview = simulation.conflicts
          .slice(0, 3)
          .map((entry) => `${entry.operation}: ${entry.reason}`)
          .join("; ");
        throw new Error(`Operation simulation blocked apply: ${preview}${simulation.conflictCount > 3 ? ` (+${simulation.conflictCount - 3} more)` : ""}. Evidence: ${evidencePath}.`);
      }
      let rollbackCheckpoint = null;
      if (options.ensureRollbackCheckpoint) {
        rollbackCheckpoint = await createRestorePoint({
          suppressStatus: true,
          title: `${state.workspaceName} · Auto Rollback Checkpoint · ${new Date().toISOString().replace("T", " ").slice(0, 16)}`,
          note: "Automatic rollback checkpoint created before autonomous execute apply.",
        });
      }
      collectCurrentEditor();
      const beforeMap = buildFileMap(state.files);
      const nextMap = new Map(cloneFiles(state.files).map((file) => [file.path, { ...file }]));
      let nextActivePath = "";
      operations.forEach((operation) => {
        if (operation.type === "rename") {
          const existing = nextMap.get(operation.from);
          nextMap.delete(operation.from);
          nextMap.set(operation.to, { path: operation.to, content: existing?.content || "" });
          if (!nextActivePath) nextActivePath = operation.to;
          return;
        }
        if (operation.type === "delete") {
          nextMap.delete(operation.path);
          return;
        }
        nextMap.set(operation.path, { path: operation.path, content: operation.content || "" });
        if (!nextActivePath) nextActivePath = operation.path;
      });
      state.files = Array.from(nextMap.values()).sort((a, b) => a.path.localeCompare(b.path));
      state.dirty = true;
      state.agentRun.applied = true;
      state.agentRun.appliedAt = new Date().toISOString();
      state.agentRun.operations = operations;
      state.agentRun.policyWarnings = policy.blocked.map((entry) => `${describeAgentOperation(entry.operation)} blocked: ${entry.reason}`);
      state.agentRun.blockedOperations = policy.blocked;
      state.agentRun.report = {
        ...(state.agentRun.report || {}),
        operationCounts: policy.counts,
        policy: policy.policy,
        simulation,
      };
      renderFiles();
      const preferredPath = nextActivePath && nextMap.has(nextActivePath)
        ? nextActivePath
        : state.activePath && nextMap.has(state.activePath)
          ? state.activePath
          : state.files[0]?.path || "";
      if (preferredPath) openFile(preferredPath);
      else if (state.editor) state.editor.setValue("");
      renderPreview();
      scheduleSknorePreview(state.files);
      renderAgentRun();
      const afterMap = buildFileMap(state.files);
      const evidencePath = recordAutonomyEvidence("apply", {
        saveAfterApply: Boolean(options.saveAfterApply),
        simulation,
        rollback_checkpoint: rollbackCheckpoint ? {
          record_id: rollbackCheckpoint.record_id || null,
          title: rollbackCheckpoint.title || null,
          source_kind: rollbackCheckpoint.source_kind || "restore-point",
          file_count: Number(rollbackCheckpoint.file_count || 0),
        } : null,
        touched_files: buildOperationEvidence(operations, beforeMap, afterMap),
      });
      await logAutonomyMutation(`Applied ${operations.length} autonomy operation${operations.length === 1 ? "" : "s"}.`, {
        action: "apply",
        outcome: "success",
        evidence_path: evidencePath,
        operations_count: operations.length,
        save_after_apply: Boolean(options.saveAfterApply),
        rollback_record_id: rollbackCheckpoint?.record_id || null,
        autonomy: state.agentRun?.autonomy || "controlled",
        mode: state.agentRun?.mode || "execute",
      });
      if (options.saveAfterApply && state.dirty) {
        await saveWorkspace();
      }
      setStatus(
        "Agent operations applied",
        `${operations.length} staged operation${operations.length === 1 ? " was" : "s were"} applied${options.saveAfterApply ? " and saved" : ""} into the active SkyDexia 2.6 workspace${rollbackCheckpoint ? " after an automatic rollback checkpoint" : ""}. Evidence: ${evidencePath}.`,
        "success"
      );
    }

      function normalizeSecretInventory(integration) {
        const inventory = integration?.secret_inventory && typeof integration.secret_inventory === "object"
          ? integration.secret_inventory
          : null;
        if (inventory) {
          return {
            present: Boolean(inventory.present),

            last_used_at: inventory.last_used_at || null,
            last_revoked_at: inventory.last_revoked_at || null,
            rotation_count: Number(inventory.rotation_count || 0),
          };
        }
        return {
          present: Boolean(integration?.token_present),
          source: integration?.token_present ? (integration?.mode === "local-fallback" ? "browser-session" : "unknown") : "none",

    function markdownToHtml(source) {
      const escaped = escapeHtml(source)
        .replace(/^###\s+(.*)$/gm, "<h3>$1</h3>")
        .replace(/^##\s+(.*)$/gm, "<h2>$1</h2>")
        .replace(/^#\s+(.*)$/gm, "<h1>$1</h1>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
      return escaped
        .split(/\n\n+/)
        .map((block) => (/^<h\d/.test(block.trim()) ? block : "<p>" + block.replace(/\n/g, "<br />") + "</p>"))
        .join("");
    }

    function buildRuntimePreview() {
      const htmlFile = getFile("index.html");
      if (!htmlFile) return null;
      const cssFile = getFile("styles.css");
      const jsFile = getFile("app.js");
      let html = htmlFile.content;
      if (cssFile) {
        if (/<link[^>]+href=["']styles\.css["'][^>]*>/i.test(html)) {
          html = html.replace(/<link[^>]+href=["']styles\.css["'][^>]*>/i, "<style>" + cssFile.content + "</style>");
        } else {
          html = html.replace(/<\/head>/i, "<style>" + cssFile.content + "</style></head>");
        }
      }
      if (jsFile) {
        if (/<script[^>]+src=["']app\.js["'][^>]*><\/script>/i.test(html)) {
          html = html.replace(/<script[^>]+src=["']app\.js["'][^>]*><\/script>/i, "<script>" + jsFile.content + "<\\/script>");
        } else {
          html = html.replace(/<\/body>/i, "<script>" + jsFile.content + "<\\/script></body>");
        }
      }
      return html;
    }

    function renderPreview() {
      collectCurrentEditor();
      const frame = $("previewFrame");
      const active = getFile(state.activePath);
      const runtimeHtml = buildRuntimePreview();
      if (runtimeHtml && ["index.html", "styles.css", "app.js"].includes(state.activePath)) {
        frame.srcdoc = runtimeHtml;
        setTimeout(renderOutline, 80);
        return;

      if (!active) {
        frame.srcdoc = "<body style='font-family:sans-serif;padding:24px'>No file selected.</body>";

      let body = "";
      if (/\.md$/.test(active.path)) body = markdownToHtml(active.content);
      else if (/\.html?$/.test(active.path)) body = active.content;
      else body = "<pre style='white-space:pre-wrap;font-family:ui-monospace,monospace'>" + escapeHtml(active.content) + "</pre>";
      const docZoom = Number($("docZoomSelect").value || 18);
      const docFont = $("docFontSelect").value || "Georgia, serif";
      frame.srcdoc = "<!DOCTYPE html><html><head><style>body{margin:0;background:#f7f3ef;color:#231a2e;font-family:" + docFont + ";}main{max-width:860px;margin:0 auto;padding:56px 64px;font-size:" + docZoom + "px;line-height:1.65}h1,h2,h3{font-family:" + docFont + ";}code{background:#ece4fa;padding:2px 6px;border-radius:6px}pre{background:#201630;color:#f8f1ff;padding:18px;border-radius:18px;overflow:auto}</style></head><body><main>" + body + "</main></body></html>";

    const LOCAL_PREFIX = "skydexia26.local";

    function localKey(name) {
      return `${LOCAL_PREFIX}.${name}:${state.workspaceId}`;
    }

    function localRead(name, fallback) {
      try {
        const raw = localStorage.getItem(localKey(name));
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function localWrite(name, value) {
      try { localStorage.setItem(localKey(name), JSON.stringify(value)); } catch { /* ignore */ }
      return value;
    }

    function localReleaseOps() {
      const current = localRead('release-ops', { deferred: [], history: [] });
      return {
        deferred: Array.isArray(current?.deferred) ? current.deferred : [],
        history: Array.isArray(current?.history) ? current.history : [],
      };
    }

    function localWriteReleaseOps(value) {
      return localWrite('release-ops', {

    function deriveImportedWorkspaceName(name, fallback) {
      const raw = String(name || fallback || "Imported Workspace").trim();
      return raw.replace(/\.(zip|tar|gz)$/i, "") || "Imported Workspace";

    function normalizeImportedFiles(files) {
      const deduped = new Map();
      files.forEach((file) => {
        const path = String(file?.path || "").replace(/^\/+/, "").trim();
        if (!path) return;
        deduped.set(path, { path, content: typeof file?.content === "string" ? file.content : "" });
      });
      return Array.from(deduped.values()).sort((a, b) => a.path.localeCompare(b.path));
    }

    async function adoptImportedWorkspace(files, sourceName, sourceKind) {
      const normalized = normalizeImportedFiles(files);
      if (!normalized.length) throw new Error("No importable text files were found in that source.");
      state.files = normalized;
      state.activePath = normalized[0]?.path || "";
      state.workspaceName = deriveImportedWorkspaceName(sourceName, state.workspaceName);

      await pushSkyeDriveSourceFiles(normalized, {

        note: $("skyedriveNoteInput").value.trim() || `Imported from ${sourceKind}.`,
        sourceKind,
        sourceName,
      });
      setStatus("Workspace imported", `Loaded ${normalized.length} files from ${sourceName || sourceKind} and persisted the source into SkyeDrive.`, "success");
    }

    async function importZipSource(file) {
      if (!file) return;
      if (!window.JSZip) throw new Error("JSZip failed to load, so ZIP import is unavailable.");
      const zip = await window.JSZip.loadAsync(file);
      const imported = [];
      const entries = Object.values(zip.files).filter((entry) => !entry.dir);
      for (const entry of entries) {
        const lower = String(entry.name || "").toLowerCase();
        if (/\.(png|jpg|jpeg|gif|webp|pdf|woff2?|ttf|ico|mp4|mp3|mov|avi|wasm|lock)$/i.test(lower)) continue;
        const content = await entry.async("string");
        imported.push({ path: entry.name, content });
      }
      await adoptImportedWorkspace(imported, file.name, "zip-import");
    }

    async function importFolderSource(fileList) {
      const imported = [];
      for (const file of Array.from(fileList || [])) {
        const relativePath = String(file.webkitRelativePath || file.name || "").trim();
        if (!relativePath) continue;
        if (/\.(png|jpg|jpeg|gif|webp|pdf|woff2?|ttf|ico|mp4|mp3|mov|avi|wasm|lock)$/i.test(relativePath.toLowerCase())) continue;
        const content = await file.text();
        imported.push({ path: relativePath, content });
      }
      await adoptImportedWorkspace(imported, (fileList && fileList[0] && fileList[0].webkitRelativePath ? fileList[0].webkitRelativePath.split("/")[0] : "Imported Folder"), "folder-import");
    }

    async function readDroppedEntry(entry) {
      if (!entry) return [];
      if (entry.isFile) {
        const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
        const relativePath = String(entry.fullPath || file.name || "").replace(/^\/+/, "").trim();
        return relativePath ? [{ file, relativePath }] : [];
      }
      if (!entry.isDirectory || typeof entry.createReader !== "function") return [];
      const reader = entry.createReader();
      const entries = [];
      while (true) {
        const batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
        if (!batch.length) break;
        entries.push(...batch);
      }
      const nested = await Promise.all(entries.map((child) => readDroppedEntry(child)));
      return nested.flat();
    }

    async function collectDroppedFiles(dataTransfer) {
      const items = Array.from(dataTransfer?.items || []);
      const entryItems = items
        .map((item) => item?.webkitGetAsEntry ? item.webkitGetAsEntry() : null)
        .filter(Boolean);
      if (entryItems.length) {
        const nested = await Promise.all(entryItems.map((entry) => readDroppedEntry(entry)));
        return nested.flat();
      }
      return Array.from(dataTransfer?.files || []).map((file) => ({
        file,
        relativePath: String(file.webkitRelativePath || file.name || "").replace(/^\/+/, "").trim(),
      }));
    }

    function isDesktopFileDrag(event) {
      return Array.from(event?.dataTransfer?.types || []).includes("Files");
    }

    let desktopDropDepth = 0;

    function showDesktopDropZone() {
      const zone = $("desktopDropZone");
      if (!zone) return;
      zone.classList.add("visible");
      zone.setAttribute("aria-hidden", "false");
    }

    function hideDesktopDropZone(force = false) {
      if (force) desktopDropDepth = 0;
      const zone = $("desktopDropZone");
      if (!zone) return;
      if (!force && desktopDropDepth > 0) return;
      zone.classList.remove("visible");
      zone.setAttribute("aria-hidden", "true");
    }

    async function handleDesktopDrop(event) {
      if (!isDesktopFileDrag(event)) return;
      event.preventDefault();
      desktopDropDepth = 0;
      hideDesktopDropZone(true);
      const plainFiles = Array.from(event.dataTransfer?.files || []);
      if (plainFiles.length === 1 && /\.zip$/i.test(plainFiles[0].name || "")) {
        await importZipSource(plainFiles[0]);
        return;
      }
      const dropped = await collectDroppedFiles(event.dataTransfer);
      if (dropped.length) {
        await importFolderSource(dropped.map((entry) => {
          const file = entry.file;
          if (entry.relativePath && !file.webkitRelativePath) {
            Object.defineProperty(file, "webkitRelativePath", {
              value: entry.relativePath,
              configurable: true,
            });
          }
          return file;
        }));
        return;
      }
      if (plainFiles.length) {
        await importFolderSource(plainFiles);
        return;
      }
      throw new Error("No importable files were found in the desktop drop payload.");
    }

    function bindDesktopDropZone() {
      window.addEventListener("dragenter", (event) => {
        if (!isDesktopFileDrag(event)) return;
        event.preventDefault();
        desktopDropDepth += 1;
        showDesktopDropZone();
      });
      window.addEventListener("dragover", (event) => {
        if (!isDesktopFileDrag(event)) return;
        event.preventDefault();
        showDesktopDropZone();
      });
      window.addEventListener("dragleave", (event) => {
        if (!isDesktopFileDrag(event)) return;
        event.preventDefault();
        desktopDropDepth = Math.max(0, desktopDropDepth - 1);
        hideDesktopDropZone();
      });
      window.addEventListener("drop", (event) => {
        if (!isDesktopFileDrag(event)) return;
        runAction(() => handleDesktopDrop(event));
      });
      $("desktopDropZone")?.addEventListener("dragover", (event) => {
        event.preventDefault();
      });
      $("desktopDropZone")?.addEventListener("dragleave", (event) => {
        event.preventDefault();
        desktopDropDepth = 0;
        hideDesktopDropZone(true);
      });
    }

    function renderGitWorkspaceDeck() {
      const statusBox = $("gitWorkspaceStatus");
      const list = $("gitWorkspaceList");
      const operationStatus = $("gitOperationStateStatus");
      const historyActionList = $("gitHistoryActionList");
      const recoveryStatus = $("gitRecoveryStatus");
      const recoveryActionBar = $("gitRecoveryActionBar");
      const failureInspectorPanel = $("gitFailureInspectorPanel");
      const failureInspector = $("gitFailureInspector");
      const recoveryTimelineList = $("gitRecoveryTimelineList");
      const conflictStatus = $("gitConflictStatus");
      const conflictList = $("gitConflictList");
      if (!statusBox || !list || !conflictStatus || !conflictList) return;
      const git = state.gitWorkspace || {};
      const branch = String(git.branch || '').trim() || 'none';
      const entries = Array.isArray(git.entries) ? git.entries : [];
      const commits = Array.isArray(git.commits) ? git.commits : [];
      const remotes = Array.isArray(git.remotes) ? git.remotes : [];
      const remoteNames = remotes.map((entry) => String(entry?.name || '').trim()).filter(Boolean);
      const tracking = git.tracking && typeof git.tracking === 'object' ? git.tracking : {};
      const operationState = git.operationState && typeof git.operationState === 'object' ? git.operationState : {};
      const stashes = Array.isArray(git.stashes) ? git.stashes : [];
      const tags = Array.isArray(git.tags) ? git.tags : [];
      const mergeBase = git.mergeBase && typeof git.mergeBase === 'object' ? git.mergeBase : null;
      statusBox.innerHTML = `<strong>Workspace Git</strong><div class='muted'>branch=<code>${escapeHtml(branch)}</code> · ahead=<code>${escapeHtml(String(git.ahead || 0))}</code> · behind=<code>${escapeHtml(String(git.behind || 0))}</code> · changed=<code>${escapeHtml(String(entries.length))}</code> · remotes=<code>${escapeHtml(remoteNames.join(', ') || 'none')}</code>.</div>`;
      list.innerHTML = '';
      remotes.forEach((remote) => {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `remote: ${remote.name || 'unknown'} · fetch=${remote.fetch_url || 'none'} · push=${remote.push_url || remote.fetch_url || 'none'}`;
        list.appendChild(row);
      });
      if (tracking.branch || tracking.upstream) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `tracking: ${tracking.branch || branch || 'unknown'} -> ${tracking.upstream || 'none'}`;
        list.appendChild(row);
      }
      if (mergeBase?.sha) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `merge-base: ${mergeBase.source || branch || 'unknown'} vs ${mergeBase.target || 'origin/main'} -> ${mergeBase.sha}`;
        list.appendChild(row);
      }
      if (operationState.rebase_in_progress || operationState.cherry_pick_in_progress || operationState.revert_in_progress || operationState.merge_in_progress) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `operations: rebase=${operationState.rebase_in_progress ? 'yes' : 'no'} cherry-pick=${operationState.cherry_pick_in_progress ? 'yes' : 'no'} revert=${operationState.revert_in_progress ? 'yes' : 'no'} merge=${operationState.merge_in_progress ? 'yes' : 'no'}`;
        list.appendChild(row);
      }
      if (stashes.length) {
        stashes.slice(0, 6).forEach((stash) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `stash: ${stash.ref || 'unknown'} ${stash.message || ''}`.trim();
          list.appendChild(row);
        });
      }
      if (tags.length) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `tags: ${tags.slice(0, 6).join(', ')}${tags.length > 6 ? ' ...' : ''}`;
        list.appendChild(row);
      }
      if (entries.length) {
        entries.slice(0, 8).forEach((entry) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `${entry.index || ' '} ${entry.working_tree || ' '} ${entry.path || ''}`.trim();
          list.appendChild(row);
        });
      }
      if (git.diffStat) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = `diff: ${String(git.diffStat).split(/\r?\n/)[0]}`;
        list.appendChild(row);
      }
      if (commits.length) {
        commits.slice(0, 5).forEach((commit) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `log: ${(commit.sha || '').slice(0, 8)} ${commit.message || ''}`.trim();
          list.appendChild(row);
        });
      }
      if (!list.children.length) {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = 'No Git workspace telemetry yet. Clone a repo or refresh status.';
        list.appendChild(row);
      }

      if (operationStatus && historyActionList) {
        const preview = git.resetPreview && typeof git.resetPreview === 'object' ? git.resetPreview : null;
        const cleanPreview = git.cleanPreview && typeof git.cleanPreview === 'object' ? git.cleanPreview : null;
        const lastHistoryAction = git.lastHistoryAction && typeof git.lastHistoryAction === 'object' ? git.lastHistoryAction : null;
        const actionBus = Array.isArray(git.actionBus) ? git.actionBus : [];
        const lastFailure = git.lastFailure && typeof git.lastFailure === 'object' ? git.lastFailure : null;
        const stateSummary = `rebase=${operationState.rebase_in_progress ? 'yes' : 'no'} · cherry-pick=${operationState.cherry_pick_in_progress ? 'yes' : 'no'} · revert=${operationState.revert_in_progress ? 'yes' : 'no'} · merge=${operationState.merge_in_progress ? 'yes' : 'no'}`;
        operationStatus.innerHTML = `<strong>History operations</strong><div class='muted'>${escapeHtml(stateSummary)}${lastHistoryAction?.title ? ` · last=${escapeHtml(lastHistoryAction.title)}` : ''}</div>`;
        historyActionList.innerHTML = '';
        if (lastFailure) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `recovery: ${lastFailure.message}${lastFailure.code ? ` · code=${lastFailure.code}` : ''}${lastFailure.retryable ? ' · retryable=yes' : ''}`;
          historyActionList.appendChild(row);
          (Array.isArray(lastFailure.suggestions) ? lastFailure.suggestions : []).forEach((suggestion) => {
            const suggestionRow = document.createElement('div');
            suggestionRow.className = 'diff-summary-item';
            suggestionRow.textContent = `suggestion: ${suggestion}`;
            historyActionList.appendChild(suggestionRow);
          });
        }
        if (preview) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `reset preview: mode=${preview.mode || 'mixed'} target=${preview.target || 'HEAD'} ${preview.diff_stat ? `· ${String(preview.diff_stat).split(/\r?\n/)[0]}` : '· no diff stat returned'}`;
          historyActionList.appendChild(row);
        }
        if (cleanPreview) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          const scope = cleanPreview.allow_all
            ? 'scope=full repo'
            : `scope=${(Array.isArray(cleanPreview.paths) && cleanPreview.paths.length) ? cleanPreview.paths.join(', ') : 'workspace preview'}`;
          const ignored = cleanPreview.include_ignored ? 'include-ignored=yes' : 'include-ignored=no';
          row.textContent = `clean preview: ${scope} · ${ignored}${cleanPreview.output ? ` · ${String(cleanPreview.output).split(/\r?\n/)[0]}` : ''}`;
          historyActionList.appendChild(row);
        }
        if (lastHistoryAction) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `${lastHistoryAction.title || 'history action'}: ${lastHistoryAction.detail || 'No detail available.'}`;
          historyActionList.appendChild(row);
        }
        actionBus.slice(0, 4).forEach((event) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `action bus: ${describeGitActionBusEvent(event)}`;
          historyActionList.appendChild(row);
        });
        if (!historyActionList.children.length) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = 'Use reset, rebase, cherry-pick, squash, revert, or clean controls to capture preview and in-progress state here.';
          historyActionList.appendChild(row);
        }
      }

      if (recoveryStatus && recoveryActionBar && failureInspectorPanel && failureInspector && recoveryTimelineList) {
        const lastFailure = git.lastFailure && typeof git.lastFailure === 'object' ? git.lastFailure : null;
        const actionBus = Array.isArray(git.actionBus) ? git.actionBus : [];
        const recoveryActions = getGitRecoveryActions(git);
        recoveryStatus.innerHTML = lastFailure
          ? `<strong>Recovery Console</strong><div class='muted'>last failure at <code>${escapeHtml(formatGitEventTime(lastFailure.at))}</code>${lastFailure.route ? ` · route=<code>${escapeHtml(lastFailure.route)}</code>` : ''}${lastFailure.code ? ` · code=<code>${escapeHtml(lastFailure.code)}</code>` : ''}${lastFailure.retryable ? ' · retryable=<code>yes</code>' : ''}</div>`
          : "<strong>Recovery Console</strong><div class='muted'>No failed Git mutation is currently pinned. Use the history controls normally; failures will materialize recovery shortcuts and a raw inspector here.</div>";
        recoveryActionBar.innerHTML = '';

        const inspectorButton = document.createElement('button');
        inspectorButton.className = 'ghost';
        inspectorButton.type = 'button';
        inspectorButton.dataset.gitRecoveryControl = 'toggle-inspector';
        inspectorButton.textContent = git.showFailureInspector ? 'Hide Raw Inspector' : 'Show Raw Inspector';
        inspectorButton.disabled = !lastFailure;
        recoveryActionBar.appendChild(inspectorButton);

        const clearButton = document.createElement('button');
        clearButton.className = 'ghost';
        clearButton.type = 'button';
        clearButton.dataset.gitRecoveryControl = 'clear-failure';
        clearButton.textContent = 'Clear Failure Pin';
        clearButton.disabled = !lastFailure;
        recoveryActionBar.appendChild(clearButton);

        recoveryActions.forEach((action) => {
          const button = document.createElement('button');
          button.className = 'ghost';
          button.type = 'button';
          button.dataset.gitRecoveryAction = action.id;
          button.title = action.reason || '';
          button.textContent = action.label;
          recoveryActionBar.appendChild(button);
        });

        failureInspectorPanel.open = Boolean(lastFailure && git.showFailureInspector);
        failureInspectorPanel.hidden = !lastFailure;
        failureInspector.textContent = formatGitFailureInspectorPayload(lastFailure);

        recoveryTimelineList.innerHTML = '';
        if (lastFailure) {
          const summaryRow = document.createElement('div');
          summaryRow.className = 'diff-summary-item';
          summaryRow.textContent = `failure: ${lastFailure.message}`;
          recoveryTimelineList.appendChild(summaryRow);
          (Array.isArray(lastFailure.suggestions) ? lastFailure.suggestions : []).forEach((suggestion) => {
            const row = document.createElement('div');
            row.className = 'diff-summary-item';
            row.textContent = `playbook: ${suggestion}`;
            recoveryTimelineList.appendChild(row);
          });
        }
        actionBus.slice(0, 6).forEach((event) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = `${formatGitEventTime(event?.at)} · ${describeGitActionBusEvent(event)}`;
          recoveryTimelineList.appendChild(row);
        });
        if (!recoveryTimelineList.children.length) {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.textContent = 'Recent Git events and recovery playbooks will appear here once the lane records a mutation or failure.';
          recoveryTimelineList.appendChild(row);
        }
      }

      const conflicts = git.conflicts && typeof git.conflicts === 'object' ? git.conflicts : { has_conflicts: false, count: 0, files: [] };
      const files = Array.isArray(conflicts.files) ? conflicts.files : [];
      conflictStatus.innerHTML = conflicts.has_conflicts
        ? `<strong>Merge conflicts</strong><div class='muted'>Detected <code>${escapeHtml(String(conflicts.count || files.length))}</code> conflicting file(s) requiring resolution.</div>`
        : "<strong>Merge conflicts</strong><div class='muted'>No merge conflicts detected in the current workspace repository.</div>";
      conflictList.innerHTML = '';
      if (files.length) {
        files.slice(0, 10).forEach((file) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          const stages = Array.isArray(file.stages) ? file.stages.join(',') : '';
          row.textContent = `${file.path || 'unknown'} · stages=${stages || 'none'} · ours=${file.ours_present ? 'yes' : 'no'} · theirs=${file.theirs_present ? 'yes' : 'no'}`;
          conflictList.appendChild(row);
        });
      } else {
        const row = document.createElement('div');
        row.className = 'diff-summary-item';
        row.textContent = 'Run conflict detection to refresh this summary.';
        conflictList.appendChild(row);
      }
      syncGitConflictInputs();
    }

    function syncGitRemoteInputs() {
      const remoteInput = $("gitRemoteInput");
      const remoteUrlInput = $("gitRemoteUrlInput");
      const remotePushUrlInput = $("gitRemotePushUrlInput");
      if (!remoteInput || !remoteUrlInput || !remotePushUrlInput) return;
      const selectedRemote = String(remoteInput.value || '').trim();
      const remotes = Array.isArray(state.gitWorkspace?.remotes) ? state.gitWorkspace.remotes : [];
      const match = remotes.find((entry) => String(entry?.name || '').trim() === selectedRemote);
      remoteUrlInput.value = match?.fetch_url || '';
      remotePushUrlInput.value = match?.push_url && match.push_url !== match.fetch_url ? match.push_url : '';
    }

    function syncGitConflictInputs() {
      const pathInput = $("gitConflictPathInput");
      const manualInput = $("gitConflictManualContentInput");
      if (!pathInput || !manualInput) return;
      const conflicts = state.gitWorkspace?.conflicts && typeof state.gitWorkspace.conflicts === 'object'
        ? state.gitWorkspace.conflicts
        : { files: [] };
      const files = Array.isArray(conflicts.files) ? conflicts.files : [];
      const currentPath = String(pathInput.value || '').trim();
      const selected = files.find((entry) => String(entry?.path || '').trim() === currentPath) || files[0] || null;
      if (selected && (!currentPath || currentPath !== String(selected.path || '').trim())) {
        pathInput.value = selected.path || '';
      }
      if (!files.length) {
        pathInput.value = '';
        manualInput.value = '';
      }
    }

    function parseGitCommitRefs(rawValue) {
      return String(rawValue || '')
        .split(/[\r\n,]+/)
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function parseGitPathRefs(rawValue) {
      return String(rawValue || '')
        .split(/[\r\n,]+/)
        .map((entry) => entry.trim().replace(/^\.\//, '').replace(/\\/g, '/'))
        .filter(Boolean);
    }

    function isProtectedGitTagName(value) {
      const name = String(value || '').trim();
      return /^(?:v\d+\.\d+\.\d+(?:[-+._A-Za-z0-9]*)?|latest|stable|prod|production)$/i.test(name);
    }

    function isValidGitRemoteUrl(value) {
      const url = String(value || '').trim();
      if (!url) return false;
      if (/^(https?|ssh|git):\/\/[^\s]+$/i.test(url)) return true;
      if (/^[^\s@]+@[^\s:]+:[^\s]+$/.test(url)) return true;
      if (/^(?:\/|\.\.?\/|~\/)[^\s]+$/.test(url)) return true;
      return false;
    }

    function applyGitHistoryPayload(payload, summary) {
      const git = payload?.git || {};
      state.gitWorkspace.branch = String(git.branch || state.gitWorkspace.branch || '').trim();
      state.gitWorkspace.ahead = Number(git.ahead || state.gitWorkspace.ahead || 0) || 0;
      state.gitWorkspace.behind = Number(git.behind || state.gitWorkspace.behind || 0) || 0;
      state.gitWorkspace.entries = Array.isArray(git.entries) ? git.entries : state.gitWorkspace.entries;
      state.gitWorkspace.branches = Array.isArray(git.branches) ? git.branches : state.gitWorkspace.branches;
      state.gitWorkspace.remotes = Array.isArray(git.remotes) ? git.remotes : state.gitWorkspace.remotes;
      state.gitWorkspace.diffStat = String(git.diff_stat || state.gitWorkspace.diffStat || '').trim();
      state.gitWorkspace.diffText = String(git.diff_text || state.gitWorkspace.diffText || '').trim();
      state.gitWorkspace.operationState = payload?.operations && typeof payload.operations === 'object'
        ? payload.operations
        : state.gitWorkspace.operationState;
      state.gitWorkspace.conflicts = payload?.conflicts && typeof payload.conflicts === 'object'
        ? payload.conflicts
        : state.gitWorkspace.conflicts;
      state.gitWorkspace.lastHistoryAction = summary || null;
      renderGitWorkspaceDeck();
    }

    async function refreshGitWorkspaceStatus(options = {}) {
      const payload = await jsonRequest('/api/git/status', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
      });
      const git = payload?.git || {};
      state.gitWorkspace.branch = String(git.branch || '').trim();
      state.gitWorkspace.ahead = Number(git.ahead || 0) || 0;
      state.gitWorkspace.behind = Number(git.behind || 0) || 0;
      state.gitWorkspace.branches = Array.isArray(git.branches) ? git.branches : [];
      state.gitWorkspace.remotes = Array.isArray(git.remotes) ? git.remotes : [];
      state.gitWorkspace.entries = Array.isArray(git.entries) ? git.entries : [];
      state.gitWorkspace.diffStat = String(git.diff_stat || '').trim();
      state.gitWorkspace.diffText = String(git.diff_text || '').trim();
      syncGitRemoteInputs();
      syncGitConflictInputs();
      renderGitWorkspaceDeck();
      if (!options.silent) recordGitActionEvent('Git status refreshed', `branch=${state.gitWorkspace.branch || 'unknown'}`, 'success');
      if (!options.silent) {
        setStatus('Git status refreshed', `Workspace Git lane is now synchronized on branch ${state.gitWorkspace.branch || 'unknown'}.`, 'success');
      }
      return payload;
    }

    async function refreshGitWorkspaceDiff() {
      const payload = await jsonRequest('/api/git/diff', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
      });
      const git = payload?.git || {};
      state.gitWorkspace.diffStat = String(payload?.diff_stat || git.diff_stat || '').trim();
      state.gitWorkspace.diffText = String(payload?.diff_text || git.diff_text || '').trim();
      renderGitWorkspaceDeck();
      setStatus('Git diff refreshed', state.gitWorkspace.diffStat || 'Diff refreshed for current workspace repository.', 'success');
      return payload;
    }

    async function refreshGitWorkspaceLog() {
      const payload = await jsonRequest('/api/git/log', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        limit: 20,
      });
      state.gitWorkspace.commits = Array.isArray(payload?.commits) ? payload.commits : [];
      if (payload?.branch) state.gitWorkspace.branch = String(payload.branch).trim();
      renderGitWorkspaceDeck();
      setStatus('Git log refreshed', `Loaded ${state.gitWorkspace.commits.length} commits from the workspace repository history.`, 'success');
      return payload;
    }

    async function cloneWorkspaceRepository() {
      const repoUrl = $("gitRepoUrlInput")?.value?.trim() || '';
      if (!repoUrl) throw new Error('Repository URL is required for clone.');
      const branch = $("gitCloneBranchInput")?.value?.trim() || 'main';
      const payload = await jsonRequest('/api/git/clone', 'POST', {
        ws_id: state.workspaceId,
        repo_url: repoUrl,
        branch,
      });
      await loadWorkspace();
      await refreshGitWorkspaceStatus({ silent: true });
      setStatus('Workspace cloned', `Cloned ${repoUrl} into the package-owned Git workspace lane.`, 'success');
      return payload;
    }

    async function pullWorkspaceRepository() {
      const remote = $("gitRemoteInput")?.value?.trim() || "origin";
      const branch = $("gitBranchInput")?.value?.trim() || undefined;
      const strategy = $("gitPullStrategySelect")?.value?.trim() || 'ff-only';
      const payload = await jsonRequest('/api/git/pull', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        remote,
        branch,
        strategy,
      });
      state.gitWorkspace.lastFailure = null;
      recordGitActionEvent('Git pull complete', String(payload?.output || 'Pull completed.').trim() || 'Pull completed.', 'success');
      await loadWorkspace();
      await refreshGitWorkspaceStatus({ silent: true });
      setStatus('Git pull complete', String(payload?.output || 'Pull completed.').trim() || 'Pull completed.', 'success');
      return payload;
    }

    async function pushWorkspaceRepository() {
      const remote = $("gitRemoteInput")?.value?.trim() || "origin";
      const branch = $("gitBranchInput")?.value?.trim() || state.gitWorkspace.branch || "main";
      const upstreamMode = $("gitPushUpstreamToggle")?.value?.trim() || 'auto';
      const forceWithLease = $("gitPushLeaseToggle")?.value === 'force-with-lease';
      const payload = await jsonRequest('/api/git/push', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        remote,
        branch,
        set_upstream: upstreamMode === 'always' ? true : upstreamMode === 'never' ? false : undefined,
        force_with_lease: forceWithLease,
      });
      state.gitWorkspace.lastFailure = null;
      recordGitActionEvent('Git push complete', String(payload?.output || 'Push completed.').trim() || 'Push completed.', 'success');
      await refreshGitWorkspaceStatus({ silent: true });
      const detailSuffix = `${forceWithLease ? ' · force-with-lease' : ''}${upstreamMode === 'always' ? ' · set-upstream' : upstreamMode === 'never' ? ' · preserve-upstream' : ''}`;
      setStatus('Git push complete', `${String(payload?.output || 'Push completed.').trim() || 'Push completed.'}${detailSuffix}`, 'success');
      return payload;
    }

    async function fetchWorkspaceRepository() {
      const remote = $("gitRemoteInput")?.value?.trim() || "origin";
      const payload = await jsonRequest('/api/git/fetch', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        remote,
        prune: true,
      });
      await refreshGitWorkspaceStatus({ silent: true });
      setStatus('Git fetch complete', String(payload?.output || 'Fetch completed.').trim() || 'Fetch completed.', 'success');
      return payload;
    }

    async function fetchAllWorkspaceRepository() {
      const payload = await jsonRequest('/api/git/fetch-all', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        prune: true,
      });
      await refreshGitWorkspaceStatus({ silent: true });
      const outcomes = Array.isArray(payload?.outcomes) ? payload.outcomes : [];
      setStatus('Git fetch-all complete', `Processed ${outcomes.length} remote fetch operation(s).`, 'success');
      return payload;
    }

    async function refreshWorkspaceRemotes() {
      const payload = await jsonRequest(`/api/git/remotes?ws_id=${encodeURIComponent(state.workspaceId)}`, 'GET');
      const remotes = Array.isArray(payload?.remotes) ? payload.remotes : [];
      state.gitWorkspace.remotes = remotes;
      syncGitRemoteInputs();
      renderGitWorkspaceDeck();
      setStatus('Git remotes refreshed', remotes.length ? `Remotes: ${remotes.map((entry) => entry?.name).filter(Boolean).join(', ')}` : 'No remotes are currently configured.', 'success');
      return payload;
    }

    async function addWorkspaceRemote() {
      const name = $("gitRemoteInput")?.value?.trim() || '';
      const url = $("gitRemoteUrlInput")?.value?.trim() || '';
      const pushUrl = $("gitRemotePushUrlInput")?.value?.trim() || '';
      if (!name || !url) throw new Error('Remote name and URL are required.');
      if (!isValidGitRemoteUrl(url) || (pushUrl && !isValidGitRemoteUrl(pushUrl))) {
        throw new Error('Remote URLs must use an allowed Git transport or local path.');
      }
      const payload = await jsonRequest('/api/git/remotes', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        name,
        url,
        push_url: pushUrl || undefined,
      });
      state.gitWorkspace.remotes = Array.isArray(payload?.remotes) ? payload.remotes : [];
      syncGitRemoteInputs();
      renderGitWorkspaceDeck();
      setStatus('Git remote added', `Added remote ${name}.`, 'success');
      return payload;
    }

    async function updateWorkspaceRemote() {
      const name = $("gitRemoteInput")?.value?.trim() || '';
      const url = $("gitRemoteUrlInput")?.value?.trim() || '';
      const pushUrl = $("gitRemotePushUrlInput")?.value?.trim() || '';
      if (!name || !url) throw new Error('Remote name and URL are required.');
      if (!isValidGitRemoteUrl(url) || (pushUrl && !isValidGitRemoteUrl(pushUrl))) {
        throw new Error('Remote URLs must use an allowed Git transport or local path.');
      }
      const payload = await jsonRequest('/api/git/remotes', 'PATCH', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        name,
        url,
        push_url: pushUrl || undefined,
      });
      state.gitWorkspace.remotes = Array.isArray(payload?.remotes) ? payload.remotes : [];
      syncGitRemoteInputs();
      renderGitWorkspaceDeck();
      setStatus('Git remote updated', `Updated remote ${name}.`, 'success');
      return payload;
    }

    async function deleteWorkspaceRemote() {
      const name = $("gitRemoteInput")?.value?.trim() || '';
      if (!name) throw new Error('Remote name is required.');
      const payload = await jsonRequest('/api/git/remotes', 'DELETE', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        name,
      });
      state.gitWorkspace.remotes = Array.isArray(payload?.remotes) ? payload.remotes : [];
      syncGitRemoteInputs();
      renderGitWorkspaceDeck();
      setStatus('Git remote deleted', `Deleted remote ${name}.`, 'success');
      return payload;
    }

    async function refreshWorkspaceBranchTracking() {
      const payload = await jsonRequest(`/api/git/branch-tracking?ws_id=${encodeURIComponent(state.workspaceId)}`, 'GET');
      const tracking = payload?.tracking || {};
      state.gitWorkspace.tracking = tracking;
      const upstreamInput = $("gitTrackingUpstreamInput");

        files: cloneFiles(state.files),
      });
      state.gitWorkspace.conflicts = payload?.conflicts && typeof payload.conflicts === 'object'
        ? payload.conflicts
        : { has_conflicts: false, count: 0, files: [] };
      const git = payload?.git || {};
      state.gitWorkspace.branch = String(git.branch || state.gitWorkspace.branch || '').trim();
      state.gitWorkspace.ahead = Number(git.ahead || state.gitWorkspace.ahead || 0) || 0;
      state.gitWorkspace.behind = Number(git.behind || state.gitWorkspace.behind || 0) || 0;
      state.gitWorkspace.entries = Array.isArray(git.entries) ? git.entries : state.gitWorkspace.entries;
      renderGitWorkspaceDeck();
      if (!options.silent) {
        setStatus(
          state.gitWorkspace.conflicts?.has_conflicts ? 'Conflicts detected' : 'No conflicts detected',
          state.gitWorkspace.conflicts?.has_conflicts
            ? `Detected ${state.gitWorkspace.conflicts.count || 0} merge conflict file(s) in the workspace repository.`
            : 'Workspace repository has no merge conflicts right now.',
          state.gitWorkspace.conflicts?.has_conflicts ? 'warning' : 'success'
        );

      return payload;
    }

      const mode = $("gitConflictModeSelect")?.value?.trim() || 'ours';
      const content = $("gitConflictManualContentInput")?.value || '';
      if (!path) throw new Error('Conflict path is required.');
      if (mode === 'manual' && !content.trim()) {
        throw new Error('Manual conflict resolution requires resolved file content.');
      }
      const payload = await jsonRequest('/api/git/conflicts/resolve', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        path,
        mode,
        content: mode === 'manual' ? content : undefined,
      });
      const git = payload?.git || {};
      state.gitWorkspace.branch = String(git.branch || state.gitWorkspace.branch || '').trim();
      state.gitWorkspace.ahead = Number(git.ahead || state.gitWorkspace.ahead || 0) || 0;
      state.gitWorkspace.behind = Number(git.behind || state.gitWorkspace.behind || 0) || 0;
      state.gitWorkspace.entries = Array.isArray(git.entries) ? git.entries : state.gitWorkspace.entries;
      state.gitWorkspace.conflicts = payload?.conflicts && typeof payload.conflicts === 'object'
        ? payload.conflicts
        : { has_conflicts: false, count: 0, files: [] };
      await loadWorkspace();
      renderGitWorkspaceDeck();
      setStatus('Conflict resolved', `${path} resolved using ${mode}.`, 'success');
      return payload;
    }

    function importBlogRecallToWorkspace() {
      const record = selectedBlogRecord();
      if (!record) throw new Error("Choose a SkyeBlog record first.");
      const title = blogRecordTitle(record);
      const html = blogRecordHtml(record);
      const text = blogRecordText(record) || html.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      if (!html && !text) throw new Error("Selected SkyeBlog record has no importable content.");
      const stamp = new Date(record.updated_at || record.created_at || Date.now()).toISOString().replace(/[.:]/g, "-");
      const slug = slugify(title);
      const base = "imports/skyeblog-recall/" + slug + "-" + stamp;
      if (html) upsertFile(base + ".html", html);
      upsertFile(base + ".md", [
        "# " + title,
        "",

    async function runPrompt() {
      collectCurrentEditor();
      const prompt = $("promptInput").value.trim();
      const model = $("modelInput").value.trim();
      if (!prompt) throw new Error("Prompt is required.");
      const selectedAppStack = $("agentAppStackSelect").value || "auto";
      const resolvedAppStack = inferRequestedAppStack(prompt, selectedAppStack);
      const extractedAppSpec = extractAppSpec(prompt, resolvedAppStack);
      const autonomy = $("agentAutonomySelect").value || "controlled";
      const mode = $("agentModeSelect").value || "plan";
      const policyProfile = $("agentPolicyProfileSelect").value || "balanced";
      const profileConfig = agentPolicyProfileConfig(policyProfile);
      const maxIterations = Number($("agentIterationsSelect").value || profileConfig.iterations);
      const contextDepth = $("agentDepthSelect").value || profileConfig.depth;
      const reasoningEffort = $("agentReasoningSelect").value || profileConfig.reasoning;
      if (!state.workspaceMapCache || Number(state.workspaceMapCache?.file_count || 0) !== state.files.length) {
        await refreshWorkspaceMapCache({ silent: true, persistFile: false });
      }
      const insights = computeWorkspaceInsights();
      const contextualPrompt = [
        prompt,
        "",
        "SkyDexia 2.6 workspace context:",
        `workspace_id: ${state.workspaceId}`,
        `workspace_name: ${state.workspaceName}`,
        `active_path: ${state.activePath || "none"}`,
        `requested_app_stack: ${resolvedAppStack}`,
        `app_spec: ${JSON.stringify(extractedAppSpec)}`,
        `workspace_map_summary: entrypoints=${(state.workspaceMapCache?.entrypoints || []).length}, api_endpoints=${(state.workspaceMapCache?.api_endpoints || []).length}, routes=${(state.workspaceMapCache?.routes || []).length}`,
        `summary: ${insights.summary}`,
        `facts: ${insights.facts.join(" | ")}`,
        `priority_actions: ${insights.risks.join(" | ")}`,
      ].join("\n");
      state.agentRun = {
        pending: true,
        reply: "",
        summary: "",
        operations: [],
        policyWarnings: [],
        blockedOperations: [],
        report: null,
        autonomy,
        mode,
        policyProfile,
        applied: false,
        appliedAt: null,
      };
      renderAgentRun();
      const payload = await jsonRequest("/api/ai-agent", "POST", {
        ws_id: state.workspaceId,
        activePath: state.activePath || undefined,
        files: state.files,
        prompt: contextualPrompt,
        model: model || undefined,
        mode,
        autonomy,
        policyProfile,
        smartContext: true,
        contextDepth,
        max_iterations: maxIterations,
        operationBudget: autonomy === "autonomous" ? profileConfig.operationBudget : 28,
        reasoningEffort,
        agentMemory: $("agentMemoryInput").value.trim(),
        appStack: resolvedAppStack,
        appSpec: extractedAppSpec,
        workspaceMap: state.workspaceMapCache,
      });
      const policy = applyAgentOperationPolicy(payload?.result?.operations, {
        operationBudget: autonomy === "autonomous" ? profileConfig.operationBudget : 28,
        perFileBytesLimit: profileConfig.perFileBytesLimit,
        totalBytesLimit: profileConfig.totalBytesLimit,
      });
      const reportAppStack = String(payload?.result?.report?.appStack || resolvedAppStack || "auto").trim() || "auto";
      const reportAppSpec = payload?.result?.report?.appSpec && typeof payload.result.report.appSpec === "object"
        ? payload.result.report.appSpec
        : extractedAppSpec;
      const bootstrap = deriveRuntimeBootstrapConfig(reportAppStack, reportAppSpec);
      state.promptOutput = String(payload?.result?.reply || "").trim();
      state.agentRun = {
        pending: false,
        reply: state.promptOutput,
        summary: String(payload?.result?.summary || "Agent response ready.").trim(),
        operations: policy.operations,
        policyWarnings: policy.blocked.map((entry) => `${describeAgentOperation(entry.operation)} blocked: ${entry.reason}`),
        blockedOperations: policy.blocked,
        report: {
          ...(payload?.result?.report || {}),
          appStack: reportAppStack,
          appSpec: reportAppSpec,
          bootstrap,
          operationCounts: policy.counts,
          policyProfile,
          policy: {
            ...(payload?.result?.report?.policy || {}),
            ...policy.policy,
          },
        },
        autonomy,
        mode,
        policyProfile,
        applied: false,
        appliedAt: null,
      };
      const evidencePath = recordAutonomyEvidence("plan", {
        provider: payload?.provider || "unknown",
      });
      renderAgentRun();
      if (autonomy === "autonomous" && mode === "execute" && state.agentRun.operations.length) {
        await applyAgentOperations({ saveAfterApply: true, ensureRollbackCheckpoint: true });
        return;
      }
      setStatus(
        "Agent response ready",
        state.agentRun.operations.length
          ? `${state.agentRun.operations.length} staged operation${state.agentRun.operations.length === 1 ? " is" : "s are"} ready for review. Evidence: ${evidencePath}.`
          : "Agent guidance is ready. No file operations were staged.",
        "success"
      );
    }

    function crc32(buffer) {
      const table = crc32.table || (crc32.table = Array.from({ length: 256 }, (_, n) => {
        let c = n;
        for (let index = 0; index < 8; index += 1) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        return c >>> 0;
      }));
      let c = ~0;
      for (let index = 0; index < buffer.length; index += 1) c = table[(c ^ buffer[index]) & 255] ^ (c >>> 8);
      return (~c) >>> 0;
    }

    async function exportZip() {
      collectCurrentEditor();
      const encoder = new TextEncoder();
      const local = [];
      const central = [];
      let offset = 0;
      state.files.forEach((file) => {
        const nameBytes = encoder.encode(file.path);
        const data = encoder.encode(file.content);
        const crc = crc32(data);
        const localHeader = new Uint8Array(30 + nameBytes.length);
        const localView = new DataView(localHeader.buffer);
        localView.setUint32(0, 0x04034b50, true);
        localView.setUint16(4, 20, true);
        localView.setUint32(14, crc, true);
        localView.setUint32(18, data.length, true);
        localView.setUint32(22, data.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localHeader.set(nameBytes, 30);
        local.push(localHeader, data);

        const centralHeader = new Uint8Array(46 + nameBytes.length);
        const centralView = new DataView(centralHeader.buffer);
        centralView.setUint32(0, 0x02014b50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint32(16, crc, true);
        centralView.setUint32(20, data.length, true);
        centralView.setUint32(24, data.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint32(42, offset, true);
        centralHeader.set(nameBytes, 46);
        central.push(centralHeader);
        offset += localHeader.length + data.length;
      });

      const centralSize = central.reduce((sum, chunk) => sum + chunk.length, 0);
      const end = new Uint8Array(22);
      const endView = new DataView(end.buffer);
      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(8, state.files.length, true);
      endView.setUint16(10, state.files.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, offset, true);
      const blob = new Blob([...local, ...central, end], { type: "application/zip" });
      downloadBlob((state.workspaceId || "workspace") + ".zip", blob);
      setStatus("Export ready", "ZIP snapshot downloaded.", "success");
    }

    const PANE_LAYOUT_KEY = "skydexia26.layout.v5";

    function readPaneLayout() {
      try {
        const raw = JSON.parse(localStorage.getItem(PANE_LAYOUT_KEY) || "{}");
        return {
          left: { collapsed: false, floating: false, x: null, y: null, width: null, height: null, ...(raw.left || {}) },
          right: { collapsed: false, floating: false, x: null, y: null, width: null, height: null, ...(raw.right || {}) },
        };
      } catch {
        return {
          left: { collapsed: false, floating: false, x: null, y: null, width: null, height: null },
          right: { collapsed: false, floating: false, x: null, y: null, width: null, height: null },
        };
      }
    }

    function writePaneLayout(next) {
      try { localStorage.setItem(PANE_LAYOUT_KEY, JSON.stringify(next)); } catch { /* ignore */ }
    }

    function paneElement(side) {
      return side === "left" ? document.querySelector(".sidebar") : document.querySelector(".rail");
    }

    function clampPanePoint(side, x, y, pane) {
      const width = pane?.offsetWidth || 380;
      const height = pane?.offsetHeight || 520;
      const maxX = Math.max(14, window.innerWidth - width - 14);
      const maxY = Math.max(86, window.innerHeight - height - 14);
      return {
        x: Math.max(14, Math.min(maxX, Number.isFinite(x) ? x : (side === 'left' ? 14 : maxX))),
        y: Math.max(86, Math.min(maxY, Number.isFinite(y) ? y : 86)),
      };
    }

    function applyPaneLayout() {
      const layout = readPaneLayout();
      ["left", "right"].forEach((side) => {
        const pane = paneElement(side);
        if (!pane) return;
        const cfg = layout[side] || {};
        const floatingClass = side === 'left' ? 'layout-left-floating' : 'layout-right-floating';
        const collapsedClass = side === 'left' ? 'layout-left-collapsed' : 'layout-right-collapsed';
        document.body.classList.toggle(floatingClass, Boolean(cfg.floating));
        document.body.classList.toggle(collapsedClass, Boolean(cfg.collapsed && !cfg.floating));
        pane.classList.toggle('floating', Boolean(cfg.floating));
        pane.classList.toggle('is-collapsed', Boolean(cfg.collapsed));
        if (cfg.floating) {
          const point = clampPanePoint(side, cfg.x, cfg.y, pane);
          if (side === 'left') {
            pane.style.left = point.x + 'px';
            pane.style.right = 'auto';
          } else {
            pane.style.left = point.x + 'px';
            pane.style.right = 'auto';
          }
          pane.style.top = point.y + 'px';
          if (cfg.width) pane.style.width = cfg.width + 'px';
          if (cfg.height) pane.style.height = cfg.height + 'px';
        } else {
          pane.style.left = '';
          pane.style.right = '';
          pane.style.top = '';
          pane.style.width = '';
          pane.style.height = '';
        }
        const toggleBtn = $(side === 'left' ? 'toggleWorkspaceDrawerBtn' : 'toggleControlDrawerBtn');
        if (toggleBtn) toggleBtn.textContent = (side === 'left' ? 'Workspace Pane' : 'Control Pane') + (cfg.collapsed ? ' · Closed' : (cfg.floating ? ' · Floating' : ' · Docked'));
        const collapseBtn = pane.querySelector('[data-pane-collapse]');
        if (collapseBtn) collapseBtn.textContent = cfg.collapsed ? 'Expand' : 'Collapse';
        const floatBtn = pane.querySelector('[data-pane-float]');
        if (floatBtn) floatBtn.textContent = cfg.floating ? 'Dock' : 'Detach';
      });
    }

    function setPaneFloating(side, floating) {
      const layout = readPaneLayout();
      const pane = paneElement(side);
      layout[side] = { ...(layout[side] || {}), floating: Boolean(floating), collapsed: false };
      if (floating && pane) {
        const rect = pane.getBoundingClientRect();
        layout[side].x = Math.round(rect.left);
        layout[side].y = Math.round(rect.top);
        layout[side].width = Math.round(rect.width);
        layout[side].height = Math.round(rect.height);
      }
      writePaneLayout(layout);
      applyPaneLayout();
    }

    function togglePaneCollapse(side) {
      const layout = readPaneLayout();
      layout[side] = { ...(layout[side] || {}), collapsed: !(layout[side] || {}).collapsed };
      writePaneLayout(layout);
      applyPaneLayout();
    }

    function attachPaneDrag(side) {
      const pane = paneElement(side);
      if (!pane || pane.dataset.dragReady === '1') return;
      const header = pane.querySelector('.panel-header');
      if (!header) return;
      let drag = null;
      header.addEventListener('pointerdown', (event) => {
        if (!pane.classList.contains('floating')) return;
        if (event.target.closest('button, input, select, textarea, a, label')) return;
        const rect = pane.getBoundingClientRect();
        drag = { dx: event.clientX - rect.left, dy: event.clientY - rect.top };
        document.body.classList.add('dragging-pane');
        header.setPointerCapture?.(event.pointerId);
      });
      header.addEventListener('pointermove', (event) => {
        if (!drag || !pane.classList.contains('floating')) return;
        const layout = readPaneLayout();
        const point = clampPanePoint(side, event.clientX - drag.dx, event.clientY - drag.dy, pane);
        layout[side] = { ...(layout[side] || {}), x: point.x, y: point.y, width: pane.offsetWidth, height: pane.offsetHeight };
        writePaneLayout(layout);
        applyPaneLayout();
      });
      const stop = (event) => {
        if (!drag) return;
        drag = null;
        document.body.classList.remove('dragging-pane');
        header.releasePointerCapture?.(event.pointerId);
      };
      header.addEventListener('pointerup', stop);
      header.addEventListener('pointercancel', stop);
      pane.dataset.dragReady = '1';
    }

          floatBtn.addEventListener('click', () => setPaneFloating(side, !readPaneLayout()[side]?.floating));
          actions.insertBefore(floatBtn, closeBtn || null);

        attachPaneDrag(side);

    }

    function initSplitter() {
      const shell = $("editorShell");
      const splitter = $("mainSplitter");
      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;
      splitter.addEventListener("pointerdown", (event) => {
        startX = event.clientX;
        startY = event.clientY;
        startLeft = shell.getBoundingClientRect().width * 0.56;
        startTop = shell.getBoundingClientRect().height * 0.52;
        splitter.setPointerCapture(event.pointerId);
      });
      splitter.addEventListener("pointermove", (event) => {
        if (!splitter.hasPointerCapture(event.pointerId)) return;
        const compact = window.matchMedia('(max-width: 1180px)').matches;
        if (compact) {
          const height = shell.getBoundingClientRect().height;
          if (!height) return;
          const delta = event.clientY - startY;
          const next = Math.max(height * 0.28, Math.min(height * 0.72, startTop + delta));
          shell.style.gridTemplateRows = next + 'px 12px calc(100% - ' + next + 'px - 12px)';
          return;
        }
        const width = shell.getBoundingClientRect().width;
        if (!width) return;
        const delta = event.clientX - startX;
        const next = Math.max(width * 0.3, Math.min(width * 0.7, startLeft + delta));
        shell.style.gridTemplateColumns = next + 'px 12px calc(100% - ' + next + 'px - 12px)';
      });
      splitter.addEventListener("pointerup", (event) => {
        if (splitter.hasPointerCapture(event.pointerId)) splitter.releasePointerCapture(event.pointerId);
      });
    }
