          floatBtn.className = 'pane-mini';
          floatBtn.dataset.paneFloat = side;
          floatBtn.textContent = 'Detach';
          floatBtn.addEventListener('click', () => setPaneFloating(side, !readPaneLayout()[side]?.floating));
          actions.appendChild(minimizeBtn);
          actions.appendChild(floatBtn);
        }
        attachPaneDrag(side);
        pane.dataset.controlsReady = '1';
      });
      applyPaneLayout();
    }

    function syncGlobalActionsUi() {
      const isOpen = document.body.classList.contains('global-actions-open');
      $('dockActionBtn')?.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      $('globalActionsPanel')?.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
      if (isOpen) {
        requestAnimationFrame(() => {
          const firstAction = $('saveWorkspaceBtn') || $('reloadWorkspaceBtn') || $('openTutorialBtn');
          firstAction?.focus();
        });
      }
    }

    function toggleViewTools(force) {
      const next = typeof force === 'boolean' ? force : !document.body.classList.contains('view-tools-open');
      document.body.classList.toggle('view-tools-open', next);
      if (next) document.body.classList.remove('global-actions-open');
      applyPaneLayout();
      syncGlobalActionsUi();
    }

    function toggleGlobalActions(force) {
      const next = typeof force === 'boolean' ? force : !document.body.classList.contains('global-actions-open');
      document.body.classList.toggle('global-actions-open', next);
      if (next) document.body.classList.remove('view-tools-open');
      applyPaneLayout();
      syncGlobalActionsUi();
    }

    function wireFocusUiMenus() {
      $('dockWorkspaceBtn')?.addEventListener('click', () => toggleDrawer('left'));
      $('dockControlBtn')?.addEventListener('click', () => toggleDrawer('right'));
      $('dockViewBtn')?.addEventListener('click', () => toggleViewTools());
      $('dockActionBtn')?.addEventListener('click', () => toggleGlobalActions());
      $('closeViewToolsBtn')?.addEventListener('click', () => toggleViewTools(false));
      applyPaneLayout();
      syncGlobalActionsUi();
    }


    /* SKYDEXIA_FILES_SPLIT_PATCH_V1:start */
    const FILE_PANE_KEY = 'skydexia26.layout.files.v1';

    function readFilesPaneState() {
      try {
        const raw = JSON.parse(localStorage.getItem(FILE_PANE_KEY) || '{}');
        return {
          open: raw.open !== undefined ? Boolean(raw.open) : true,
          floating: Boolean(raw.floating),
          x: Number.isFinite(raw.x) ? raw.x : 24,
          y: Number.isFinite(raw.y) ? raw.y : 92,
          width: Number.isFinite(raw.width) ? raw.width : 460,
          height: Number.isFinite(raw.height) ? raw.height : Math.min(window.innerHeight - 110, 760),
        };
      } catch {
        return { open: true, floating: false, x: 24, y: 92, width: 460, height: Math.min(window.innerHeight - 110, 760) };
      }
    }

    function writeFilesPaneState(next) {
      try { localStorage.setItem(FILE_PANE_KEY, JSON.stringify(next)); } catch { /* ignore */ }
    }

    function filesPaneElement() {
      return $('filePane');
    }

    function clampFilesPanePoint(x, y, pane) {
      const width = pane?.offsetWidth || 420;
      const height = pane?.offsetHeight || 520;
      const maxX = Math.max(14, window.innerWidth - width - 14);
      const maxY = Math.max(86, window.innerHeight - height - 14);
      return {
        x: Math.max(14, Math.min(maxX, Number.isFinite(x) ? x : 24)),
        y: Math.max(86, Math.min(maxY, Number.isFinite(y) ? y : 92)),
      };
    }

    function applyFilesPaneLayout() {
      const pane = filesPaneElement();
      if (!pane) return;
      const cfg = readFilesPaneState();
      document.body.classList.toggle('pane-files-open', cfg.open && !cfg.floating);
      pane.classList.toggle('floating', cfg.floating && cfg.open);
      pane.classList.toggle('is-hidden', !cfg.open);
      pane.classList.toggle('is-collapsed', !cfg.open);
      if (cfg.floating && cfg.open) {
        const point = clampFilesPanePoint(cfg.x, cfg.y, pane);
        pane.style.left = point.x + 'px';
        pane.style.right = 'auto';
        pane.style.top = point.y + 'px';
        pane.style.bottom = 'auto';
        pane.style.width = (cfg.width || pane.offsetWidth || 460) + 'px';
        pane.style.height = (cfg.height || pane.offsetHeight || Math.min(window.innerHeight - point.y - 14, 760)) + 'px';
      } else {
        pane.style.left = '';
        pane.style.right = '';
        pane.style.top = '';
        pane.style.bottom = '';
        pane.style.width = '';
        pane.style.height = '';
      }
      const toggleBtn = $('toggleFilesDrawerBtn');
      if (toggleBtn) toggleBtn.textContent = cfg.open ? 'Hide Files' : 'Show Files';
      const dockBtn = $('dockFilesBtn');
      if (dockBtn) dockBtn.classList.toggle('active', cfg.open);
      const collapseBtn = pane.querySelector('[data-pane-collapse="files"]');
      if (collapseBtn) collapseBtn.textContent = cfg.open ? 'Minimize' : 'Open';
      const floatBtn = pane.querySelector('[data-pane-float="files"]');
      if (floatBtn) floatBtn.textContent = cfg.floating && cfg.open ? 'Dock' : 'Detach';
    }

    function toggleFilesPane(force) {
      const cfg = readFilesPaneState();
      const nextOpen = typeof force === 'boolean' ? force : !cfg.open;
      const next = { ...cfg, open: nextOpen };
      if (nextOpen) {
        const layout = readPaneLayout();
        layout.left = { ...(layout.left || {}), open: false };
        writePaneLayout(layout);
      }
      writeFilesPaneState(next);
      applyPaneLayout();
      applyFilesPaneLayout();
    }

    function setFilesPaneFloating(floating) {
      const pane = filesPaneElement();
      const cfg = readFilesPaneState();
      const next = { ...cfg, floating: Boolean(floating), open: true };
      if (pane) {
        const rect = pane.getBoundingClientRect();
        next.x = Math.round(rect.left || 24);
        next.y = Math.round(rect.top || 92);
        next.width = Math.round(rect.width || 460);
        next.height = Math.round(rect.height || Math.min(window.innerHeight - 110, 760));
      }
      writeFilesPaneState(next);
      applyFilesPaneLayout();
    }

    function attachFilesPaneDrag() {
      const pane = filesPaneElement();
      if (!pane || pane.dataset.dragReady === '1') return;
      const header = pane.querySelector('.panel-header');
      if (!header) return;
      let drag = null;
      header.addEventListener('pointerdown', (event) => {
        if (!pane.classList.contains('floating')) return;
        if (event.target.closest('button, input, select, textarea, a, label')) return;
        const rect = pane.getBoundingClientRect();
        drag = { dx: event.clientX - rect.left, dy: event.clientY - rect.top };
        document.body.classList.add('dragging-pane');
        header.setPointerCapture?.(event.pointerId);
      });
      header.addEventListener('pointermove', (event) => {
        if (!drag || !pane.classList.contains('floating')) return;
        const cfg = readFilesPaneState();
        const point = clampFilesPanePoint(event.clientX - drag.dx, event.clientY - drag.dy, pane);
        writeFilesPaneState({ ...cfg, x: point.x, y: point.y, width: pane.offsetWidth, height: pane.offsetHeight });
        applyFilesPaneLayout();
      });
      const stop = (event) => {
        if (!drag) return;
        drag = null;
        document.body.classList.remove('dragging-pane');
        header.releasePointerCapture?.(event.pointerId);
      };
      header.addEventListener('pointerup', stop);
      header.addEventListener('pointercancel', stop);
      pane.dataset.dragReady = '1';
    }

    function installWorkspaceFileSplit() {
      if ($('filePane')) return;
      const shell = document.querySelector('.workspace-shell');
      const sidebar = document.querySelector('.sidebar');
      const cornerLauncher = $('cornerLauncher');
      const headerActions = document.querySelector('.header-actions');
      const workspaceHeaderBtn = $('toggleWorkspaceDrawerBtn');
      const workspaceDockBtn = $('dockWorkspaceBtn');
      if (!shell || !sidebar || !cornerLauncher) return;

      if (workspaceHeaderBtn) workspaceHeaderBtn.textContent = 'Workspace Pane';
      if (workspaceDockBtn) workspaceDockBtn.innerHTML = 'Workspace<small>project + save state</small>';

      if (!$('toggleFilesDrawerBtn') && headerActions && $('toggleControlDrawerBtn')) {
        const filesHeaderBtn = document.createElement('button');
        filesHeaderBtn.className = 'ghost';
        filesHeaderBtn.type = 'button';
        filesHeaderBtn.id = 'toggleFilesDrawerBtn';
        filesHeaderBtn.textContent = 'Files Pane';
        headerActions.insertBefore(filesHeaderBtn, $('toggleControlDrawerBtn'));
      }

      if (!$('dockFilesBtn') && $('dockControlBtn')) {
        const filesDockBtn = document.createElement('button');
        filesDockBtn.className = 'dock-btn';
        filesDockBtn.type = 'button';
        filesDockBtn.id = 'dockFilesBtn';
        filesDockBtn.innerHTML = 'Files<small>repo browser</small>';
        cornerLauncher.insertBefore(filesDockBtn, $('dockControlBtn'));
      }

      const filePane = document.createElement('aside');
      filePane.className = 'panel file-pane is-hidden';
      filePane.id = 'filePane';
      filePane.innerHTML = `
        <div class="panel-header">
          <div>
            <div class="eyebrow">Repo Browser</div>
            <h2 class="panel-title">Workspace Files</h2>
            <p class="panel-subtitle">This pane is only for file visibility, search, and file creation so dropped repos are not buried under other controls.</p>
          </div>
          <div class="drawer-header-actions pane-actions">
            <button class="pane-mini" type="button" data-pane-collapse="files">Minimize</button>
            <button class="pane-mini" type="button" data-pane-float="files">Detach</button>
          </div>
        </div>
        <div class="file-pane-body">
          <div class="file-pane-tools"></div>
          <div class="file-pane-search"></div>
          <div class="file-pane-list"></div>
        </div>
      `;
      shell.appendChild(filePane);

      const filePaneTools = filePane.querySelector('.file-pane-tools');
      const filePaneSearch = filePane.querySelector('.file-pane-search');
      const filePaneList = filePane.querySelector('.file-pane-list');
      const fileSearch = $('fileSearch');
      const fileList = $('fileList');
      const newFileField = $('newFilePath')?.closest('.field');
      const newFileBtn = $('newFileBtn');
      const duplicateFileBtn = $('duplicateFileBtn');

      if (newFileField) filePaneTools.appendChild(newFileField);
      const actionWrap = document.createElement('div');
      actionWrap.className = 'action-stack';
      if (newFileBtn) actionWrap.appendChild(newFileBtn);
      if (duplicateFileBtn) actionWrap.appendChild(duplicateFileBtn);
      filePaneTools.appendChild(actionWrap);
      if (fileSearch) filePaneSearch.appendChild(fileSearch);
      if (fileList) filePaneList.appendChild(fileList);

      const sidebarMeta = sidebar.querySelector('.sidebar-block.field-stack');
      if (sidebarMeta && !sidebarMeta.querySelector('.files-split-note')) {
        const note = document.createElement('div');
        note.className = 'files-split-note muted';
        note.textContent = 'Workspace is now just project state and release context. Use the Files pane for repo browsing, search, and file creation.';
        sidebarMeta.appendChild(note);
      }

      $('toggleFilesDrawerBtn')?.addEventListener('click', () => toggleFilesPane());
      $('dockFilesBtn')?.addEventListener('click', () => toggleFilesPane());
      filePane.querySelector('[data-pane-collapse="files"]')?.addEventListener('click', (event) => {
        event.preventDefault();
        toggleFilesPane();
      });
      filePane.querySelector('[data-pane-float="files"]')?.addEventListener('click', () => setFilesPaneFloating(!readFilesPaneState().floating));
      attachFilesPaneDrag();
      applyFilesPaneLayout();
    }

    const _skydexToggleDrawerOriginal = toggleDrawer;
    toggleDrawer = function(side) {
      if (side === 'left') {
        const filesState = readFilesPaneState();
        if (filesState.open) writeFilesPaneState({ ...filesState, open: false });
      }
      _skydexToggleDrawerOriginal(side);
      applyFilesPaneLayout();
    };

    const _skydexCloseDrawersOriginal = closeDrawers;
    closeDrawers = function() {
      const filesState = readFilesPaneState();
      writeFilesPaneState({ ...filesState, open: false });
      _skydexCloseDrawersOriginal();
      applyFilesPaneLayout();
    };

    const _skydexApplyPaneLayoutOriginal = applyPaneLayout;
    applyPaneLayout = function() {
      _skydexApplyPaneLayoutOriginal();
      applyFilesPaneLayout();
    };

    installWorkspaceFileSplit();
    /* SKYDEXIA_FILES_SPLIT_PATCH_V1:end */


    (async function bootSkyDexia() {
      try {
        await loadUiPartials();
      } catch (error) {
        setStatus('UI partial load failed', error?.message || 'Unable to load modular UI partials.', 'error');
        return;
      }
      wireEvents();
      wireFocusUiMenus();
      bindDesktopDropZone();
      initSplitter();
      initEditor();
    }());
  </script>
</body>
