<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDexia 2.6</title>
  <meta name="theme-color" content="#180713" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="./_shared/auth-unlock.js"></script>
  <script src="./_shared/standalone-session.js"></script>
  <style>
    :root {
      --bg: #120611;
      --bg-2: #24101e;
      --panel: rgba(34, 16, 32, 0.92);
      --panel-2: rgba(50, 22, 42, 0.94);
      --line: rgba(248, 204, 120, 0.18);
      --line-strong: rgba(255, 219, 150, 0.44);
      --text: #fff4fb;
      --muted: #d7bfd0;
      --purple: #ff5fa8;
      --purple-soft: #ffc6de;
      --gold: #efc764;
      --gold-soft: #ffe7a9;
      --success: #66d39d;
      --danger: #ff7979;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --bg-accent-1: rgba(255, 95, 168, 0.24);
      --bg-accent-2: rgba(239, 199, 100, 0.18);
      --bg-gradient-top: #180713;
      --bg-gradient-bottom: #07040b;
      --header-bg-1: rgba(31, 14, 27, 0.97);
      --header-bg-2: rgba(15, 9, 18, 0.84);
      --panel-header-1: rgba(53, 23, 45, 0.82);
      --panel-header-2: rgba(24, 13, 23, 0.78);
      --brand-shell: rgba(28, 11, 24, 0.82);
      --brand-glow: rgba(255, 95, 168, 0.34);
      --brand-drop-1: rgba(255, 95, 168, 0.28);
      --brand-drop-2: rgba(239, 199, 100, 0.22);
      --button-text: #2a1020;
      --dock-border: rgba(248, 204, 120, 0.22);
      --dock-bg-1: rgba(42, 17, 31, 0.98);
      --dock-bg-2: rgba(14, 8, 14, 0.98);
      --dock-active-1: rgba(84, 28, 62, 0.98);
      --dock-active-2: rgba(28, 12, 22, 0.98);
      --tutorial-overlay: rgba(8, 5, 10, 0.8);
      --tutorial-dialog-accent-a: rgba(255, 95, 168, 0.18);
      --tutorial-dialog-accent-b: rgba(239, 199, 100, 0.16);
      --tutorial-border: rgba(248, 204, 120, 0.24);
      --tutorial-card-border: rgba(248, 204, 120, 0.16);
      --tutorial-card-bg: rgba(255, 255, 255, 0.04);
      --focus-ring: rgba(255, 95, 168, 0.34);
      --topbar-h: 72px;
      --sidebar-w: 280px;
      --rail-w: 360px;
      --editor-font: 14px;
      --doc-font: Georgia, serif;
    }

    body[data-theme="pink-blue"] {
      --bg: #08111d;
      --bg-2: #11213a;
      --panel: rgba(16, 26, 45, 0.92);
      --panel-2: rgba(20, 34, 58, 0.94);
      --line: rgba(110, 183, 255, 0.18);
      --line-strong: rgba(255, 130, 204, 0.42);
      --text: #f5f8ff;
      --muted: #bfd0e6;
      --purple: #ff4ca6;
      --purple-soft: #ffbfdc;
      --gold: #63b9ff;
      --gold-soft: #cde9ff;
      --bg-accent-1: rgba(255, 76, 166, 0.24);
      --bg-accent-2: rgba(99, 185, 255, 0.2);
      --bg-gradient-top: #081424;
      --bg-gradient-bottom: #040914;
      --header-bg-1: rgba(14, 23, 40, 0.97);
      --header-bg-2: rgba(8, 14, 28, 0.86);
      --panel-header-1: rgba(23, 40, 71, 0.82);
      --panel-header-2: rgba(14, 22, 40, 0.78);
      --brand-shell: rgba(10, 18, 34, 0.82);
      --brand-glow: rgba(99, 185, 255, 0.32);
      --brand-drop-1: rgba(255, 76, 166, 0.26);
      --brand-drop-2: rgba(99, 185, 255, 0.24);
      --button-text: #0f1930;
      --dock-border: rgba(110, 183, 255, 0.22);
      --dock-bg-1: rgba(14, 26, 46, 0.98);
      --dock-bg-2: rgba(8, 14, 24, 0.98);
      --dock-active-1: rgba(29, 55, 88, 0.98);
      --dock-active-2: rgba(15, 24, 40, 0.98);
      --tutorial-overlay: rgba(4, 8, 14, 0.8);
      --tutorial-dialog-accent-a: rgba(255, 76, 166, 0.18);
      --tutorial-dialog-accent-b: rgba(99, 185, 255, 0.16);
      --tutorial-border: rgba(110, 183, 255, 0.24);
      --tutorial-card-border: rgba(110, 183, 255, 0.16);
      --tutorial-card-bg: rgba(255, 255, 255, 0.035);
      --focus-ring: rgba(99, 185, 255, 0.34);
    }

    body[data-theme="yellow-neon-pink"] {
      --bg: #111108;
      --bg-2: #21150c;
      --panel: rgba(30, 22, 12, 0.92);
      --panel-2: rgba(46, 28, 18, 0.94);
      --line: rgba(255, 234, 92, 0.2);
      --line-strong: rgba(255, 73, 176, 0.46);
      --text: #fffbe6;
      --muted: #ead8b2;
      --purple: #ff3fb7;
      --purple-soft: #ffb7e6;
      --gold: #f6ef38;
      --gold-soft: #fff7a1;
      --bg-accent-1: rgba(255, 63, 183, 0.26);
      --bg-accent-2: rgba(246, 239, 56, 0.22);
      --bg-gradient-top: #181305;
      --bg-gradient-bottom: #070604;
      --header-bg-1: rgba(31, 22, 7, 0.97);
      --header-bg-2: rgba(17, 11, 7, 0.86);
      --panel-header-1: rgba(58, 38, 12, 0.82);
      --panel-header-2: rgba(25, 15, 8, 0.78);
      --brand-shell: rgba(26, 17, 7, 0.82);
      --brand-glow: rgba(255, 63, 183, 0.34);
      --brand-drop-1: rgba(255, 63, 183, 0.28);
      --brand-drop-2: rgba(246, 239, 56, 0.24);
      --button-text: #211705;
      --dock-border: rgba(255, 234, 92, 0.24);
      --dock-bg-1: rgba(44, 29, 8, 0.98);
      --dock-bg-2: rgba(15, 10, 5, 0.98);
      --dock-active-1: rgba(78, 39, 18, 0.98);
      --dock-active-2: rgba(27, 14, 10, 0.98);
      --tutorial-overlay: rgba(10, 8, 4, 0.82);
      --tutorial-dialog-accent-a: rgba(255, 63, 183, 0.18);
      --tutorial-dialog-accent-b: rgba(246, 239, 56, 0.16);
      --tutorial-border: rgba(255, 234, 92, 0.26);
      --tutorial-card-border: rgba(255, 234, 92, 0.18);
      --tutorial-card-bg: rgba(255, 255, 255, 0.045);
      --focus-ring: rgba(255, 63, 183, 0.36);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 0%, var(--bg-accent-1), transparent 34%),
        radial-gradient(circle at 100% 12%, var(--bg-accent-2), transparent 30%),
        linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-bottom) 100%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    :where(button, input, select, textarea):focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }

    body.embed .shell-header { display: none; }
    body.embed .shell { grid-template-rows: 1fr; }

    button,
    input,
    select,
    textarea { font: inherit; }

    button { cursor: pointer; }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: var(--topbar-h) 1fr;
    }

    .shell-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--header-bg-1), var(--header-bg-2));
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.24);
      min-width: 0;
      position: relative;
      z-index: 30;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--brand-shell);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 0 24px var(--brand-glow);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .brand-mark img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      filter: drop-shadow(0 0 10px var(--brand-drop-1)) drop-shadow(0 0 12px var(--brand-drop-2));
    }

    .mark-badge {
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--brand-shell);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 0 24px var(--brand-glow);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .mark-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 10px var(--brand-drop-1)) drop-shadow(0 0 12px var(--brand-drop-2));
    }

    .mark-badge.desktop-drop-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      border-radius: 24px;
      padding: 10px;
    }

    .mark-badge.status-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      padding: 5px;
    }

    .brand-copy { min-width: 0; }
    .brand-title { margin: 0; font-size: 18px; letter-spacing: 0.02em; white-space: nowrap; }
    .brand-title .sky { color: var(--purple-soft); }
    .brand-title .dex { color: var(--gold-soft); }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 46vw;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip,
    .ghost,
    .primary {
      border-radius: 12px;
      border: 1px solid transparent;
      padding: 10px 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      transition: 150ms ease;
      text-decoration: none;
    }

    .chip {
      font-size: 12px;
      color: var(--muted);
      border-color: var(--line);
    }

    .ghost:hover,
    .primary:hover,
    .chip:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.08);
    }

    .primary {
      background: linear-gradient(135deg, var(--purple), var(--gold));
      color: var(--button-text);
      font-weight: 800;
      box-shadow: 0 0 24px var(--brand-glow);
    }

    .workspace-shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 14px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 3, 10, 0.72);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 18;
    }

    body.drawer-left-open .drawer-backdrop,
    body.drawer-right-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      min-height: 0;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel), rgba(9, 8, 16, 0.94));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-header-1), var(--panel-header-2));
    }

    .panel-header h2,
    .panel-header h3,
    .panel-header p { margin: 0; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-title { font-size: 18px; }

    .panel-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      position: fixed;
      left: 14px;
      top: calc(var(--topbar-h) + 10px);
      bottom: 14px;
      width: min(calc(100vw - 28px), var(--sidebar-w));
      z-index: 26;
      transform: translateX(calc(-100% - 24px));
      transition: transform 180ms ease;
    }

    body.drawer-left-open .sidebar {
      transform: translateX(0);
    }

    .sidebar-block,
    .rail-block {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(201, 164, 79, 0.12);
    }

    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(201, 164, 79, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-weight: 700;
      text-align: left;
      margin-bottom: 12px;
    }

    .section-toggle small {
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-toggle::after {
      content: "+";
      color: var(--gold-soft);
      font-size: 18px;
      line-height: 1;
    }

    .rail-block.section-open .section-toggle::after {
      content: "-";
    }

    .section-content {
      display: none;
      gap: 12px;
    }

    .rail-block.section-open .section-content {
      display: grid;
    }

    .sidebar-block:last-child,
    .rail-block:last-child { border-bottom: none; }

    .field-stack,
    .action-stack,
    .file-list,
    .log-list,
    .summary-stack {
      display: grid;
      gap: 10px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea,
    .field select,
    .search-input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(201, 164, 79, 0.18);
      border-radius: 14px;
      background: rgba(6, 6, 10, 0.7);
      color: var(--text);
      padding: 11px 13px;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .search-input { margin-top: 12px; }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .file-list {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .file-item {
      display: grid;
      gap: 4px;
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      padding: 12px 14px;
      color: var(--text);
    }

    .file-item:hover,
    .file-item.active {
      border-color: var(--line-strong);
      background: linear-gradient(135deg, rgba(143, 91, 255, 0.12), rgba(239, 199, 100, 0.08));
    }

    .file-path { font-weight: 700; word-break: break-word; }
    .file-meta { color: var(--muted); font-size: 12px; }

    .workspace-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
    }

    .workspace-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 11, 30, 0.86);
    }

    .workspace-toolbar .field {
      min-width: 140px;
      flex: 1 1 140px;
    }

    .workspace-toolbar .field label { margin-bottom: 4px; }

    .editor-shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 56% 12px calc(44% - 12px);
      grid-template-areas: "editor splitter preview";
    }

    .editor-pane,
    .preview-pane {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: rgba(5, 5, 8, 0.72);
    }

    .editor-pane { grid-area: editor; }

    .preview-pane {
      grid-area: preview;
      border-left: 1px solid var(--line);
    }

    .splitter {
      grid-area: splitter;
      position: relative;
      background: linear-gradient(180deg, rgba(26, 18, 45, 0.94), rgba(11, 8, 21, 0.94));
      cursor: col-resize;
    }

    .splitter::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 74px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), var(--purple));
      box-shadow: 0 0 16px rgba(143, 91, 255, 0.34);
    }

    .subheader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(27, 18, 48, 0.82), rgba(15, 11, 28, 0.88));
    }

    .subheader-title {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .subheader-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    #editor { width: 100%; height: 100%; }

    .preview-viewport {
      position: relative;
      min-height: 0;
      background: linear-gradient(180deg, rgba(10, 8, 17, 0.98), rgba(4, 4, 7, 1));
    }

    #previewFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .watermark {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(201, 164, 79, 0.18);
      background: rgba(17, 11, 30, 0.74);
      color: var(--gold-soft);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .rail {
      min-height: 0;
      background: linear-gradient(180deg, var(--panel-2), rgba(8, 7, 14, 0.98));
      position: fixed;
      right: 14px;
      top: calc(var(--topbar-h) + 10px);
      bottom: 14px;
      width: min(calc(100vw - 28px), var(--rail-w));
      overflow: hidden;
      z-index: 26;
      transform: translateX(calc(100% + 24px));
      transition: transform 180ms ease;
    }

    body.drawer-right-open .rail {
      transform: translateX(0);
    }

    .rail-scroll {
      min-height: 0;
      overflow: auto;
    }

    .drawer-header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .drawer-close {
      padding: 8px 10px;
      border-radius: 10px;
    }

    .status-card,
    .log-entry,
    .outline-entry,
    .integration-status {
      border: 1px solid rgba(201, 164, 79, 0.14);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .status-card strong,
    .integration-status strong {
      display: block;
      margin-bottom: 6px;
    }

    .status-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .status-card-header strong {
      margin-bottom: 0;
    }

    .outline-stack {
      display: grid;
      gap: 8px;
    }

    .outline-entry {
      width: 100%;
      text-align: left;
      color: var(--text);
    }

    .outline-entry[data-depth="2"] { margin-left: 14px; }
    .outline-entry[data-depth="3"] { margin-left: 28px; }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(201, 164, 79, 0.14);
      color: var(--muted);
      font-size: 12px;
    }

    .source-select {
      width: 100%;
      min-width: 0;
    }

    .success { color: var(--success); }
    .danger { color: var(--danger); }
    .warning { color: var(--gold-soft); }
    .file-status-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .file-badge { border-radius: 999px; border: 1px solid rgba(239, 199, 100, 0.24); padding: 2px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .file-badge.changed { border-color: rgba(239, 199, 100, 0.42); color: var(--warning); }
    .file-badge.untracked { border-color: rgba(127, 209, 255, 0.38); color: #9edcff; }
    .diff-summary { margin-top: 10px; padding: 12px; border: 1px solid rgba(239, 199, 100, 0.14); border-radius: 16px; background: rgba(255,255,255,0.02); }
    .diff-summary strong { display: block; margin-bottom: 8px; }
    .diff-summary-list { display: grid; gap: 6px; margin-top: 8px; }
    .diff-summary-item { font-size: 12px; color: var(--muted); }

    .desktop-dropzone {
      position: fixed;
      inset: 18px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      border: 1px dashed rgba(255, 227, 155, 0.34);
      background: rgba(8, 5, 17, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.985);
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 50;
    }

    .desktop-dropzone.visible {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .desktop-drop-card {
      width: min(620px, calc(100vw - 72px));
      padding: 28px;
      border-radius: 26px;
      border: 1px solid rgba(255, 227, 155, 0.28);
      background:
        radial-gradient(circle at top left, rgba(143, 91, 255, 0.2), transparent 42%),
        radial-gradient(circle at bottom right, rgba(239, 199, 100, 0.16), transparent 40%),
        linear-gradient(180deg, rgba(22, 14, 38, 0.96), rgba(10, 8, 18, 0.98));
      text-align: center;
    }

    .desktop-drop-card h2 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      color: var(--gold-soft);
    }

    .desktop-drop-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .desktop-drop-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .agent-result-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .agent-op-item {
      border: 1px solid rgba(201, 164, 79, 0.16);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      color: var(--muted);
    }

    .agent-op-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    .agent-settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .agent-helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .settings-card-grid,
    .theme-preview-grid,
    .tutorial-progress,
    .tutorial-bullet-list {
      display: grid;
      gap: 12px;
    }

    .settings-card-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .appearance-panel {
      margin: 0 18px 16px;
    }

    .appearance-summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .appearance-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .theme-preview-chip {
      border: 1px solid var(--tutorial-card-border);
      border-radius: 18px;
      padding: 14px;
      background: var(--tutorial-card-bg);
      text-align: left;
      color: var(--text);
      font: inherit;
    }

    .theme-preview-chip.active,
    .theme-preview-chip:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .theme-preview-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .theme-preview-bar span {
      display: block;
      height: 16px;
      border-radius: 999px;
    }

    .theme-preview-chip strong,
    .theme-preview-chip div {
      display: block;
    }

    .theme-preview-chip div {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .setting-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .setting-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--purple);
    }

    .setting-inline-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tutorial-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: var(--tutorial-overlay);
      backdrop-filter: blur(18px);
    }

    .tutorial-overlay.visible {
      display: flex;
    }

    .tutorial-dialog {
      width: min(1180px, 100%);
      max-height: min(92vh, 920px);
      overflow: auto;
      border-radius: 28px;
      border: 1px solid var(--tutorial-border);
      background:
        radial-gradient(circle at top right, var(--tutorial-dialog-accent-a), transparent 26%),
        radial-gradient(circle at top left, var(--tutorial-dialog-accent-b), transparent 28%),
        linear-gradient(180deg, rgba(16, 10, 29, 0.98), rgba(7, 6, 14, 0.98));
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
    }

    .tutorial-header,
    .tutorial-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--tutorial-card-border);
    }

    .tutorial-footer {
      border-bottom: none;
      border-top: 1px solid var(--tutorial-card-border);
      flex-wrap: wrap;
    }

    .tutorial-header-copy h2,
    .tutorial-header-copy p {
      margin: 0;
    }

    .tutorial-header-copy p {
      margin-top: 8px;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .tutorial-body {
      display: grid;
      gap: 18px;
      padding: 22px 24px 26px;
    }

    .tutorial-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 16px;
    }

    .tutorial-card {
      border: 1px solid var(--tutorial-card-border);
      border-radius: 22px;
      padding: 18px;
      background: var(--tutorial-card-bg);
    }

    .tutorial-progress {
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
    }

    .tutorial-progress-step {
      border: 1px solid var(--tutorial-card-border);
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 12px;
      text-align: left;
      font: inherit;
    }

    .tutorial-progress-step.active {
      border-color: var(--line-strong);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .tutorial-progress-step.completed {
      border-color: rgba(102, 211, 157, 0.28);
      color: var(--text);
      background: rgba(102, 211, 157, 0.09);
    }

    .tutorial-progress-step strong {
      display: block;
      margin-bottom: 4px;
      color: inherit;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tutorial-guided-card {
      display: grid;
      gap: 14px;
    }

    .tutorial-step-panel[hidden] {
      display: none;
    }

    .tutorial-bullet-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tutorial-bullet {
      border: 1px solid var(--tutorial-card-border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .tutorial-bullet strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
    }

    .tutorial-example-prompt {
      margin: 12px 0 0;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--tutorial-card-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      white-space: pre-wrap;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tutorial-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tutorial-nav.spread {
      justify-content: space-between;
    }

    .tutorial-step-status {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tutorial-step-status strong {
      color: var(--text);
    }

    .tutorial-card h3,
    .tutorial-card h4,
    .tutorial-card p {
      margin: 0;
    }

    .tutorial-card p {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .tutorial-status-grid,
    .tutorial-step-grid,
    .tutorial-playbook-grid,
    .tutorial-action-grid {
      display: grid;
      gap: 12px;
    }

    .tutorial-status-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 14px;
    }

    .tutorial-step-grid,
    .tutorial-playbook-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .tutorial-action-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 14px;
    }

    .tutorial-step,
    .tutorial-status,
    .tutorial-playbook {
      border: 1px solid var(--tutorial-card-border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .tutorial-step strong,
    .tutorial-status strong,
    .tutorial-playbook strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
    }

    .tutorial-step div,
    .tutorial-status div,
    .tutorial-playbook div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .tutorial-checklist {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .tutorial-check {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .tutorial-check::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), var(--purple));
      box-shadow: 0 0 14px var(--brand-glow);
    }

    .tutorial-preset {
      width: 100%;
      text-align: left;
      border: 1px solid var(--tutorial-card-border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--text);
    }

    .tutorial-preset strong {
      display: block;
      margin-bottom: 6px;
    }

    .tutorial-preset span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .tutorial-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      max-width: 740px;
    }

    @media (max-width: 1320px) {
      :root { --sidebar-w: 250px; --rail-w: 330px; }
    }

    @media (max-width: 1120px) {
      html,
      body { overflow: auto; }
      .workspace-shell { grid-template-columns: 1fr; }
      .sidebar,
      .rail {
        top: 12px;
        bottom: 12px;
        width: min(calc(100vw - 24px), 420px);
      }
      .editor-shell {
        grid-template-columns: 1fr;
        grid-template-areas: "editor" "preview";
      }
      .splitter { display: none; }
      .preview-pane {
        border-left: none;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 760px) {
      .shell-header { padding: 14px; }
      .brand-subtitle { max-width: 70vw; }
      .header-actions { justify-content: flex-start; }
      .field-grid { grid-template-columns: 1fr; }
      .agent-settings-grid { grid-template-columns: 1fr; }
      .settings-card-grid,
      .theme-preview-grid {
        grid-template-columns: 1fr;
      }
      .tutorial-hero,
      .tutorial-step-grid,
      .tutorial-playbook-grid,
      .tutorial-action-grid,
      .tutorial-status-grid {
        grid-template-columns: 1fr;
      }
    }
  

    /* --- SKYDEXIA 2.6 HARDENED LAYOUT OVERRIDES --- */
    body { --layout-left: 300px; --layout-right: 380px; }
    body.layout-left-collapsed { --layout-left: 76px; }
    body.layout-right-collapsed { --layout-right: 76px; }
    body.layout-left-floating { --layout-left: 0px; }
    body.layout-right-floating { --layout-right: 0px; }

    .drawer-backdrop { display: none !important; }

    body:not(.embed) .workspace-shell {
      grid-template-columns: var(--layout-left) minmax(0, 1fr) var(--layout-right);
      align-items: start;
      gap: 14px;
      padding: 14px;
    }

    .sidebar,
    .rail {
      position: sticky !important;
      top: 14px !important;
      left: auto !important;
      right: auto !important;
      bottom: auto !important;
      width: auto !important;
      min-width: 0;
      transform: none !important;
      z-index: 10;
      max-height: calc(100vh - var(--topbar-h) - 42px);
      overflow: hidden;
      transition: width 180ms ease, max-height 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      resize: horizontal;
    }

    .sidebar.floating,
    .rail.floating {
      position: fixed !important;
      top: calc(var(--topbar-h) + 14px) !important;
      width: min(430px, calc(100vw - 28px)) !important;
      max-height: calc(100vh - var(--topbar-h) - 28px);
      z-index: 70;
      resize: both;
      overflow: auto;
      box-shadow: 0 28px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .sidebar.floating { left: 14px !important; right: auto !important; }
    .rail.floating { right: 14px !important; left: auto !important; }

    .sidebar .panel-header,
    .rail .panel-header {
      position: sticky;
      top: 0;
      z-index: 4;
      backdrop-filter: blur(18px);
    }

    .sidebar.floating .panel-header,
    .rail.floating .panel-header { cursor: grab; }
    body.dragging-pane .sidebar.floating .panel-header,
    body.dragging-pane .rail.floating .panel-header { cursor: grabbing; }

    .sidebar.is-collapsed,
    .rail.is-collapsed {
      resize: none;
      overflow: hidden;
    }

    .sidebar.is-collapsed > :not(.panel-header),
    .rail.is-collapsed > :not(.panel-header) {
      display: none !important;
    }

    .sidebar.is-collapsed .panel-header,
    .rail.is-collapsed .panel-header {
      padding: 14px 12px;
      min-height: 100px;
      align-items: flex-start;
    }

    .sidebar.is-collapsed .panel-subtitle,
    .rail.is-collapsed .panel-subtitle,
    .sidebar.is-collapsed .eyebrow,
    .rail.is-collapsed .eyebrow {
      display: none;
    }

    .sidebar.is-collapsed .panel-title,
    .rail.is-collapsed .panel-title {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 14px;
      letter-spacing: 0.12em;
    }

    .pane-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pane-mini {
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1;
    }

    .pane-mini:hover {
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.09);
    }

    .workspace-panel { min-width: 0; }

    .shell-header {
      position: sticky;
      top: 0;
    }

    .header-actions {
      row-gap: 8px;
    }

    @media (max-width: 1560px) {
      body:not(.embed) .workspace-shell {
        grid-template-columns: var(--layout-left) minmax(0, 1fr);
      }
      .rail {
        grid-column: 1 / -1;
        position: relative !important;
        top: 0 !important;
        max-height: none;
        resize: vertical;
      }
      body.layout-right-floating .rail { position: fixed !important; }
    }

    @media (max-width: 1180px) {
      body:not(.embed) .workspace-shell {
        grid-template-columns: 1fr;
      }
      .sidebar,
      .rail {
        grid-column: 1 / -1;
        position: relative !important;
        top: 0 !important;
        max-height: none;
        resize: vertical;
      }
      body.layout-left-floating .sidebar,
      body.layout-right-floating .rail {
        position: fixed !important;
      }
      .editor-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(360px, 52vh) 12px minmax(320px, 40vh);
      }
      .splitter {
        width: 100%;
        height: 12px;
        cursor: row-resize;
      }
      .splitter::before {
        width: 72px;
        height: 4px;
      }
    }



    /* --- SKYDEXIA 2.6 FOCUS MODE UI REBUILD --- */
    :root {
      --topbar-h: 56px;
      --launcher-gap: 10px;
    }

    .shell {
      grid-template-rows: var(--topbar-h) 1fr;
    }

    .shell-header {
      padding: 10px 14px;
      min-height: var(--topbar-h);
      gap: 12px;
      backdrop-filter: blur(20px);
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
    }

    .brand-title { font-size: 16px; }
    .brand-subtitle { display: none; }

    .header-actions {
      position: fixed;
      right: 16px;
      bottom: 84px;
      width: min(300px, calc(100vw - 32px));
      max-height: min(72vh, 680px);
      overflow: auto;
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(239, 199, 100, 0.18);
      background: linear-gradient(180deg, rgba(24, 16, 41, 0.98), rgba(8, 7, 14, 0.98));
      box-shadow: 0 28px 80px rgba(0,0,0,0.48);
      display: grid;
      grid-template-columns: 1fr;
      justify-content: stretch;
      align-content: start;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px) scale(0.98);
      transition: opacity 170ms ease, transform 170ms ease;
      z-index: 72;
    }

    .actions-panel-title {
      display: none;
      width: 100%;
      margin: 0 0 2px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    body.global-actions-open .header-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .header-actions .chip,
    .header-actions .ghost,
    .header-actions .primary {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      display: flex;
      align-items: center;
      min-height: 44px;
    }

    body:not(.global-actions-open) .header-actions .chip {
      display: none;
    }

    body.global-actions-open .actions-panel-title {
      display: block;
    }

    .drawer-backdrop {
      opacity: 0;
      pointer-events: none;
      display: block !important;
      z-index: 60;
    }

    body.pane-left-open .drawer-backdrop,
    body.pane-right-open .drawer-backdrop,
    body.global-actions-open .drawer-backdrop,
    body.view-tools-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    body:not(.embed) .workspace-shell {
      grid-template-columns: 1fr !important;
      gap: 0;
      padding: 8px 10px 10px;
      align-items: stretch;
    }

    .workspace-panel {
      grid-template-rows: 1fr;
      border-radius: 24px;
      overflow: hidden;
    }

    .workspace-toolbar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translate(-50%, 18px) scale(0.98);
      width: min(760px, calc(100vw - 32px));
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(239, 199, 100, 0.18);
      background: linear-gradient(180deg, rgba(22, 16, 39, 0.98), rgba(7, 6, 13, 0.98));
      box-shadow: 0 28px 80px rgba(0,0,0,0.46);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      z-index: 72;
      opacity: 0;
      pointer-events: none;
      transition: opacity 170ms ease, transform 170ms ease;
    }

    body.view-tools-open .workspace-toolbar {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
    }

    .workspace-toolbar .action-stack {
      grid-column: 1 / -1;
      display: flex !important;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .editor-shell {
      height: calc(100vh - var(--topbar-h) - 30px);
    }

    .sidebar,
    .rail {
      position: fixed !important;
      top: calc(var(--topbar-h) + 10px) !important;
      bottom: 10px !important;
      max-height: calc(100vh - var(--topbar-h) - 20px);
      width: min(420px, calc(100vw - 22px)) !important;
      resize: both;
      overflow: auto;
      z-index: 70;
      opacity: 0;
      pointer-events: none;
      transition: transform 180ms ease, opacity 180ms ease;
      box-shadow: 0 30px 84px rgba(0,0,0,0.5);
    }

    .sidebar {
      left: 10px !important;
      right: auto !important;
      transform: translateX(-18px) scale(0.985);
    }

    .rail {
      right: 10px !important;
      left: auto !important;
      transform: translateX(18px) scale(0.985);
    }

    body.pane-left-open .sidebar,
    body.pane-right-open .rail,
    .sidebar.floating,
    .rail.floating {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .sidebar.is-hidden,
    .rail.is-hidden {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(14px) scale(0.98) !important;
    }

    .sidebar.floating,
    .rail.floating {
      width: min(460px, calc(100vw - 22px)) !important;
    }

    .sidebar .panel-header,
    .rail .panel-header {
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .corner-launcher {
      position: fixed;
      right: 14px;
      bottom: 14px;
      display: grid;
      gap: var(--launcher-gap);
      z-index: 74;
    }

    .dock-btn {

    function readStandaloneToken() {
      return String(window.SkyeStandaloneSession?.readToken?.() || "").trim();
    }

    function readStandaloneTokenEmail() {
      return String(window.SkyeStandaloneSession?.readTokenEmail?.() || "").trim().toLowerCase();
    }

    function normalizeAccessPayload(value) {
      const source = value && typeof value === 'object' ? value : {};
      const role = ['owner', 'operator', 'viewer'].includes(String(source.role || '').trim())
        ? String(source.role || '').trim()
        : 'viewer';
      const capabilities = Array.isArray(source.capabilities)
        ? source.capabilities.map((entry) => String(entry || '').trim()).filter(Boolean)
        : (ACCESS_ROLE_CAPABILITIES[role] || []).slice();
      return {
        authenticated: Boolean(source.authenticated),
        actor: String(source.actor || '').trim() || null,
        role,
        capabilities,
        founder_gateway: Boolean(source.founder_gateway),
      };
    }

    function localAccessProfile() {
      const token = readStandaloneToken();
      const role = state.founderGatewayActive ? 'owner' : (token ? 'owner' : 'viewer');
      return normalizeAccessPayload({
        authenticated: Boolean(token || state.founderGatewayActive),
        actor: readStandaloneTokenEmail() || null,
        role,
        capabilities: ACCESS_ROLE_CAPABILITIES[role] || [],
        founder_gateway: Boolean(state.founderGatewayActive),
      });
    }

    function hasAccessCapability(capability) {
      const access = state.access && typeof state.access === 'object' ? state.access : normalizeAccessPayload(null);
      if (!access.authenticated) return false;
      return Array.isArray(access.capabilities) && access.capabilities.includes(String(capability || '').trim());
    }

    function describeAccessCapability(capability) {
      const labels = {
        'runtime.mutate': 'runtime mutation access',
        'git.mutate': 'Git mutation access',
        'release.mutate': 'release execution access',
        'release.admin': 'release connector and secret admin access',
      };
      return labels[String(capability || '').trim()] || String(capability || 'access').trim() || 'access';
    }

    function applyRoleAwareAvailability() {
      ROLE_AWARE_CONTROL_RULES.forEach((rule) => {
        const element = $(rule.id);
        if (!element) return;
        const allowed = hasAccessCapability(rule.capability);
        if (!element.dataset.originalTitle) element.dataset.originalTitle = element.title || '';
        element.disabled = !allowed;
        element.title = allowed
          ? (element.dataset.originalTitle || '')
          : `Current role ${state.access?.role || 'viewer'} does not have ${describeAccessCapability(rule.capability)}.`;
      });
    }

    function clearFounderGatewayKeyStorage() {
      try {
        sessionStorage.removeItem("kx.auth.founderGatewayKey");
      } catch {
        // ignore storage failures
      }
      try {
        localStorage.removeItem("kx.auth.founderGatewayKey");
      } catch {
        // ignore storage failures
      }
    }

    function updateAccessChip() {
      const chip = $("accessChip");
      if (!chip) return;
      const access = state.access && typeof state.access === 'object' ? state.access : localAccessProfile();
      const email = access.actor || readStandaloneTokenEmail();
      if (access.authenticated) {
        chip.textContent = "access: " + String(access.role || 'viewer') + (access.founder_gateway ? " · founder unlocked" : "") + (email ? " · " + email : "");
        return;
      }
      chip.textContent = "access: locked";
    }

    async function activateFounderGateway(options = {}) {
      const settings = options || {};
      const promptedKey = settings.prompt === false
        ? ""
        : window.prompt("Enter Founders_GateWay_Key for this browser origin. SkyDexia will not store the raw founder key in browser storage.", "");
      const founderKey = String(settings.key || promptedKey || "").trim();
      if (!founderKey) {
        if (!settings.silent) setStatus("Founder gateway idle", "No founder key was provided.", "info");
        return null;
      }
      try {
        const response = await fetch("/api/auth-founder-gateway", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key: founderKey }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload?.error || "Founder gateway activation failed.");
        state.founderGatewayActive = Boolean(payload?.founder_gateway);
        state.access = normalizeAccessPayload(payload?.access || localAccessProfile());
        clearFounderGatewayKeyStorage();
        updateAccessChip();
        applyRoleAwareAvailability();
        if (!settings.silent) {
          setStatus(
            "Founder gateway active",
            payload?.onboarding?.message || "Owner session and unlocked runtime key restored for this browser origin. The raw founder key was not retained in browser storage.",
            "success"
          );
        }
        return payload;
      } catch (error) {
        state.founderGatewayActive = false;
        state.access = localAccessProfile();
        updateAccessChip();
        applyRoleAwareAvailability();
        if (!settings.silent) {
          setStatus(
            "Founder gateway unavailable",
            error instanceof Error ? error.message : "Founder gateway activation failed.",
            "warning"
          );
        }
        throw error;
      }
    }

    async function ensureFounderGatewayAccess() {
      if (state.founderGatewayActive || readStandaloneToken()) {
        state.access = state.access?.authenticated ? state.access : localAccessProfile();
        updateAccessChip();
        applyRoleAwareAvailability();
        return false;
      }
      state.access = localAccessProfile();
      updateAccessChip();
      applyRoleAwareAvailability();
      return false;
    }

    function tutorialStepElements() {
      return Array.from(document.querySelectorAll("[data-tutorial-step]"));
    }

    function tutorialProgressElements() {
      return Array.from(document.querySelectorAll("[data-tutorial-progress]"));

    function updateTutorialStepUi() {
      const steps = tutorialStepElements();
      const safeIndex = Math.max(0, Math.min(steps.length - 1, tutorialState.currentStep));
      tutorialState.currentStep = safeIndex;
      steps.forEach((step, index) => {
        step.hidden = index !== safeIndex;
      });
      tutorialProgressElements().forEach((step, index) => {
        step.classList.toggle("active", index === safeIndex);
        step.classList.toggle("completed", index < safeIndex);
        step.setAttribute("aria-current", index === safeIndex ? "step" : "false");
      });
      const activeStep = steps[safeIndex];
      const label = activeStep?.dataset.stepLabel || `Step ${safeIndex + 1}`;
      const note = activeStep?.dataset.stepNote || "Follow these in order when you are setting up a project for the first time.";
      if ($("tutorialStepStatus")) {
        $("tutorialStepStatus").innerHTML = `<strong>Step ${safeIndex + 1} of ${steps.length}</strong> · ${escapeHtml(label)}`;
      }
      if ($("tutorialFooterNote")) {
        $("tutorialFooterNote").textContent = note;
      }
      if ($("tutorialPrevBtn")) {
        $("tutorialPrevBtn").disabled = safeIndex === 0;
      }

    function escapeHtml(value) {

    function isGitRoute(url) {

    function buildGitRequestError(url, method, payload, response) {
      const message = String(payload?.message || payload?.error || `${method} ${url} failed.`).trim() || `${method} ${url} failed.`;
      const error = new Error(message);
      error.gitRoute = String(payload?.route || url || '').trim() || String(url || '').trim();
      error.gitCode = String(payload?.code || `git.route.${Number(response?.status || 500) || 500}`).trim();
      error.retryable = Boolean(payload?.retryable === true || Number(response?.status || 0) >= 500);
      error.statusCode = Number(response?.status || 500) || 500;
      error.details = payload?.details && typeof payload.details === 'object' ? payload.details : null;
      error.gitPayload = payload && typeof payload === 'object' ? payload : null;
      error.isGitActionError = true;
      return error;
    }

    function describeGitActionBusEvent(event) {
      const title = String(event?.title || 'git action').trim() || 'git action';
      const detail = String(event?.detail || '').trim();

    function recordGitActionEvent(title, detail, tone = 'info', extra = {}) {
      const bus = Array.isArray(state.gitWorkspace.actionBus) ? state.gitWorkspace.actionBus : [];
      bus.unshift({
        title: String(title || 'Git action').trim() || 'Git action',
        detail: String(detail || '').trim(),

    function getGitRecoverySuggestions(error) {
      const message = String(error?.message || '').toLowerCase();
      const code = String(error?.gitCode || error?.code || '').toLowerCase();
      const route = String(error?.gitRoute || '').toLowerCase();
      const suggestions = [];

      if (/fetch first|non-fast-forward|rejected/.test(message)) {
        suggestions.push('Run Fetch or Fetch All first, inspect ahead/behind state, then retry push after pull or rebase.');
      }
      if (/force-with-lease|lease/.test(message)) {
        suggestions.push('Refresh remote state before retrying force-with-lease so the lease matches the current upstream tip.');
      }
      if (/upstream/.test(message)) {
        suggestions.push('Use Set Upstream or switch push upstream behavior to auto or always before retrying the push.');
      }
      if (/conflict/.test(message) || /rebase_in_progress|cherry_pick_in_progress/.test(code)) {
        suggestions.push('Refresh Operation State and Conflicts, resolve the listed files, then continue or abort the in-progress history action.');
      }
      if (/timeout/.test(code) || /timeout/.test(message)) {
        suggestions.push('Retry the mutation if the workspace is still healthy, then refresh Operation State to confirm whether Git left an in-progress action behind.');
      }
      if (/protected tag|protect_tag|delete_protected_tag/.test(message) || /tag/.test(route) && /protected/.test(message)) {
        suggestions.push('Use the protected-tag override field only when the release ref change is intentional, otherwise switch to a non-protected tag name.');
      }
      if (/remote urls must use an allowed git transport/.test(message)) {
        suggestions.push('Use an https, ssh, git transport, scp-style Git URL, or a valid local filesystem path for the remote.');
      }
      if (/hard reset requires/.test(message) || /clean requires typing clean/.test(message) || /requires either an allowlisted path or the allow-all toggle/.test(message)) {
        suggestions.push('Fill the explicit confirmation field or allowlist before retrying the destructive action.');
      }
      if (/branch is required|tag name is required|source and target refs are required|commit sha is required|conflict path is required/.test(message)) {
        suggestions.push('Complete the required Git form fields before retrying the action.');
      }
      if (!suggestions.length && route.includes('/api/git/fetch')) {
        suggestions.push('Refresh Git status and remotes, then retry the fetch against a known remote.');
      }
      if (!suggestions.length && route.includes('/api/git/')) {
        suggestions.push('Refresh Git status, inspect the latest history-operation rows, and retry only after the workspace state matches the intended action.');
      }
      return suggestions.slice(0, 3);
    }

    function handleGitActionError(error) {
      const suggestions = getGitRecoverySuggestions(error);
      const route = String(error?.gitRoute || '').trim();
      const code = String(error?.gitCode || error?.code || '').trim();
      const detailParts = [String(error?.message || 'Git action failed.').trim() || 'Git action failed.'];
      if (route) detailParts.push(`route=${route}`);
      if (code) detailParts.push(`code=${code}`);
      if (error?.retryable === true) detailParts.push('retryable=yes');
      state.gitWorkspace.lastFailure = {
        message: String(error?.message || 'Git action failed.').trim() || 'Git action failed.',
        route,
        code,
        retryable: error?.retryable === true,
        statusCode: Number(error?.statusCode || 0) || null,
        suggestions,
        details: error?.details && typeof error.details === 'object' ? error.details : null,
        payload: error?.gitPayload && typeof error.gitPayload === 'object' ? error.gitPayload : null,
        at: new Date().toISOString(),
      };
      recordGitActionEvent('Git action failed', detailParts.join(' · '), 'error', {
        route,
        code,
        retryable: error?.retryable === true,
      });
      renderGitWorkspaceDeck();
      setStatus('Git action failed', suggestions.length ? `${state.gitWorkspace.lastFailure.message} ${suggestions[0]}` : state.gitWorkspace.lastFailure.message, 'error');
    }

    function clearGitFailureState() {

    function toggleGitFailureInspector(forceOpen) {

    function formatGitEventTime(value) {
      if (!value) return 'unknown';
      const stamp = new Date(value);
      if (Number.isNaN(stamp.getTime())) return 'unknown';
      return stamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatGitFailureInspectorPayload(failure) {
      if (!failure || typeof failure !== 'object') return 'No Git failure payload captured yet.';
      return JSON.stringify({
        message: failure.message || '',
        route: failure.route || '',
        code: failure.code || '',
        retryable: failure.retryable === true,
        status_code: Number(failure.statusCode || 0) || null,
        occurred_at: failure.at || null,
        suggestions: Array.isArray(failure.suggestions) ? failure.suggestions : [],
        details: failure.details && typeof failure.details === 'object' ? failure.details : null,
        payload: failure.payload && typeof failure.payload === 'object' ? failure.payload : null,
      }, null, 2);
    }

    function getGitRecoveryActions(git) {
      const failure = git?.lastFailure && typeof git.lastFailure === 'object' ? git.lastFailure : null;
      const operationState = git?.operationState && typeof git.operationState === 'object' ? git.operationState : {};
      const conflicts = git?.conflicts && typeof git.conflicts === 'object' ? git.conflicts : { has_conflicts: false, count: 0, files: [] };
      const message = String(failure?.message || '').toLowerCase();
      const code = String(failure?.code || '').toLowerCase();
      const route = String(failure?.route || '').toLowerCase();
      const actions = [];
      const seen = new Set();

      function push(id, label, reason) {
        if (!id || seen.has(id)) return;
        seen.add(id);
        actions.push({ id, label, reason });
      }

      if (!failure) return actions;

      push('refresh-status', 'Refresh Status', 'Re-read branch, ahead/behind, and workspace change telemetry.');
      push('operation-state', 'Refresh Operation State', 'Check whether Git left rebase, cherry-pick, revert, or merge state open.');

      if (conflicts.has_conflicts || /conflict/.test(message) || /rebase_in_progress|cherry_pick_in_progress|merge_in_progress/.test(code)) {
        push('detect-conflicts', 'Detect Conflicts', 'Refresh the machine-readable conflict summary before continuing or aborting history operations.');
      }
      if (/fetch first|non-fast-forward|rejected/.test(message) || route.includes('/api/git/push')) {
        push('fetch', 'Fetch', 'Refresh remote refs before retrying the push.');
        push('fetch-all', 'Fetch All', 'Refresh every configured remote if the upstream tip may have changed elsewhere.');
      }
      if (/upstream/.test(message) || route.includes('/api/git/tracking') || route.includes('/api/git/push')) {
        push('tracking', 'Branch Tracking', 'Inspect the current upstream mapping before changing push behavior.');
        push('set-upstream', 'Set Upstream', 'Attach the current branch to the configured remote branch.');
      }
      if (/remote/.test(message) || route.includes('/api/git/remotes')) {
        push('remotes', 'Refresh Remotes', 'Reload fetch and push URLs from the repository config.');
      }
      if (operationState.rebase_in_progress) {
        push('rebase-continue', 'Continue Rebase', 'Continue the active rebase after conflict resolution.');
        push('rebase-abort', 'Abort Rebase', 'Abort the active rebase and return to the pre-rebase graph.');
      }
      if (operationState.cherry_pick_in_progress) {
        push('cherry-pick-continue', 'Continue Cherry-Pick', 'Continue the active cherry-pick after resolving conflicts.');
        push('cherry-pick-abort', 'Abort Cherry-Pick', 'Abort the active cherry-pick and restore the original state.');
      }
      if (route.includes('/api/git/tag')) {
        push('tag-list', 'Refresh Tag List', 'Reload tag state after protected-tag or naming failures.');
      }

      return actions.slice(0, 6);
    }

    async function runGitRecoveryAction(actionId) {
      switch (actionId) {
        case 'refresh-status':
          return refreshGitWorkspaceStatus();
        case 'operation-state':
          return refreshWorkspaceOperationState();
        case 'detect-conflicts':
          return detectWorkspaceGitConflicts();
        case 'fetch':
          return fetchWorkspaceRepository();
        case 'fetch-all':
          return fetchAllWorkspaceRepository();
        case 'tracking':
          return refreshWorkspaceBranchTracking();
        case 'set-upstream':
          return setWorkspaceBranchTracking();
        case 'remotes':
          return refreshWorkspaceRemotes();
        case 'rebase-continue':
          return continueWorkspaceRebase();
        case 'rebase-abort':
          return abortWorkspaceRebase();
        case 'cherry-pick-continue':
          return continueWorkspaceCherryPick();
        case 'cherry-pick-abort':
          return abortWorkspaceCherryPick();
        case 'tag-list':
          return refreshWorkspaceTagList();
        default:
          throw new Error(`Unknown Git recovery action: ${actionId}`);
      }
    }

    function handleGitRecoveryActionBarClick(event) {

      if (!button) return;

    function slugify(value) {
      return String(value || "draft")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "draft";
    }

    function getFile(path) {
      return state.files.find((file) => file.path === path) || null;
    }

    function cloneFiles(files) {
      return (Array.isArray(files) ? files : []).map((file) => ({ path: String(file.path || ""), content: typeof file.content === "string" ? file.content : "" }));
    }

    function buildFileMap(files) {
      return new Map(cloneFiles(files).map((file) => [file.path, file.content]));
    }

    function normalizeAgentOperations(operations) {
      return (Array.isArray(operations) ? operations : []).map((operation) => {
        const type = String(operation?.type || "").trim().toLowerCase();
        if (type === "rename") {
          return {
            type,
            from: String(operation?.from || "").replace(/^\/+/, "").trim(),
            to: String(operation?.to || "").replace(/^\/+/, "").trim(),
          };
        }
        return {
          type,
          path: String(operation?.path || "").replace(/^\/+/, "").trim(),
          content: typeof operation?.content === "string" ? operation.content : "",
        };
      }).filter((operation) => {
        if (operation.type === "rename") return operation.from && operation.to && operation.from !== operation.to;
        return operation.path && ["create", "update", "delete"].includes(operation.type);
      });
    }

    function isProtectedAgentPath(path) {
      const value = String(path || "").replace(/\\/g, "/").replace(/^\/+/, "").trim();
      if (!value || value.includes("..") || value.startsWith("/")) return true;
      if (/(^|\/)\.git(\/|$)/i.test(value)) return true;
      if (/(^|\/)node_modules(\/|$)/i.test(value)) return true;
      if (/(^|\/)\.env($|\.)/i.test(value)) return true;
      if (/(^|\/)(secret|secrets|credentials?|tokens?)(\/|$)/i.test(value)) return true;
      if (/\.(pem|p12|crt|key)$/i.test(value)) return true;
      return false;
    }

    function applyAgentOperationPolicy(operations, options = {}) {
      const maxOps = Math.max(1, Math.min(Number(options.operationBudget || 32) || 32, 96));
      const perFileBytesLimit = Number(options.perFileBytesLimit || 120000) || 120000;
      const totalBytesLimit = Number(options.totalBytesLimit || 240000) || 240000;
      const normalized = normalizeAgentOperations(operations);
      const accepted = [];
      const blocked = [];
      let totalBytes = 0;
      normalized.forEach((operation) => {
        if (accepted.length >= maxOps) {
          blocked.push({ operation, reason: `operation budget exceeded (${maxOps})` });
          return;
        }
        const targetPath = operation.type === "rename" ? operation.to : operation.path;
        if (isProtectedAgentPath(targetPath) || (operation.type === "rename" && isProtectedAgentPath(operation.from))) {
          blocked.push({ operation, reason: "protected or out-of-bounds path" });
          return;
        }
        if (operation.type === "create" || operation.type === "update") {
          const bytes = new TextEncoder().encode(String(operation.content || "")).length;
          if (bytes > perFileBytesLimit) {
            blocked.push({ operation, reason: `per-file byte limit exceeded (${perFileBytesLimit})` });
            return;
          }
          if (totalBytes + bytes > totalBytesLimit) {
            blocked.push({ operation, reason: `total mutation byte limit exceeded (${totalBytesLimit})` });
            return;
          }
          totalBytes += bytes;
        }
        accepted.push(operation);
      });
      const counts = accepted.reduce((acc, operation) => {
        acc[operation.type] = (acc[operation.type] || 0) + 1;
        return acc;
      }, {});
      return { operations: accepted, blocked, counts, policy: { maxOps, perFileBytesLimit, totalBytesLimit } };
    }

    function hashText(value) {
      let hash = 2166136261;
      const source = String(value || "");
      for (let index = 0; index < source.length; index += 1) {
        hash ^= source.charCodeAt(index);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return (hash >>> 0).toString(16).padStart(8, "0");
    }

    function buildOperationEvidence(operations, beforeMap, afterMap) {
      const touched = [];
      operations.forEach((operation) => {
        if (operation.type === "rename") {
          touched.push({
            type: operation.type,
            from: operation.from,
            to: operation.to,
            before_hash: hashText(beforeMap.get(operation.from) || ""),
            after_hash: hashText(afterMap.get(operation.to) || ""),
          });
          return;
        }
        if (operation.type === "delete") {
          touched.push({
            type: operation.type,
            path: operation.path,
            before_hash: hashText(beforeMap.get(operation.path) || ""),
            after_hash: null,
          });
          return;
        }
        touched.push({
          type: operation.type,
          path: operation.path,
          before_hash: hashText(beforeMap.get(operation.path) || ""),
          after_hash: hashText(afterMap.get(operation.path) || ""),
        });
      });
      return touched;
    }

    function simulateAgentOperations(operations, files = state.files) {
      const nextMap = new Map(cloneFiles(files).map((file) => [file.path, { ...file }]));
      const conflicts = [];
      operations.forEach((operation, index) => {
        const id = `${index + 1}. ${describeAgentOperation(operation)}`;
        if (operation.type === "rename") {
          if (!nextMap.has(operation.from)) {
            conflicts.push({ index, operation: id, reason: `rename source missing (${operation.from})` });
            return;
          }
          if (nextMap.has(operation.to)) {
            conflicts.push({ index, operation: id, reason: `rename destination already exists (${operation.to})` });
            return;
          }
          const existing = nextMap.get(operation.from);
          nextMap.delete(operation.from);
          nextMap.set(operation.to, { path: operation.to, content: existing?.content || "" });
          return;
        }
        if (operation.type === "delete") {
          if (!nextMap.has(operation.path)) {
            conflicts.push({ index, operation: id, reason: `delete target missing (${operation.path})` });
            return;
          }
          nextMap.delete(operation.path);
          return;
        }
        if (operation.type === "create") {
          if (nextMap.has(operation.path)) {
            conflicts.push({ index, operation: id, reason: `create target already exists (${operation.path})` });
            return;
          }
          nextMap.set(operation.path, { path: operation.path, content: operation.content || "" });
          return;
        }
        if (operation.type === "update") {
          if (!nextMap.has(operation.path)) {
            conflicts.push({ index, operation: id, reason: `update target missing (${operation.path})` });
            return;
          }
          nextMap.set(operation.path, { path: operation.path, content: operation.content || "" });
        }
      });
      return {
        ok: conflicts.length === 0,
        conflictCount: conflicts.length,
        conflicts,
        simulatedFileCount: nextMap.size,
      };
    }

    function describeAgentOperation(operation) {
      if (operation.type === "rename") return `${operation.type}: ${operation.from} -> ${operation.to}`;
      return `${operation.type}: ${operation.path}`;

    function inferRequestedAppStack(prompt, selected = "auto") {
      const stack = String(selected || "auto").trim().toLowerCase();
      if (stack && stack !== "auto") return stack;
      const text = String(prompt || "").toLowerCase();
      if (/\bnode\b|\bapi\b|express|fastify|server\b/.test(text)) return "node-api";
      if (/\bvue\b/.test(text)) return "vue";
      if (/\breact\b/.test(text)) return "react";
      if (/\bdocs?\b|documentation|readme|guide/.test(text)) return "docs";
      return "vanilla";
    }

    function extractAppSpec(prompt, stack) {
      const text = String(prompt || "").trim();
      const parts = text
        .split(/\n|\.|;|\|/)
        .map((entry) => entry.trim())
        .filter((entry) => entry.length >= 4);
      const pick = (regex, limit = 5) => parts.filter((entry) => regex.test(entry)).slice(0, limit);
      const routes = Array.from(new Set((text.match(/\/[a-z0-9_/-]+/gi) || []).map((value) => value.toLowerCase()))).slice(0, 8);
      const entities = pick(/\b(user|account|project|task|ticket|order|product|customer|invoice|session|message|profile|team|workspace)\b/i);
      const tests = pick(/\b(test|spec|coverage|regression|smoke|integration|unit)\b/i);
      const dataModel = pick(/\b(database|schema|table|model|entity|store|cache|postgres|sqlite|mysql|redis|json)\b/i);
      const goals = parts.slice(0, 6);
      return {
        goals,
        entities,
        routes,
        data_model: dataModel,
        tests,
        stack,
      };
    }

    let sknorePreviewTimer = null;

    function countLines(value) {
      const text = typeof value === "string" ? value : "";
      if (!text) return 0;
      return text.split("\n").length;
    }

    function computeSnapshotDiff(baselineFiles = state.baselineFiles) {
      const current = buildFileMap(state.files);
      const baseline = buildFileMap(baselineFiles);
      const changed = [];
      const untracked = [];
      const deleted = [];
      let addedLines = 0;
      let removedLines = 0;
      let touchedLines = 0;

      current.forEach((content, path) => {
        if (!baseline.has(path)) {
          untracked.push(path);
          addedLines += countLines(content);
          touchedLines += countLines(content);
        } else if (baseline.get(path) !== content) {
          changed.push(path);
          const beforeLines = countLines(baseline.get(path));
          const afterLines = countLines(content);
          addedLines += Math.max(0, afterLines - beforeLines);
          removedLines += Math.max(0, beforeLines - afterLines);
          touchedLines += Math.max(beforeLines, afterLines);
        }
      });
      baseline.forEach((_, path) => {
        if (!current.has(path)) {
          deleted.push(path);
          removedLines += countLines(baseline.get(path));
          touchedLines += countLines(baseline.get(path));
        }
      });

      return { changed, untracked, deleted, addedLines, removedLines, touchedLines };
    }

    function activeSourceBaselineFiles() {
      if (state.integrationStatus.skyedrive?.connected && Array.isArray(state.sourceBaselineFiles) && state.sourceBaselineFiles.length) {
        return state.sourceBaselineFiles;
      }
      return state.baselineFiles;
    }

    function fileStatus(path) {
      const diff = computeSnapshotDiff();
      if (diff.untracked.includes(path)) return "untracked";
      if (diff.changed.includes(path)) return "changed";
      return "clean";
    }

    function fileLanguage(path) {
      if (/\.tsx?$/.test(path)) return "typescript";
      if (/\.jsx$/.test(path)) return "javascript";
      if (/\.json$/.test(path)) return "json";
      if (/\.css$/.test(path)) return "css";
      if (/\.html?$/.test(path)) return "html";
      if (/\.md$/.test(path)) return "markdown";
      if (/\.sql$/.test(path)) return "sql";
      if (/\.ya?ml$/.test(path)) return "yaml";
      if (/\.js$/.test(path)) return "javascript";
      return "plaintext";
    }

    function splitArgsText(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function safeParseJsonContent(text, fallback = null) {
      try {
        return JSON.parse(String(text || ''));
      } catch {
        return fallback;
      }
    }

    function normalizeWorkbenchRuntimeConfig(runtime) {
      if (!runtime || typeof runtime !== 'object') return null;
      const command = String(runtime.command || '').trim();
      if (!command) return null;
      const stopRecipe = runtime.stop_recipe && typeof runtime.stop_recipe === 'object'
        ? {
            command: String(runtime.stop_recipe.command || '').trim(),
            args: Array.isArray(runtime.stop_recipe.args) ? runtime.stop_recipe.args.map((entry) => String(entry || '').trim()).filter(Boolean) : splitArgsText(runtime.stop_recipe.args),
            cwd_relative: String(runtime.stop_recipe.cwd_relative || runtime.stop_recipe.cwd || '.').trim() || '.',
            wait_ms: Number(runtime.stop_recipe.wait_ms || 0) || 4000,
          }
        : null;
      return {
        command,
        args: Array.isArray(runtime.args) ? runtime.args.map((entry) => String(entry || '').trim()).filter(Boolean) : splitArgsText(runtime.args),
        cwd_relative: String(runtime.cwd_relative || runtime.cwd || '.').trim() || '.',
        port: Number(runtime.port || 0) || 0,
        launch_url: String(runtime.launch_url || runtime.launchUrl || '').trim(),
        probe_path: String(runtime.probe_path || runtime.probePath || '/').trim() || '/',
        probe_contains_text: String(runtime.probe_contains_text || runtime.probeContainsText || '').trim(),
        env_text: String(runtime.env_text || '').trim(),
        stop_recipe: stopRecipe && stopRecipe.command ? stopRecipe : null,
      };
    }

    function normalizeWorkbenchTaskDefinition(task) {
      if (!task || typeof task !== 'object') return null;
      const command = String(task.command || '').trim();
      if (!command) return null;
      const label = String(task.label || `${command} ${(Array.isArray(task.args) ? task.args.join(' ') : String(task.args || '')).trim()}`).trim() || command;
      const id = String(task.id || label.toLowerCase().replace(/[^a-z0-9]+/g, '-')).trim() || label.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      return {
        id,
        label,
        command,
        args: Array.isArray(task.args) ? task.args.map((entry) => String(entry || '').trim()).filter(Boolean) : splitArgsText(task.args),
        cwd_relative: String(task.cwd_relative || task.cwd || '.').trim() || '.',
        env_text: String(task.env_text || '').trim(),
        port: Number(task.port || 0) || 0,
        open_url: String(task.open_url || task.openUrl || '').trim(),
        source: String(task.source || 'profile').trim() || 'profile',
      };
    }

    function parseEnvKeysFromText(text) {
      const keys = [];
      String(text || '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line && !line.startsWith('#'))
        .forEach((line) => {
          const index = line.indexOf('=');
          if (index <= 0) return;
          const key = line.slice(0, index).trim();
          if (key && !keys.includes(key)) keys.push(key);
        });
      return keys;
    }

    function readPackageManifest() {
      const file = getFile('package.json');
      const parsed = safeParseJsonContent(file?.content || '', null);
      return parsed && typeof parsed === 'object' ? parsed : null;
    }

    function readWorkbenchProfile() {
      const file = getFile('.skydexia/workbench.json');
      const parsed = safeParseJsonContent(file?.content || '', null);
      if (!parsed || typeof parsed !== 'object') return null;
      return {
        schema: String(parsed.schema || 'skydexia-2.6-workbench').trim() || 'skydexia-2.6-workbench',
        templateId: String(parsed.templateId || parsed.template_id || '').trim(),
        runtimePresetId: String(parsed.runtimePresetId || parsed.runtime_preset_id || '').trim(),
        runtime: normalizeWorkbenchRuntimeConfig(parsed.runtime),
        tasks: Array.isArray(parsed.tasks) ? parsed.tasks.map(normalizeWorkbenchTaskDefinition).filter(Boolean) : [],
        env: {
          expectedKeys: Array.isArray(parsed.env?.expectedKeys || parsed.env?.expected_keys)
            ? (parsed.env.expectedKeys || parsed.env.expected_keys).map((entry) => String(entry || '').trim()).filter(Boolean)

        },
        ports: Array.isArray(parsed.ports)
          ? parsed.ports.map((entry) => ({
              label: String(entry?.label || entry?.id || '').trim() || 'Port',
              port: Number(entry?.port || 0) || 0,
              url: String(entry?.url || entry?.open_url || '').trim(),
            })).filter((entry) => entry.port || entry.url)
          : [],
      };
    }

    function buildPresetTask(id, label, command, args, cwdRelative = '.', options = {}) {
      return normalizeWorkbenchTaskDefinition({
        id,
        label,
        command,
        args,
        cwd_relative: cwdRelative,
        env_text: options.envText || '',
        port: options.port || 0,

    function runtimeConfigToFormShape(runtime) {
      return {
        command: runtime?.command || '',
