            { path: '.skydexia/workbench.json', content: buildWorkbenchProfileFileContent('docs-briefing', staticPreset) },
          ],
        },
      ];
    }

    function inferRuntimeConfig() {
      const profile = readWorkbenchProfile();
      if (profile?.runtime) {
        return runtimeConfigToFormShape(profile.runtime);
      }
      const environment = state.runtime?.workspaceEnvironment && typeof state.runtime.workspaceEnvironment === 'object'
        ? state.runtime.workspaceEnvironment
        : null;
      const packageFile = getFile("package.json");
      const packageJson = packageFile ? JSON.parse(packageFile.content || "{}") : {};
      const scripts = packageJson && typeof packageJson === 'object' ? (packageJson.scripts || {}) : {};
      const hasVite = Boolean(scripts.dev && /vite/i.test(String(scripts.dev)) || getFile("vite.config.js") || getFile("vite.config.ts"));
      const hasPackage = Boolean(packageFile);
      if (hasVite) {
        return {
          command: 'npm',
          args: ['run', 'dev', '--', '--host', '127.0.0.1'],
          cwd: '.',
          port: 5173,
          launchUrl: 'http://127.0.0.1:5173/',
          probePath: '/',
          probeText: '',
          runtimeMode: environment?.suggested_runtime_mode || 'host-process',
          containerImage: environment?.container_image || '',
          containerWorkspacePath: environment?.container_workspace_folder || '',
          containerDockerfilePath: environment?.effective_dockerfile_path || '',
          containerComposeService: environment?.container_service_hint || '',
          containerComposeFiles: Array.isArray(environment?.docker_compose_files) ? environment.docker_compose_files : [],
          containerCachePolicy: 'workspace-scoped',
          containerNetworkStrategy: 'workspace-scoped',
          containerNetworkName: '',
        };
      }
      if (hasPackage && scripts.start) {
        return {
          command: 'npm',
          args: ['run', 'start'],
          cwd: '.',
          port: 3000,
          launchUrl: 'http://127.0.0.1:3000/',
          probePath: '/',
          probeText: '',
          runtimeMode: environment?.suggested_runtime_mode || 'host-process',
          containerImage: environment?.container_image || '',
          containerWorkspacePath: environment?.container_workspace_folder || '',
          containerDockerfilePath: environment?.effective_dockerfile_path || '',
          containerComposeService: environment?.container_service_hint || '',
          containerComposeFiles: Array.isArray(environment?.docker_compose_files) ? environment.docker_compose_files : [],
          containerCachePolicy: 'workspace-scoped',
          containerNetworkStrategy: 'workspace-scoped',
          containerNetworkName: '',
        };
      }
      if (getFile('index.html')) {
        return {
          command: 'python3',
          args: ['-m', 'http.server', '4173', '--bind', '127.0.0.1'],
          cwd: '.',
          port: 4173,
          launchUrl: 'http://127.0.0.1:4173/',
          probePath: '/',
          probeText: '',
          runtimeMode: environment?.suggested_runtime_mode || 'host-process',
          containerImage: environment?.container_image || '',
          containerWorkspacePath: environment?.container_workspace_folder || '',
          containerDockerfilePath: environment?.effective_dockerfile_path || '',
          containerComposeService: environment?.container_service_hint || '',
          containerComposeFiles: Array.isArray(environment?.docker_compose_files) ? environment.docker_compose_files : [],
          containerCachePolicy: 'workspace-scoped',
          containerNetworkStrategy: 'workspace-scoped',
          containerNetworkName: '',
        };
      }
      return {
        command: '',
        args: [],
        cwd: '.',
        port: 0,
        launchUrl: '',
        probePath: '/',
        probeText: '',
        runtimeMode: environment?.suggested_runtime_mode || 'host-process',
        containerImage: environment?.container_image || '',
        containerWorkspacePath: environment?.container_workspace_folder || '',
        containerDockerfilePath: environment?.effective_dockerfile_path || '',
        containerComposeService: environment?.container_service_hint || '',
        containerComposeFiles: Array.isArray(environment?.docker_compose_files) ? environment.docker_compose_files : [],
        containerCachePolicy: 'workspace-scoped',
        containerNetworkStrategy: 'workspace-scoped',
        containerNetworkName: '',
      };
    }

    function splitMultilineValues(value) {
      return String(value || '').split(/\r?\n/).map((entry) => entry.trim()).filter(Boolean);
    }

    function buildPortInventory() {
      const preset = selectedRuntimePreset();
      const selectedRuntime = currentRuntimeRecord();
      const rows = [];
      if (selectedRuntime?.port || selectedRuntime?.launch_url) {
        rows.push({
          key: `runtime:${selectedRuntime.id}`,
          label: `Runtime ${selectedRuntime.id}`,
          port: Number(selectedRuntime.port || 0) || 0,
          url: selectedRuntime.launch_url || '',
          source: 'runtime',
          status: selectedRuntime.status || 'unknown',
        });
      }
      (Array.isArray(preset?.ports) ? preset.ports : []).forEach((entry, index) => {
        rows.push({
          key: `preset:${preset.id}:${index}`,
          label: entry.label || `${preset.label} port`,
          port: Number(entry.port || 0) || 0,
          url: entry.url || '',
          source: 'preset',
          status: 'recommended',
        });
      });
      (Array.isArray(state.workbench.tasks) ? state.workbench.tasks : []).forEach((task) => {
        if (!task?.port && !task?.open_url) return;
        rows.push({
          key: `task:${task.id}`,
          label: task.label || task.id,
          port: Number(task.port || 0) || 0,
          url: task.open_url || '',
          source: 'task',
          status: task.status || 'unknown',
        });
      });
      (Array.isArray(state.runtime.recommendedPorts) ? state.runtime.recommendedPorts : []).forEach((entry, index) => {
        const port = Number(entry || 0) || 0;
        if (!port) return;
        rows.push({
          key: `env-forward:${index}`,
          label: `Devcontainer forward ${port}`,
          port,
          url: `http://127.0.0.1:${port}/`,
          source: 'workspace environment',
          status: 'recommended',
        });
      });
      const deduped = new Map();
      rows.forEach((row) => {
        const key = `${row.port || 0}|${row.url || ''}`;
        if (!deduped.has(key)) deduped.set(key, row);
      });
      return Array.from(deduped.values());
    }

    function buildEnvInventory() {
      const profile = readWorkbenchProfile();
      const preset = selectedRuntimePreset();
      const entries = [];
      const addKey = (key, source) => {
        const clean = String(key || '').trim();
        if (!clean) return;
        entries.push({ key: clean, source });
      };
      (Array.isArray(profile?.env?.expectedKeys) ? profile.env.expectedKeys : []).forEach((key) => addKey(key, 'workbench profile'));
      (Array.isArray(preset?.envKeys) ? preset.envKeys : []).forEach((key) => addKey(key, 'runtime preset'));
      ['.env', '.env.local', '.env.example', '.env.development'].forEach((path) => {
        const file = getFile(path);
        parseEnvKeysFromText(file?.content || '').forEach((key) => addKey(key, path));
      });
      parseEnvKeysFromText($('runtimeEnvInput')?.value || '').forEach((key) => addKey(key, 'runtime form'));
      const deduped = new Map();
      entries.forEach((entry) => {
        if (!deduped.has(entry.key)) deduped.set(entry.key, entry);
      });
      return Array.from(deduped.values());
    }

    function buildWorkbenchProfilePayload(options = {}) {
      const preset = options.preset || selectedRuntimePreset();
      const existing = readWorkbenchProfile();
      return {
        schema: 'skydexia-2.6-workbench',
        templateId: options.templateId !== undefined ? options.templateId : (existing?.templateId || $('bootstrapTemplateSelect')?.value || ''),
        runtimePresetId: preset?.id || existing?.runtimePresetId || '',
        runtime: normalizeWorkbenchRuntimeConfig({
          command: $('runtimeCommandInput')?.value || '',
          args: splitArgsText($('runtimeArgsInput')?.value || ''),
          cwd_relative: $('runtimeCwdInput')?.value || '.',
          port: Number($('runtimePortInput')?.value || 0) || 0,
          launch_url: $('runtimeLaunchUrlInput')?.value || '',
          probe_path: $('runtimeProbePathInput')?.value || '/',
          probe_contains_text: $('runtimeProbeTextInput')?.value || '',
          env_text: $('runtimeEnvInput')?.value || '',
          stop_recipe: $('runtimeStopCommandInput')?.value.trim() ? {
            command: $('runtimeStopCommandInput').value.trim(),
            args: splitArgsText($('runtimeStopArgsInput')?.value || ''),
            cwd_relative: $('runtimeStopCwdInput')?.value || '.',
            wait_ms: Number($('runtimeStopWaitInput')?.value || 0) || 4000,
          } : null,
        }),
        tasks: buildWorkbenchTaskCatalog().filter((task) => task.source !== 'package-script'),
        ports: buildPortInventory().map((entry) => ({ label: entry.label, port: entry.port, url: entry.url })),
        env: { expectedKeys: buildEnvInventory().map((entry) => entry.key) },
      };
    }

    function saveWorkbenchProfile(options = {}) {
      const payload = buildWorkbenchProfilePayload(options);
      upsertFile('.skydexia/workbench.json', JSON.stringify(payload, null, 2) + '\n');
      state.workbench.selectedPresetId = payload.runtimePresetId || state.workbench.selectedPresetId;
      if (options.announce !== false) {
        setStatus('Workbench profile saved', 'Saved runtime, task, port, and environment expectations into .skydexia/workbench.json for reproducible boot.', 'success');
      }
      renderWorkbenchDeck();
      populateRuntimeForm(true);
      return payload;
    }

    function applyRuntimePreset(presetId, options = {}) {
      const preset = getRuntimePresets().find((entry) => entry.id === presetId) || selectedRuntimePreset();
      if (!preset) throw new Error('Runtime preset not found.');
      state.workbench.selectedPresetId = preset.id;
      $('runtimePresetSelect').value = preset.id;
      $('runtimeCommandInput').value = preset.runtime.command || '';
      $('runtimeArgsInput').value = (preset.runtime.args || []).join('\n');
      $('runtimeCwdInput').value = preset.runtime.cwd || '.';
      $('runtimePortInput').value = preset.runtime.port ? String(preset.runtime.port) : '';
      $('runtimeLaunchUrlInput').value = preset.runtime.launchUrl || '';
      $('runtimeProbePathInput').value = preset.runtime.probePath || '/';
      $('runtimeProbeTextInput').value = preset.runtime.probeText || '';
      $('runtimeEnvInput').value = preset.runtime.envText || '';
      $('runtimeStopCommandInput').value = preset.runtime.stopCommand || '';
      $('runtimeStopArgsInput').value = (preset.runtime.stopArgs || []).join('\n');
      $('runtimeStopCwdInput').value = preset.runtime.stopCwd || '.';
      $('runtimeStopWaitInput').value = preset.runtime.stopWaitMs ? String(preset.runtime.stopWaitMs) : '4000';
      renderRuntimeStatus();
      renderWorkbenchDeck();
      if (options.saveProfile !== false) saveWorkbenchProfile({ announce: false });
      if (options.announce !== false) {
        setStatus('Runtime preset applied', `Loaded ${preset.label} into the runtime form and workbench profile.`, 'success');
      }
      return preset;
    }

    function scaffoldBootstrapTemplate(templateId) {
      const template = getBootstrapTemplates().find((entry) => entry.id === templateId) || getBootstrapTemplates()[0];
      if (!template) throw new Error('Bootstrap template not found.');
      if (state.files.length && !window.confirm(`Replace the current workspace files with the ${template.label} template?`)) return null;
      state.files = cloneFiles(template.buildFiles());
      state.workspaceName = template.label;
      state.activePath = template.entryPath;
      state.dirty = true;
      state.workbench.selectedTemplateId = template.id;
      renderFiles();
      if (template.entryPath) openFile(template.entryPath);
      populateRuntimeForm(true);
      renderPreview();
      renderWorkbenchDeck();
      scheduleSknorePreview(state.files);
      setStatus('Template scaffolded', `Loaded the ${template.label} bootstrap template and saved a matching workbench profile into the workspace snapshot.`, 'success');
      return template;
    }

    function seedEnvExample() {
      const keys = buildEnvInventory().map((entry) => entry.key);
      if (!keys.length) throw new Error('No environment keys are available to seed yet. Apply a preset or add env hints first.');
      const existingKeys = parseEnvKeysFromText(getFile('.env.example')?.content || '');
      const merged = Array.from(new Set([...existingKeys, ...keys]));
      upsertFile('.env.example', merged.map((key) => `${key}=`).join('\n') + '\n');
      setStatus('Env example seeded', `Wrote ${merged.length} environment key placeholder${merged.length === 1 ? '' : 's'} into .env.example.`, 'success');
      renderWorkbenchDeck();
    }

    function currentWorkbenchTaskPreset() {
      const selectedId = String(state.workbench.selectedTaskPresetId || $('workbenchTaskSelect')?.value || '').trim();
      return buildWorkbenchTaskCatalog().find((task) => task.id === selectedId) || null;
    }

    function currentWorkbenchTaskSession() {
      const selectedId = String(state.workbench.selectedTaskId || $('workbenchTaskSessionSelect')?.value || '').trim();
      return (Array.isArray(state.workbench.tasks) ? state.workbench.tasks : []).find((task) => String(task.id || '') === selectedId) || null;
    }

    function primeWorkbenchTaskForm(task) {
      if (!task) return;
      $('workbenchTaskSelect').value = task.id;
      state.workbench.selectedTaskPresetId = task.id;
      $('workbenchTaskCommandInput').value = task.command || '';
      $('workbenchTaskLabelInput').value = task.label || '';
      $('workbenchTaskArgsInput').value = Array.isArray(task.args) ? task.args.join('\n') : '';
      $('workbenchTaskCwdInput').value = task.cwd_relative || '.';
      $('workbenchTaskOpenUrlInput').value = task.open_url || '';
    }

    let workbenchTaskPollTimer = null;

    function scheduleWorkbenchTaskPoll() {
      if (workbenchTaskPollTimer) {
        clearTimeout(workbenchTaskPollTimer);
        workbenchTaskPollTimer = null;
      }
      const current = currentWorkbenchTaskSession();
      if (!current || current.status !== 'running') return;
      workbenchTaskPollTimer = window.setTimeout(() => {
        loadSelectedWorkbenchTaskLogs({ silent: true }).catch(() => null);
        loadWorkbenchTaskLaneStatus({ silent: true }).catch(() => null);
      }, 1500);
    }

    async function loadWorkbenchTaskLaneStatus(options = {}) {
      try {
        const payload = await runtimeRequest('/api/runtime/task-list?ws_id=' + encodeURIComponent(state.workspaceId), 'GET');
        state.workbench.tasks = Array.isArray(payload?.tasks) ? payload.tasks : [];
        if (!state.workbench.selectedTaskId && state.workbench.tasks[0]?.id) state.workbench.selectedTaskId = state.workbench.tasks[0].id;
      } catch (error) {
        state.workbench.tasks = [];
        state.workbench.taskLogs = { stdout: '', stderr: '', stdoutOffset: 0, stderrOffset: 0 };
        if (!options.silent) throw error;
      }
      renderWorkbenchDeck();
      if (state.workbench.selectedTaskId) await loadSelectedWorkbenchTaskLogs({ silent: true });
      scheduleWorkbenchTaskPoll();
    }

    async function loadSelectedWorkbenchTaskLogs(options = {}) {
      const task = currentWorkbenchTaskSession();
      if (!task) {
        state.workbench.taskLogs = { stdout: '', stderr: '', stdoutOffset: 0, stderrOffset: 0 };
        renderWorkbenchDeck();
        return null;
      }
      try {
        const payload = await runtimeRequest('/api/runtime/task-logs?id=' + encodeURIComponent(task.id) + '&ws_id=' + encodeURIComponent(state.workspaceId), 'GET');
        state.workbench.taskLogs = {
          stdout: String(payload?.stdout || ''),
          stderr: String(payload?.stderr || ''),
          stdoutOffset: Number(payload?.stdoutOffset || 0),
          stderrOffset: Number(payload?.stderrOffset || 0),
        };
        if (payload?.task) {
          state.workbench.tasks = (Array.isArray(state.workbench.tasks) ? state.workbench.tasks : []).map((entry) => String(entry.id) === String(payload.task.id) ? payload.task : entry);
        }
      } catch (error) {
        state.workbench.taskLogs = { stdout: '', stderr: '', stdoutOffset: 0, stderrOffset: 0 };
        if (!options.silent) throw error;
      }
      renderWorkbenchDeck();
      scheduleWorkbenchTaskPoll();
      return state.workbench.taskLogs;
    }

    async function startWorkbenchTaskFromDefinition(task) {
      if (!task) throw new Error('Select a task preset first.');
      primeWorkbenchTaskForm(task);
      const payload = await runtimeRequest('/api/runtime/task-start', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        preset_id: task.source === 'package-script' ? undefined : task.id,
        label: task.label,
        command: task.command,
        args: task.args,
        cwd: task.cwd_relative,
        open_url: task.open_url || undefined,
        port: Number(task.port || 0) || undefined,
        source: task.source || 'preset',
      });
      state.workbench.selectedTaskId = payload?.task?.id || state.workbench.selectedTaskId;
      await loadWorkbenchTaskLaneStatus({ silent: true });
      setStatus('Task started', `Started ${task.label} inside the materialized workspace lane.`, 'success');
      return payload;
    }

    async function startSelectedWorkbenchTask() {
      return startWorkbenchTaskFromDefinition(currentWorkbenchTaskPreset());
    }

    async function startCustomWorkbenchTask() {
      const command = $('workbenchTaskCommandInput').value.trim();
      if (!command) throw new Error('Enter a terminal command first.');
      const payload = await runtimeRequest('/api/runtime/task-start', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        label: $('workbenchTaskLabelInput').value.trim() || command,
        command,
        args: splitArgsText($('workbenchTaskArgsInput').value),
        cwd: $('workbenchTaskCwdInput').value.trim() || '.',
        open_url: $('workbenchTaskOpenUrlInput').value.trim() || undefined,
        source: 'custom',
      });
      state.workbench.selectedTaskId = payload?.task?.id || state.workbench.selectedTaskId;
      await loadWorkbenchTaskLaneStatus({ silent: true });
      setStatus('Custom task started', `Started ${$('workbenchTaskLabelInput').value.trim() || command} in the integrated terminal lane.`, 'success');
      return payload;
    }

    async function installWorkspaceDependencies() {
      const payload = await runtimeRequest('/api/runtime/deps-install', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        cwd: $('workbenchTaskCwdInput')?.value?.trim() || '.',
      });
      state.workbench.selectedTaskId = payload?.task?.id || state.workbench.selectedTaskId;
      await loadWorkbenchTaskLaneStatus({ silent: true });
      const manager = String(payload?.package_manager || 'unknown').trim();
      const statusBox = $('packageLifecycleStatus');
      if (statusBox) {
        statusBox.innerHTML = `<strong>Dependency + framework lifecycle</strong><div class='muted'>Dependency install launched with <code>${escapeHtml(manager)}</code>${payload?.task?.label ? ` as <code>${escapeHtml(payload.task.label)}</code>` : ''}.</div>`;
      }
      setStatus('Dependency install started', `SkyDexia launched ${manager} install in the workspace terminal lane.`, 'success');
      return payload;
    }

    async function startFrameworkDevLoop() {
      const payload = await runtimeRequest('/api/runtime/framework-loop', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        cwd: $('workbenchTaskCwdInput')?.value?.trim() || '.',
        open_url: $('workbenchTaskOpenUrlInput')?.value?.trim() || undefined,
        port: Number($('runtimePortInput')?.value || 0) || undefined,
      });
      state.workbench.selectedTaskId = payload?.task?.id || state.workbench.selectedTaskId;
      if (payload?.launch_url && !$('workbenchTaskOpenUrlInput')?.value?.trim()) {
        $('workbenchTaskOpenUrlInput').value = payload.launch_url;
      }
      await loadWorkbenchTaskLaneStatus({ silent: true });
      const manager = String(payload?.package_manager || 'unknown').trim();
      const scriptName = String(payload?.script || 'dev').trim();
      const statusBox = $('packageLifecycleStatus');
      if (statusBox) {
        statusBox.innerHTML = `<strong>Dependency + framework lifecycle</strong><div class='muted'>Framework loop started with <code>${escapeHtml(manager)} run ${escapeHtml(scriptName)}</code>${payload?.launch_url ? ` at <code>${escapeHtml(payload.launch_url)}</code>` : ''}.</div>`;
      }
      setStatus('Framework loop started', `SkyDexia launched ${manager} run ${scriptName}${payload?.launch_url ? ` at ${payload.launch_url}` : ''}.`, 'success');
      return payload;
    }

    async function stopSelectedWorkbenchTask() {
      const task = currentWorkbenchTaskSession();
      if (!task) throw new Error('Select a terminal session first.');
      const payload = await runtimeRequest('/api/runtime/task-stop', 'POST', { id: task.id });
      await loadWorkbenchTaskLaneStatus({ silent: true });
      setStatus('Task stopped', `Stopped terminal session ${task.label || task.id}.`, 'success');
      return payload;
    }

    function openSelectedWorkbenchTaskUrl() {
      const session = currentWorkbenchTaskSession();
      const preset = currentWorkbenchTaskPreset();
      const target = $('workbenchTaskOpenUrlInput').value.trim() || session?.open_url || preset?.open_url || '';
      if (!target) throw new Error('No task URL is available for the selected task.');
      window.open(target, '_blank', 'noopener,noreferrer');
    }

    function applyPortInventoryEntry(entry) {
      if (!entry) return;
      if (entry.port) $('runtimePortInput').value = String(entry.port);
      if (entry.url) $('runtimeLaunchUrlInput').value = entry.url;
      renderRuntimeStatus();
      setStatus('Port applied', `Loaded ${entry.label} into the runtime form.`, 'success');
    }

    function renderWorkbenchDeck() {
      const presets = getRuntimePresets();
      const templates = getBootstrapTemplates();
      const profile = readWorkbenchProfile();
      const presetSelect = $('runtimePresetSelect');
      const templateSelect = $('bootstrapTemplateSelect');
      const taskSelect = $('workbenchTaskSelect');
      const taskSessionSelect = $('workbenchTaskSessionSelect');
      const profileBox = $('workbenchProfileStatus');
      const taskBox = $('workbenchTaskStatus');
      const quickBox = $('workbenchQuickTaskButtons');
      const terminalSummary = $('workbenchTerminalSummary');
      const terminalList = $('workbenchTerminalList');
      const portList = $('workbenchPortList');
      const envList = $('workbenchEnvList');
      if (!presetSelect || !templateSelect || !taskSelect || !taskSessionSelect || !profileBox || !taskBox || !quickBox || !terminalSummary || !terminalList || !portList || !envList) return;

      const selectedPresetId = String(state.workbench.selectedPresetId || profile?.runtimePresetId || presets[0]?.id || '').trim();
      presetSelect.innerHTML = '';
      presets.forEach((preset) => {
        const option = document.createElement('option');
        option.value = preset.id;
        option.textContent = `${preset.label} · ${preset.summary}`;
        if (preset.id === selectedPresetId) option.selected = true;
        presetSelect.appendChild(option);
      });
      state.workbench.selectedPresetId = String(presetSelect.value || selectedPresetId).trim();
      const activePreset = selectedRuntimePreset();

      const selectedTemplateId = String(state.workbench.selectedTemplateId || profile?.templateId || templates[0]?.id || '').trim();
      templateSelect.innerHTML = '';
      templates.forEach((template) => {
        const option = document.createElement('option');
        option.value = template.id;
        option.textContent = `${template.label} · ${template.description}`;
        if (template.id === selectedTemplateId) option.selected = true;
        templateSelect.appendChild(option);
      });
      state.workbench.selectedTemplateId = String(templateSelect.value || selectedTemplateId).trim();

      profileBox.innerHTML = activePreset
        ? `<strong>Workbench profile</strong><div class='muted'>${escapeHtml(activePreset.label)} is active. ${escapeHtml(activePreset.summary)} ${profile?.runtime ? 'Saved profile detected in .skydexia/workbench.json.' : 'Save the workbench profile to make this boot reproducible.'}</div>`
        : "<strong>Workbench profile</strong><div class='muted'>No runtime preset is active yet.</div>";

      const tasks = buildWorkbenchTaskCatalog();
      taskSelect.innerHTML = '';
      if (!tasks.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No task presets detected yet';
        taskSelect.appendChild(option);
      } else {
        tasks.forEach((task) => {
          const option = document.createElement('option');
          option.value = task.id;
          option.textContent = `${task.label} · ${task.command} ${task.args.join(' ')}`.trim();
          if (task.id === String(state.workbench.selectedTaskPresetId || '').trim()) option.selected = true;
          taskSelect.appendChild(option);
        });
        if (!String(taskSelect.value || '').trim()) taskSelect.value = tasks[0].id;
      }
      state.workbench.selectedTaskPresetId = String(taskSelect.value || '').trim();
      const selectedTaskPreset = currentWorkbenchTaskPreset();
      if (selectedTaskPreset && !$('workbenchTaskCommandInput').value.trim()) primeWorkbenchTaskForm(selectedTaskPreset);

      quickBox.innerHTML = '';
      tasks.slice(0, 3).forEach((task) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = task.source === 'preset' ? 'primary' : 'ghost';
        button.textContent = task.label;
        button.addEventListener('click', () => runAction(() => startWorkbenchTaskFromDefinition(task)));
        quickBox.appendChild(button);
      });
      if (!quickBox.children.length) {
        const hint = document.createElement('div');
        hint.className = 'diff-summary-item';
        hint.textContent = 'Apply a runtime preset or add package scripts to surface quick tasks.';
        quickBox.appendChild(hint);
      }

      taskSessionSelect.innerHTML = '';
      const sessions = Array.isArray(state.workbench.tasks) ? state.workbench.tasks : [];
      if (!sessions.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No terminal sessions yet';
        taskSessionSelect.appendChild(option);
      } else {
        sessions.forEach((task) => {
          const option = document.createElement('option');
          option.value = task.id;
          option.textContent = `${task.label || task.id} · ${task.status || 'unknown'}${task.open_url ? ` · ${task.open_url}` : ''}`;
          if (String(task.id) === String(state.workbench.selectedTaskId || '').trim()) option.selected = true;
          taskSessionSelect.appendChild(option);
        });
        if (!String(taskSessionSelect.value || '').trim()) taskSessionSelect.value = sessions[0].id;
      }
      state.workbench.selectedTaskId = String(taskSessionSelect.value || '').trim();
      const activeSession = currentWorkbenchTaskSession();
      taskBox.innerHTML = activeSession
        ? `<strong>Task and terminal lane</strong><div class='muted'>Selected session <code>${escapeHtml(activeSession.label || activeSession.id)}</code> is <code>${escapeHtml(activeSession.status || 'unknown')}</code>${activeSession.open_url ? ` at <code>${escapeHtml(activeSession.open_url)}</code>` : ''}.</div>`
        : "<strong>Task and terminal lane</strong><div class='muted'>No task sessions yet. Run a preset or custom terminal command against the materialized workspace.</div>";

      const stdoutLines = String(state.workbench.taskLogs?.stdout || '').trim().split(/\r?\n/).filter(Boolean).slice(-8);
      const stderrLines = String(state.workbench.taskLogs?.stderr || '').trim().split(/\r?\n/).filter(Boolean).slice(-6);
      terminalSummary.textContent = activeSession
        ? `${activeSession.label || activeSession.id} · ${activeSession.status || 'unknown'} · stdout ${stdoutLines.length} line(s) · stderr ${stderrLines.length} line(s)`
        : 'No task output captured yet.';
      terminalList.innerHTML = '';
      if (!stdoutLines.length && !stderrLines.length) {
        const empty = document.createElement('div');
        empty.className = 'diff-summary-item';
        empty.textContent = activeSession
          ? 'Task transcript is empty so far. Refresh tasks or wait for the running command to emit output.'
          : 'Start a task to capture an integrated terminal transcript inside SkyDexia.';
        terminalList.appendChild(empty);
      } else {
        stdoutLines.forEach((line) => {
          const item = document.createElement('div');
          item.className = 'diff-summary-item';
          item.textContent = `stdout: ${line}`;
          terminalList.appendChild(item);
        });
        stderrLines.forEach((line) => {
          const item = document.createElement('div');
          item.className = 'diff-summary-item';
          item.textContent = `stderr: ${line}`;
          terminalList.appendChild(item);
        });
      }

      portList.innerHTML = '';
      const ports = buildPortInventory();
      if (!ports.length) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = 'No ports are known yet. Apply a preset, start a runtime, or run a task with an open URL.';
        portList.appendChild(item);
      } else {
        ports.forEach((entry) => {
          const row = document.createElement('div');
          row.className = 'diff-summary-item';
          row.innerHTML = `<strong>${escapeHtml(entry.label)}</strong> · ${escapeHtml(entry.source)} · ${escapeHtml(entry.status || 'ready')}${entry.port ? ` · port=${escapeHtml(String(entry.port))}` : ''}${entry.url ? ` · ${escapeHtml(entry.url)}` : ''} <button class='ghost' type='button'>Use</button>`;
          row.querySelector('button')?.addEventListener('click', () => applyPortInventoryEntry(entry));
          portList.appendChild(row);
        });
      }

      envList.innerHTML = '';
      const envEntries = buildEnvInventory();
      if (!envEntries.length) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = 'No environment keys are declared yet. Apply a preset or seed .env.example to start tracking env expectations.';
        envList.appendChild(item);
      } else {
        envEntries.forEach((entry) => {
          const item = document.createElement('div');
          item.className = 'diff-summary-item';
          item.textContent = `${entry.key} · ${entry.source}`;
          envList.appendChild(item);
        });
      }
    }

    function applyPersistedRuntimeState(workspaceRuntime) {
      const persisted = workspaceRuntime && typeof workspaceRuntime === 'object' ? workspaceRuntime : null;
      if (!persisted) return;
      state.runtime.materializedPath = String(persisted.workspace_path || '').trim();
      state.runtime.materializedAt = persisted.materialized_at || null;
      state.runtime.materializedRevision = String(persisted.revision || '').trim();
      state.runtime.recoveryConfig = persisted.recoverable_runtime_config || null;
      state.runtime.workspaceEnvironment = persisted.workspace_environment && typeof persisted.workspace_environment === 'object'
        ? persisted.workspace_environment
        : null;
      state.runtime.recommendedPorts = Array.isArray(persisted.recommended_ports)
        ? persisted.recommended_ports.map((entry) => Number(entry || 0)).filter((entry) => Number.isInteger(entry) && entry > 0 && entry <= 65535)
        : [];
      state.runtime.lastRuntime = persisted.last_runtime || null;
      state.runtime.persistedLogs = persisted.last_runtime_logs || null;
    }

    function applyRuntimeLaneState(payload, fallbackMode = 'local-package-server') {
      const lane = payload?.runtime_lane && typeof payload.runtime_lane === 'object' ? payload.runtime_lane : null;
      state.runtime.laneAvailable = lane ? lane.available !== false : true;
      state.runtime.laneMode = String(lane?.mode || fallbackMode).trim() || fallbackMode;
      state.runtime.controlOrigin = String(lane?.control_origin || '').trim();
    }

    function populateRuntimeForm(force = false) {
      const inferred = inferRuntimeConfig();
      const recovery = state.runtime?.recoveryConfig || null;
      const config = recovery ? {
        command: recovery.command || inferred.command || '',
        args: Array.isArray(recovery.args) ? recovery.args : (inferred.args || []),
        cwd: recovery.cwd_relative || inferred.cwd || '.',
        port: recovery.port || inferred.port || 0,
        launchUrl: recovery.launch_url || inferred.launchUrl || '',
        probePath: recovery.probe_path || inferred.probePath || '/',
        probeText: recovery.probe_contains_text || inferred.probeText || '',
        runtimeMode: recovery.runtime_mode || inferred.runtimeMode || 'host-process',
        containerImage: recovery.container_image || inferred.containerImage || '',
        containerWorkspacePath: recovery.container_workspace_path || inferred.containerWorkspacePath || '',
        containerDockerfilePath: recovery.container_dockerfile_path || inferred.containerDockerfilePath || '',
        containerComposeService: recovery.container_compose_service || inferred.containerComposeService || '',
        containerComposeFiles: Array.isArray(recovery.container_compose_files) ? recovery.container_compose_files : (inferred.containerComposeFiles || []),
        containerCachePolicy: recovery.container_cache_policy || inferred.containerCachePolicy || '',
        envText: recovery.env_text || '',
        stopCommand: recovery.stop_recipe?.command || '',
        stopArgs: Array.isArray(recovery.stop_recipe?.args) ? recovery.stop_recipe.args : [],
        stopCwd: recovery.stop_recipe?.cwd_relative || '.',
        stopWaitMs: recovery.stop_recipe?.wait_ms || 4000,
      } : inferred;
      if (force || !$('runtimeCommandInput').value.trim()) $('runtimeCommandInput').value = config.command || '';
      if (force || !$('runtimeArgsInput').value.trim()) $('runtimeArgsInput').value = (config.args || []).join('\n');
      if (force || !$('runtimeCwdInput').value.trim()) $('runtimeCwdInput').value = config.cwd || '.';
      if (force || !$('runtimePortInput').value.trim()) $('runtimePortInput').value = config.port ? String(config.port) : '';
      if (force || !$('runtimeLaunchUrlInput').value.trim()) $('runtimeLaunchUrlInput').value = config.launchUrl || '';
      if (force || !$('runtimeModeSelect').value.trim()) $('runtimeModeSelect').value = config.runtimeMode || 'host-process';
      if (force || !$('runtimeContainerImageInput').value.trim()) $('runtimeContainerImageInput').value = config.containerImage || '';
      if (force || !$('runtimeContainerWorkspacePathInput').value.trim()) $('runtimeContainerWorkspacePathInput').value = config.containerWorkspacePath || '';
      if (force || !$('runtimeContainerDockerfileInput').value.trim()) $('runtimeContainerDockerfileInput').value = config.containerDockerfilePath || '';
      if (force || !$('runtimeContainerComposeServiceInput').value.trim()) $('runtimeContainerComposeServiceInput').value = config.containerComposeService || '';
      if (force || !$('runtimeContainerComposeFilesInput').value.trim()) $('runtimeContainerComposeFilesInput').value = (config.containerComposeFiles || []).join('\n');
      if (force || !$('runtimeContainerCachePolicyInput').value.trim()) $('runtimeContainerCachePolicyInput').value = config.containerCachePolicy || '';
      if (force || !$('runtimeContainerNetworkStrategySelect').value.trim()) $('runtimeContainerNetworkStrategySelect').value = config.containerNetworkStrategy || 'workspace-scoped';
      if (force || !$('runtimeContainerNetworkNameInput').value.trim()) $('runtimeContainerNetworkNameInput').value = config.containerNetworkName || '';
      if (force || !$('runtimeProbePathInput').value.trim()) $('runtimeProbePathInput').value = config.probePath || '/';
      if (force || !$('runtimeProbeTextInput').value.trim()) $('runtimeProbeTextInput').value = config.probeText || '';
      if ((force || !$('runtimeEnvInput').value.trim()) && config.envText) $('runtimeEnvInput').value = config.envText;
      if (force || !$('runtimeStopCommandInput').value.trim()) $('runtimeStopCommandInput').value = config.stopCommand || '';
      if (force || !$('runtimeStopArgsInput').value.trim()) $('runtimeStopArgsInput').value = (config.stopArgs || []).join('\n');
      if (force || !$('runtimeStopCwdInput').value.trim()) $('runtimeStopCwdInput').value = config.stopCwd || '.';
      if (force || !$('runtimeStopWaitInput').value.trim()) $('runtimeStopWaitInput').value = config.stopWaitMs ? String(config.stopWaitMs) : '4000';
    }

    function currentRuntimeRecord() {
      const selectedId = String(state.runtime?.selectedId || $('runtimeSelect')?.value || '').trim();
      return (Array.isArray(state.runtime?.runtimes) ? state.runtime.runtimes : []).find((item) => String(item.id || '') === selectedId) || null;
    }

    function renderRuntimeStatus() {
      const laneBox = $('runtimeLaneStatus');
      const workspaceBox = $('runtimeWorkspaceStatus');
      const logBox = $('runtimeLogStatus');
      const logList = $('runtimeLogList');
      const environmentBox = $('runtimeEnvironmentStatus');
      const environmentList = $('runtimeEnvironmentList');
      const telemetryBox = $('runtimeContainerTelemetryStatus');
      const telemetryList = $('runtimeContainerTelemetryList');
      const runtimeSelect = $('runtimeSelect');
      if (!laneBox || !workspaceBox || !logBox || !logList || !runtimeSelect) return;

      laneBox.innerHTML = state.runtime.laneAvailable
        ? (state.runtime.laneMode === 'hosted-runtime-bridge'
          ? "<strong>Runtime lane</strong><div class='muted'>Hosted runtime bridge is live" + (state.runtime.controlOrigin ? " via <code>" + escapeHtml(state.runtime.controlOrigin) + "</code>" : '') + ". SkyDexia can materialize the saved workspace, launch a process, probe it, and stream logs through the configured control plane.</div>"
          : "<strong>Runtime lane</strong><div class='muted'>Self-hosted package server is live. SkyDexia can materialize the saved workspace, launch a process, expose a URL, stream logs, and recover it without depending on the larger shell.</div>")
        : "<strong>Runtime lane</strong><div class='muted'>Runtime control is unavailable on this origin. Start SkyDexia with <code>npm start</code> or configure <code>SKYDEXIA_RUNTIME_CONTROL_URL</code> so hosted mode can bridge to a real runtime lane.</div>";

      workspaceBox.innerHTML = state.runtime.materializedPath
        ? "<strong>Materialized workspace</strong><div class='muted'><code>" + escapeHtml(state.runtime.materializedPath) + "</code> · revision <code>" + escapeHtml(state.runtime.materializedRevision || 'none') + "</code> · materialized " + escapeHtml(state.runtime.materializedAt ? new Date(state.runtime.materializedAt).toLocaleString() : 'recently') + ".</div>"
        : "<strong>Materialized workspace</strong><div class='muted'>No runtime workspace has been materialized yet.</div>";

      if (!state.runtime.materializedPath && state.runtime.recoveryConfig) {
        workspaceBox.innerHTML = "<strong>Materialized workspace</strong><div class='muted'>SkyDexia recovered the last runtime launch config after a package-server restart. Use <code>Start Runtime</code> to relaunch the saved workspace with the persisted command and probe settings.</div>";
      }

      runtimeSelect.innerHTML = '';
      const runtimes = Array.isArray(state.runtime.runtimes) ? state.runtime.runtimes : [];
      if (!runtimes.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No live runtimes recorded yet';
        runtimeSelect.appendChild(option);
      } else {
        runtimes.forEach((runtime) => {
          const option = document.createElement('option');
          option.value = runtime.id;
          option.textContent = runtime.id + ' · ' + (runtime.status || 'unknown') + (runtime.stop_outcome?.result ? ' · stop=' + runtime.stop_outcome.result : '') + (runtime.launch_url ? ' · ' + runtime.launch_url : '');
          if (String(runtime.id) === String(state.runtime.selectedId || '')) option.selected = true;
          runtimeSelect.appendChild(option);
        });
        if (!String(runtimeSelect.value || '').trim()) {
          runtimeSelect.value = runtimes[0].id;
          state.runtime.selectedId = runtimes[0].id;
        }
      }

      const selected = currentRuntimeRecord();
      logBox.innerHTML = selected
        ? "<strong>Runtime logs</strong><div class='muted'>Selected runtime <code>" + escapeHtml(selected.id) + "</code> is <code>" + escapeHtml(selected.status || 'unknown') + "</code>" + (selected.stop_outcome?.result ? " after a <code>" + escapeHtml(selected.stop_outcome.result) + "</code> stop" : '') + (selected.launch_url ? " at <code>" + escapeHtml(selected.launch_url) + "</code>" : '') + ".</div>"
        : "<strong>Runtime logs</strong><div class='muted'>No runtime logs loaded yet.</div>";

      logList.innerHTML = '';
      if (state.runtime.lastProbe) {
        const probeRow = document.createElement('div');
        probeRow.className = 'diff-summary-item';
        probeRow.textContent = `probe: ${state.runtime.lastProbe.ok ? 'passed' : 'failed'} · status=${state.runtime.lastProbe.status} · ${state.runtime.lastProbe.url}`;
        logList.appendChild(probeRow);
      }
      if (selected?.stop_outcome) {
        const stopRow = document.createElement('div');
        stopRow.className = 'diff-summary-item';
        const recipeLabel = selected.stop_outcome.recipe?.command ? ` · recipe=${selected.stop_outcome.recipe.command}` : '';
        stopRow.textContent = `stop: ${selected.stop_outcome.result} · reason=${selected.stop_outcome.reason || 'manual'}${recipeLabel}`;
        logList.appendChild(stopRow);
      }
      const stdout = String(state.runtime.logs?.stdout || '').trim();
      const stderr = String(state.runtime.logs?.stderr || '').trim();
      if (stdout) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = 'stdout: ' + stdout.slice(-280);
        logList.appendChild(item);
      }
      if (stderr) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = 'stderr: ' + stderr.slice(-280);
        logList.appendChild(item);
      }
      if (!stdout && !stderr && state.runtime.persistedLogs) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = 'persisted logs: stdout=' + Number(state.runtime.persistedLogs.stdout_size || 0) + ' bytes · stderr=' + Number(state.runtime.persistedLogs.stderr_size || 0) + ' bytes';
        logList.appendChild(item);
      }
      if (!logList.children.length) {
        const item = document.createElement('div');
        item.className = 'diff-summary-item';
        item.textContent = state.runtime.laneAvailable
          ? (state.runtime.recoveryConfig
            ? 'Runtime lane recovered the last launch config. Start Runtime to restore the last-known process lane and capture fresh logs.'
            : 'Runtime lane is ready. Materialize a workspace or start a runtime to capture logs and health proof.')
          : 'Runtime lane proof is unavailable until the package server is started.';
        logList.appendChild(item);
      }

      if (environmentBox && environmentList) {
        const environment = state.runtime.workspaceEnvironment && typeof state.runtime.workspaceEnvironment === 'object'
          ? state.runtime.workspaceEnvironment
          : null;
        const devcontainer = environment?.devcontainer && typeof environment.devcontainer === 'object'
          ? environment.devcontainer
          : null;
        const forwardPorts = Array.isArray(state.runtime.recommendedPorts) ? state.runtime.recommendedPorts : [];
        const selected = currentRuntimeRecord();
        const activeMode = String(selected?.runtime_mode || state.runtime.recoveryConfig?.runtime_mode || environment?.recommended_runtime_mode || 'host-process').trim() || 'host-process';
        environmentBox.innerHTML = environment
          ? `<strong>Environment lane</strong><div class='muted'>mode=<code>${escapeHtml(activeMode)}</code> · suggested=<code>${escapeHtml(environment.suggested_runtime_mode || environment.recommended_runtime_mode || 'host-process')}</code> · devcontainer=<code>${escapeHtml(environment.devcontainer_path || 'none')}</code> · docker-compose=<code>${escapeHtml(environment.docker_compose_path || 'none')}</code> · dockerfile=<code>${escapeHtml(environment.dockerfile_path || 'none')}</code>.</div>`
          : "<strong>Environment lane</strong><div class='muted'>No devcontainer environment metadata surfaced yet.</div>";
        environmentList.innerHTML = '';
        if (!environment) {
          const item = document.createElement('div');
          item.className = 'diff-summary-item';
          item.textContent = 'Add .devcontainer/devcontainer.json or container metadata files to activate environment-lane visibility.';
          environmentList.appendChild(item);
        } else {
          const hookRows = [
            ['initialize hook', devcontainer?.initializeCommand],
            ['update-content hook', devcontainer?.updateContentCommand],
            ['post-create hook', devcontainer?.postCreateCommand],
            ['post-start hook', devcontainer?.postStartCommand],
          ];
          const rows = [
            `recommended mode: ${environment.recommended_runtime_mode || 'host-process'}`,
            `suggested mode: ${environment.suggested_runtime_mode || environment.recommended_runtime_mode || 'host-process'}`,
            `devcontainer image: ${devcontainer?.image || 'none'}`,
            `devcontainer service: ${devcontainer?.service || 'none'}`,
            `compose services: ${(Array.isArray(environment.docker_compose_services) && environment.docker_compose_services.length) ? environment.docker_compose_services.join(', ') : 'none'}`,
            `effective dockerfile: ${environment.effective_dockerfile_path || 'none'}`,
            `workspace folder: ${devcontainer?.workspaceFolder || 'none'}`,
            `remote user: ${devcontainer?.remoteUser || 'none'}`,
            `features: ${Object.keys(devcontainer?.features || {}).length}`,
            `mounts: ${Array.isArray(devcontainer?.mounts) ? devcontainer.mounts.length : 0}`,
            `run args: ${Array.isArray(devcontainer?.runArgs) ? devcontainer.runArgs.length : 0}`,
          ];
          hookRows.forEach(([label, value]) => {
            rows.push(`${label}: ${value || 'none'}`);
          });
          rows.forEach((row) => {
            const item = document.createElement('div');
            item.className = 'diff-summary-item';
            item.textContent = row;
            environmentList.appendChild(item);
          });
          if (forwardPorts.length) {
            forwardPorts.forEach((entry) => {
              const item = document.createElement('div');
              item.className = 'diff-summary-item';
              item.textContent = `forwarded port: ${entry}`;
              environmentList.appendChild(item);
            });
          } else {
            const item = document.createElement('div');
            item.className = 'diff-summary-item';
            item.textContent = 'forwarded port: none declared';
            environmentList.appendChild(item);
          }
        }
      }
      if (telemetryBox && telemetryList) {
        const telemetrySource = selected?.container_telemetry && typeof selected.container_telemetry === 'object'
          ? selected.container_telemetry
          : (state.runtime.lastRuntime?.container_telemetry && typeof state.runtime.lastRuntime.container_telemetry === 'object'
            ? state.runtime.lastRuntime.container_telemetry
            : null);
        telemetryBox.innerHTML = telemetrySource
          ? `<strong>Container telemetry</strong><div class='muted'>mode=<code>${escapeHtml(telemetrySource.mode || selected?.runtime_mode || 'unknown')}</code> · build_ms=<code>${escapeHtml(String(telemetrySource.build_ms || 0))}</code> · launch_ms=<code>${escapeHtml(String(telemetrySource.launch_ms || 0))}</code>.</div>`
          : "<strong>Container telemetry</strong><div class='muted'>No container ownership telemetry captured yet.</div>";
        telemetryList.innerHTML = '';
        const rows = [];
        if (selected) {
          rows.push(`container name: ${selected.container_name || 'none'}`);
          rows.push(`container image: ${selected.container_image || 'none'}`);
          rows.push(`workspace path: ${selected.container_workspace_path || 'none'}`);
          rows.push(`compose service: ${selected.container_compose_service || 'none'}`);
          rows.push(`compose files: ${(Array.isArray(selected.container_compose_files) && selected.container_compose_files.length) ? selected.container_compose_files.join(', ') : 'none'}`);
          rows.push(`cache policy: ${selected.container_cache_policy || 'none'}`);
          rows.push(`network strategy: ${selected.container_network_strategy || 'none'}`);
          rows.push(`network name: ${selected.container_network_name || 'none'}`);
        }
        if (telemetrySource) {
          rows.push(`started at: ${telemetrySource.started_at || 'unknown'}`);
        }
        if (!rows.length) {
          rows.push('Start a container-backed runtime to capture build/launch telemetry and container identity.');
        }
        rows.forEach((row) => {
          const item = document.createElement('div');
          item.className = 'diff-summary-item';
          item.textContent = row;
          telemetryList.appendChild(item);
        });
      }
      renderWorkbenchDeck();
    }

    async function runtimeRequest(path, method = 'GET', body) {
      return jsonRequest(path, method, body);
    }

    async function loadUiPartials() {
      const slots = [
        { id: 'experienceOverlaysSlot', path: '/ui/partials/experience-overlays.html' },
        { id: 'shellChromeSlot', path: '/ui/partials/shell-chrome.html' },
        { id: 'workspaceFrameSlot', path: '/ui/partials/workspace-frame.html' },
        { id: 'workspaceSidebarSlot', path: '/ui/partials/workspace-sidebar.html' },
        { id: 'workspaceViewToolsSlot', path: '/ui/partials/workspace-view-tools.html' },
        { id: 'controlRailIntroSlot', path: '/ui/partials/control-rail-intro.html' },
        { id: 'settingsPanelSlot', path: '/ui/partials/settings-panel.html' },
        { id: 'runtimeWorkbenchSlot', path: '/ui/partials/runtime-workbench.html' },
        { id: 'workspaceIntelligenceSlot', path: '/ui/partials/workspace-intelligence.html' },
        { id: 'autonomousLaneSlot', path: '/ui/partials/autonomous-lane.html' },
        { id: 'sourceContinuitySlot', path: '/ui/partials/source-continuity.html' },
        { id: 'gitWorkspaceSlot', path: '/ui/partials/git-workspace.html' },
        { id: 'releaseConnectorsSlot', path: '/ui/partials/release-connectors.html' },
      ];
      for (const slot of slots) {
        const host = $(slot.id);
        if (!host) continue;
        const response = await fetch(slot.path, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed loading UI partial ${slot.path} (${response.status}).`);
        }
        host.innerHTML = await response.text();
      }
    }

    async function loadRuntimeLaneStatus(options = {}) {
      try {
        const payload = await runtimeRequest('/api/runtime/list?ws_id=' + encodeURIComponent(state.workspaceId), 'GET');
        applyRuntimeLaneState(payload, 'local-package-server');
        state.runtime.runtimes = Array.isArray(payload?.runtimes) ? payload.runtimes : [];
        applyPersistedRuntimeState(payload?.workspace_runtime);
        if (!state.runtime.selectedId && state.runtime.runtimes[0]?.id) state.runtime.selectedId = state.runtime.runtimes[0].id;
        populateRuntimeForm();
      } catch (error) {
        state.runtime.laneAvailable = false;
        state.runtime.laneMode = 'unavailable';
        state.runtime.controlOrigin = '';
        state.runtime.runtimes = [];
        state.runtime.recoveryConfig = null;
        state.runtime.workspaceEnvironment = null;
        state.runtime.recommendedPorts = [];
        state.runtime.lastRuntime = null;
        state.runtime.persistedLogs = null;
        if (!options.silent) throw error;
      }
      renderRuntimeStatus();
    }

    async function materializeRuntimeWorkspace() {
      const payload = await runtimeRequest('/api/runtime/materialize', 'POST', { ws_id: state.workspaceId, workspace_name: state.workspaceName, files: cloneFiles(state.files) });
      applyRuntimeLaneState(payload, 'local-package-server');
      applyPersistedRuntimeState(payload?.workspace_runtime || payload);
      renderRuntimeStatus();
      setStatus('Runtime workspace materialized', 'Saved workspace snapshot was written to ' + payload.workspace_path + ' for local runtime execution.', 'success');
      return payload;
    }

    async function startWorkspaceRuntime() {
      populateRuntimeForm();
      const payload = await runtimeRequest('/api/runtime/start', 'POST', {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        files: cloneFiles(state.files),
        command: $('runtimeCommandInput').value.trim(),
        args: splitArgsText($('runtimeArgsInput').value),
        cwd: $('runtimeCwdInput').value.trim() || '.',
        port: Number($('runtimePortInput').value || 0) || undefined,
        launch_url: $('runtimeLaunchUrlInput').value.trim() || undefined,
        runtime_mode: $('runtimeModeSelect').value || 'host-process',
        container_image: $('runtimeContainerImageInput').value.trim() || undefined,

    async function loadSelectedRuntimeLogs() {

    async function probeSelectedRuntime() {

    function updateHeader() {
      $("workspaceChip").textContent = "workspace: " + state.workspaceId;
      $("revisionChip").textContent = "revision: " + (state.revision || "none");
      updateAccessChip();
      const skyedrive = state.integrationStatus.skyedrive || {};

        ? "source: SkyeDrive · " + (skyedrive.title || skyedrive.record_id || "connected")
        : "source: workspace only";

      $("dirtyPill").textContent = state.dirty ? "unsaved" : "clean";

      $("saveStateBody").textContent = state.dirty
        ? "Save before push or deploy so release actions run against the latest snapshot."
        : "Current files are aligned with the latest saved workspace revision.";
      renderSnapshotDiff();
      renderWorkspaceIntelligence();
      renderWorkbenchDeck();
      renderSknoreReleasePreview();

    function renderFiles() {
      const q = state.filter.trim().toLowerCase();
      const box = $("fileList");
      box.innerHTML = "";
      state.files
        .slice()
        .sort((a, b) => a.path.localeCompare(b.path))
        .filter((file) => !q || file.path.toLowerCase().includes(q))
        .forEach((file) => {
          const button = document.createElement("button");
          const status = fileStatus(file.path);
          button.type = "button";
          button.className = "file-item" + (file.path === state.activePath ? " active" : "");
          button.innerHTML = "<div class='file-path'>" + escapeHtml(file.path) + "</div><div class='file-meta'>" + fileLanguage(file.path) + " file</div>" + (status === "clean" ? "" : "<div class='file-status-row'><span class='file-badge " + status + "'>" + status + "</span></div>");
          button.addEventListener("click", () => openFile(file.path));
          box.appendChild(button);
        });
      if (!box.children.length) {
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "No files match the current filter.";
        box.appendChild(empty);
      }
      updateHeader();
    }

    function renderSnapshotDiff() {
      const sourceAware = Boolean(state.integrationStatus.skyedrive?.connected && state.sourceBaselineFiles.length);
      const diff = computeSnapshotDiff(activeSourceBaselineFiles());
      const list = $("snapshotDiffList");
      $("snapshotDiffTitle").textContent = sourceAware ? "SkyeDrive source diff" : (state.integrationStatus.skyedrive?.connected ? "SkyeDrive diff" : "Workspace diff");
      $("snapshotDiffBody").textContent = `changed=${diff.changed.length} · untracked=${diff.untracked.length} · deleted=${diff.deleted.length} · +${diff.addedLines} / -${diff.removedLines} lines · touched=${diff.touchedLines}`;
      list.innerHTML = "";
      const rows = [
        ...diff.changed.slice(0, 4).map((path) => ({ label: "changed", path })),
        ...diff.untracked.slice(0, 4).map((path) => ({ label: "untracked", path })),
        ...diff.deleted.slice(0, 4).map((path) => ({ label: "deleted", path })),
      ];
      if (!rows.length) {
        list.innerHTML = "<div class='diff-summary-item'>No snapshot drift detected.</div>";
        return;
      }
      rows.forEach((row) => {
        const item = document.createElement("div");
        item.className = "diff-summary-item";
        item.textContent = `${row.label}: ${row.path}`;
        list.appendChild(item);
      });
    }

    function renderRestorePoints() {
      const statusBox = $("restorePointStatus");
      const list = $("restorePointList");
      const records = (Array.isArray(state.skyedriveSources) ? state.skyedriveSources : []).filter((record) => {
        const kind = String(record?.source_kind || "workspace-save").trim();
        return kind === "restore-point" || kind === "workspace-save" || kind === "zip-import" || kind === "folder-import";
      }).slice(0, 6);
      list.innerHTML = "";
      if (!records.length) {
        statusBox.innerHTML = "<strong>Restore points</strong><div class='muted'>No restore-capable snapshots exist yet. Create one after your next save.</div>";
        list.innerHTML = "<div class='diff-summary-item'>No restore points yet.</div>";
        return;
      }
      statusBox.innerHTML = "<strong>Restore points</strong><div class='muted'>" + records.length + " recent source snapshots are ready for compare or restore.</div>";
      records.forEach((record) => {
        const row = document.createElement("div");
        row.className = "diff-summary-item";
        row.innerHTML = "<strong>" + escapeHtml(record.title || "workspace-source") + "</strong> · "
          + escapeHtml(String(record.source_kind || "workspace-save"))
          + " · " + escapeHtml(String(record.file_count || 0)) + " files"
          + (record.note ? " · " + escapeHtml(record.note) : "")
          + " <button class='ghost' type='button' data-record-id='" + escapeHtml(String(record.id || "")) + "'>Restore</button>";
        const button = row.querySelector("button");
        if (button) button.addEventListener("click", () => runAction(() => openSkyeDriveSource(record.id)));
        list.appendChild(row);

    function summarizeSknoreResult(sknore, fallbackIncluded) {
      const included = Number(sknore?.included_count ?? fallbackIncluded ?? 0);
      const blocked = Number(sknore?.blocked_count ?? 0);
      const patterns = Number(sknore?.patterns_count ?? state.sknore?.patternsCount ?? 0);
      if (!patterns) return `No SKNore policy was active. ${included} file${included === 1 ? "" : "s"} stayed eligible for release.`;
      return `SKNore included ${included} file${included === 1 ? "" : "s"} and blocked ${blocked} protected path${blocked === 1 ? "" : "s"}.`;
    }

    function rememberReleaseResult(channel, payload, fallbackIncluded) {
      state.sknore.lastRelease = {
        channel,
        status: payload?.deferred ? "deferred" : "completed",
        includedCount: Number(payload?.sknore?.included_count ?? fallbackIncluded ?? 0),
        blockedCount: Number(payload?.sknore?.blocked_count ?? 0),
        blockedPaths: Array.isArray(payload?.sknore?.blocked_paths) ? payload.sknore.blocked_paths : [],
        patternsCount: Number(payload?.sknore?.patterns_count ?? state.sknore?.patternsCount ?? 0),
      };
      renderSknoreReleasePreview();
    }

    function normalizeReleaseRecord(record) {
      if (!record || typeof record !== "object") return null;
      return {
        id: String(record.id || "").trim(),
        status: String(record.status || (record.deferred ? "deferred" : "completed")).trim() || "completed",
        channel: String(record.channel || "Release").trim() || "Release",
        ws_id: String(record.ws_id || state.workspaceId).trim() || state.workspaceId,
        created_at: record.created_at || null,
        updated_at: record.updated_at || record.created_at || null,
        actor: String(record.actor || "").trim(),
        source: String(record.source || "server-storage").trim() || "server-storage",
        repo: String(record.repo || "").trim(),
        branch: String(record.branch || "").trim(),
        commit_sha: String(record.commit_sha || "").trim(),
        site_id: String(record.site_id || "").trim(),
        site_name: String(record.site_name || "").trim(),
        deploy_id: String(record.deploy_id || "").trim(),
        url: String(record.url || "").trim(),
        included_count: Number(record.included_count || 0),
        blocked_count: Number(record.blocked_count || 0),
        message: String(record.message || "").trim(),
        title: String(record.title || "").trim(),
        reason_code: String(record.reason_code || "").trim(),
        reason: String(record.reason || "").trim(),
        deferred: Boolean(record.deferred || record.status === "deferred"),
      };
    }

    function renderReleaseOps() {
      const statusBox = $("releaseOpsStatus");
      const list = $("releaseOpsList");
      if (!statusBox || !list) return;
      const deferred = Array.isArray(state.releaseOps?.deferred) ? state.releaseOps.deferred : [];
      const history = Array.isArray(state.releaseOps?.history) ? state.releaseOps.history : [];
      const latest = deferred[0] || history[0] || null;
      if (!deferred.length && !history.length) {
        statusBox.innerHTML = "<strong>Release operations</strong><div class='muted'>No deferred publish work or recent release history has been recorded for this workspace yet.</div>";
        list.innerHTML = "<div class='diff-summary-item'>No release queue entries yet.</div>";
        return;
      }
      const storageBackend = String(state.integrationStatus?.storage_backend || "file").trim() || "file";
      statusBox.innerHTML = "<strong>Release operations</strong><div class='muted'>Deferred queue <code>" + deferred.length + "</code> · recent completed releases <code>" + history.length + "</code> · storage backend <code>" + escapeHtml(storageBackend) + "</code>. Latest activity " + escapeHtml(latest?.created_at ? new Date(latest.created_at).toLocaleString() : "recently") + ".</div>";
      list.innerHTML = "";
      deferred.slice(0, 4).forEach((record) => {
        const item = document.createElement("div");
        item.className = "diff-summary-item";
        const target = record.channel === "GitHub"
          ? ((record.repo || "repo pending") + (record.branch ? " @ " + record.branch : ""))
          : (record.site_name || record.site_id || "site pending");
        const label = document.createElement("div");
        label.textContent = "deferred · " + record.channel + " · " + target + " · " + (record.reason || "adapter unavailable") + " · included=" + record.included_count;
        item.appendChild(label);
        const actions = document.createElement("div");
        actions.className = "subheader-actions";
        const replayButton = document.createElement("button");
        replayButton.className = "mini";
        replayButton.type = "button";
        replayButton.textContent = "Replay";
        replayButton.addEventListener("click", () => runAction(() => replayDeferredRelease(record)));
        actions.appendChild(replayButton);
        item.appendChild(actions);
        list.appendChild(item);
      });
      history.slice(0, 4).forEach((record) => {
        const item = document.createElement("div");
        item.className = "diff-summary-item";
        const detail = record.channel === "GitHub"
          ? (record.commit_sha || "commit created")
          : (record.deploy_id || record.url || "deploy created");
        const label = document.createElement("div");
        label.textContent = "completed · " + record.channel + " · " + detail + " · included=" + record.included_count;
        item.appendChild(label);
        if (record.url) {
          const actions = document.createElement("div");
          actions.className = "subheader-actions";
          const openButton = document.createElement("button");
          openButton.className = "mini";
          openButton.type = "button";
          openButton.textContent = "Open";
          openButton.addEventListener("click", () => window.open(record.url, "_blank", "noopener,noreferrer"));
          actions.appendChild(openButton);
          item.appendChild(actions);

        list.appendChild(item);

    function normalizeAuditRecord(record) {

        workspace_id: String(record.workspace_id || state.workspaceId).trim() || state.workspaceId,
        workspace_name: String(record.workspace_name || "").trim(),
        domain: String(record.domain || "system").trim() || "system",
        action: String(record.action || "mutation").trim() || "mutation",
        route: String(record.route || "").trim(),
        outcome: String(record.outcome || "success").trim() || "success",
        actor: String(record.actor || "").trim(),
        operation_id: String(record.operation_id || "").trim(),
        duration_ms: Number(record.duration_ms || 0) || 0,
        status_code: Number(record.status_code || 0) || 0,
        summary: String(record.summary || "").trim(),

    function renderMutationAudit() {
      const statusBox = $("mutationAuditStatus");
      const list = $("mutationAuditList");
      if (!statusBox || !list) return;
      const records = Array.isArray(state.auditTrail) ? state.auditTrail : [];
      if (!records.length) {
        statusBox.innerHTML = "<strong>Mutation audit</strong><div class='muted'>No runtime, Git, or autonomy mutation records have been captured for this workspace yet.</div>";
        list.innerHTML = "<div class='diff-summary-item'>Run a runtime, Git, or autonomy mutation and then refresh this panel.</div>";
        return;
      }
      const latest = records[0];
      statusBox.innerHTML = "<strong>Mutation audit</strong><div class='muted'>Recorded <code>" + records.length + "</code> recent mutation event" + (records.length === 1 ? "" : "s") + ". Latest: <code>" + escapeHtml(latest.domain + "/" + latest.action) + "</code> · <code>" + escapeHtml(latest.outcome) + "</code> · " + escapeHtml(latest.completed_at ? new Date(latest.completed_at).toLocaleString() : "recently") + ".</div>";
      list.innerHTML = "";
      records.slice(0, 10).forEach((record) => {
        const item = document.createElement("div");
        item.className = "diff-summary-item";
        const detail = document.createElement("div");
        detail.textContent = record.domain + " · " + record.action + " · " + record.outcome + " · " + (record.summary || "mutation recorded") + (record.duration_ms ? " · " + record.duration_ms + "ms" : "");
        item.appendChild(detail);
        const meta = document.createElement("div");
        meta.className = "muted";
        const metaParts = [];
        if (record.actor) metaParts.push("actor=" + record.actor);
        if (record.route) metaParts.push("route=" + record.route);
        if (record.operation_id) metaParts.push("op=" + record.operation_id);
        if (record.completed_at) metaParts.push("at=" + new Date(record.completed_at).toLocaleString());

    async function loadAuditTrail() {
      const payload = await jsonRequest("/api/audit/list?ws_id=" + encodeURIComponent(state.workspaceId) + "&limit=30", "GET");
      state.auditTrail = Array.isArray(payload?.records) ? payload.records.map((record) => normalizeAuditRecord(record)).filter(Boolean) : [];
      renderMutationAudit();
      return state.auditTrail;
    }

    async function logAutonomyMutation(summary, details = {}) {
      const payload = await jsonRequest("/api/audit/log", "POST", {
        ws_id: state.workspaceId,
        workspace_name: state.workspaceName,
        domain: "autonomy",
        action: String(details.action || "apply").trim() || "apply",
        outcome: String(details.outcome || "success").trim() || "success",
        summary,
        duration_ms: Number(details.duration_ms || 0) || 0,
        details,
      });
      const record = normalizeAuditRecord(payload?.record);
      if (record) {
        state.auditTrail = [record, ...(Array.isArray(state.auditTrail) ? state.auditTrail.filter((entry) => entry.id !== record.id) : [])].slice(0, 30);
        renderMutationAudit();
      }
      return record;
    }

    async function replayDeferredRelease(record) {
      if (!record || !record.channel) throw new Error("Choose a deferred release record first.");
      if (record.source === "local-fallback") {
        if (record.channel === "GitHub") {
          await pushGithub();
          return;
        }
        if (record.channel === "Netlify") {
          await deployNetlify();
          return;
        }
        throw new Error("Local replay is not supported for this release channel.");
      }

      const payload = await jsonRequest("/api/release-replay", "POST", {
        ws_id: state.workspaceId,
        release_id: record.id,
      });
      rememberReleaseResult(record.channel, payload, payload?.included_count);
      await loadIntegrationStatus();
      if (payload?.deferred) {
        setStatus(record.channel + " replay deferred", (payload?.warning || payload?.release?.reason || "Deferred release is still waiting on its external adapter.") + " " + summarizeSknoreResult(payload?.sknore, payload?.included_count), "warning");
        return;
      }
      if (record.channel === "GitHub") {
        setStatus("GitHub replay complete", "Commit " + (payload.commit_sha || "created") + " was pushed from the deferred queue. " + summarizeSknoreResult(payload?.sknore, payload?.included_count), "success");
        return;
      }
      setStatus("Netlify replay complete", "Deploy " + (payload.deploy_id || "created") + (payload.url ? " · " + payload.url : "") + " was replayed from the deferred queue. " + summarizeSknoreResult(payload?.sknore, payload?.included_count), "success");
    }

    async function replayLatestDeferredRelease() {
      const record = Array.isArray(state.releaseOps?.deferred) ? state.releaseOps.deferred[0] : null;
      if (!record) throw new Error("No deferred release work is queued for this workspace.");
      await replayDeferredRelease(record);
    }

    function renderSknoreReleasePreview() {
      const statusBox = $("sknoreReleaseStatus");
      const list = $("sknoreReleaseList");
      if (!statusBox || !list) return;
      const scope = state.sknore?.scope === "org" ? "org-wide" : "workspace";
      const updatedText = state.sknore?.updatedAt ? new Date(state.sknore.updatedAt).toLocaleString() : "not saved yet";
      const lastRelease = state.sknore?.lastRelease;
      const blockedPaths = Array.isArray(state.sknore?.blockedPaths) ? state.sknore.blockedPaths : [];
      const includedCount = Number(state.sknore?.includedCount ?? 0);
      const blockedCount = Number(state.sknore?.blockedCount ?? 0);
      const patternsCount = Number(state.sknore?.patternsCount ?? 0);
      const pending = Boolean(state.sknore?.pending);
      const source = state.sknore?.source === "client-files" ? "current editor state" : "saved workspace snapshot";

      statusBox.innerHTML = patternsCount
        ? "<strong>SKNore policy</strong><div class='muted'>" + includedCount + " release-ready files and " + blockedCount + " blocked paths under the " + escapeHtml(scope) + " policy. Preview source: " + escapeHtml(source) + ". Updated " + escapeHtml(updatedText) + ".</div>"
        : "<strong>SKNore policy</strong><div class='muted'>No SKNore patterns are active for this workspace yet. Every current file is eligible for SkyeDrive, GitHub, and Netlify release actions.</div>";

      list.innerHTML = "";
      if (pending) {
        const pendingItem = document.createElement("div");
        pendingItem.className = "diff-summary-item";
        pendingItem.textContent = "Refreshing authoritative SKNore preview on the server.";
        list.appendChild(pendingItem);
      }
      if (lastRelease) {
        const row = document.createElement("div");
        row.className = "diff-summary-item";
        row.textContent = `${lastRelease.channel} ${lastRelease.status === "deferred" ? "deferred" : "completed"}: included=${lastRelease.includedCount} · blocked=${lastRelease.blockedCount}`;
        list.appendChild(row);
      }
      if (blockedPaths.length) {
        blockedPaths.slice(0, 6).forEach((path) => {
          const item = document.createElement("div");
          item.className = "diff-summary-item";
          item.textContent = `blocked: ${path}`;
          list.appendChild(item);
        });
        if (blockedPaths.length > 6) {
          const more = document.createElement("div");
          more.className = "diff-summary-item";
          more.textContent = `and ${blockedPaths.length - 6} more protected path(s)`;
          list.appendChild(more);
        }
        return;
      }
      if (patternsCount) {
        const clear = document.createElement("div");
        clear.className = "diff-summary-item";
        clear.textContent = "Current snapshot is clear to release under the active SKNore policy.";
        list.appendChild(clear);
        return;
      }
      const tip = document.createElement("div");
      tip.className = "diff-summary-item";
      tip.textContent = "Tip: open SKNore to add .env, secrets, or evidence paths before pushing from SkyDexia 2.6.";
      list.appendChild(tip);
    }

    async function refreshSknoreReleasePreview(filesOverride) {
      const requestId = ++sknorePreviewRequestId;
      const files = cloneFiles(Array.isArray(filesOverride) ? filesOverride : state.files);
      state.sknore.pending = true;
      renderSknoreReleasePreview();
      try {
        const payload = await jsonRequest("/api/sknore-release-preview", "POST", {
          ws_id: state.workspaceId,
          files,
        });
        if (requestId !== sknorePreviewRequestId) return;
        state.sknore.scope = String(payload?.scope || "workspace");
        state.sknore.updatedAt = payload?.updated_at || null;
        state.sknore.source = String(payload?.source || "workspace");
        state.sknore.totalCount = Number(payload?.sknore?.total_count ?? files.length);
        state.sknore.includedCount = Number(payload?.sknore?.included_count ?? files.length);
        state.sknore.blockedCount = Number(payload?.sknore?.blocked_count ?? 0);
        state.sknore.blockedPaths = Array.isArray(payload?.sknore?.blocked_paths) ? payload.sknore.blocked_paths : [];
        state.sknore.patternsCount = Number(payload?.sknore?.patterns_count ?? 0);
      } finally {
        if (requestId === sknorePreviewRequestId) {
          state.sknore.pending = false;
          renderSknoreReleasePreview();
        }
      }
    }

    function scheduleSknorePreview(filesOverride) {
      if (sknorePreviewTimer) window.clearTimeout(sknorePreviewTimer);
      const snapshot = cloneFiles(Array.isArray(filesOverride) ? filesOverride : state.files);
      sknorePreviewTimer = window.setTimeout(() => {
        sknorePreviewTimer = null;
        runAction(() => refreshSknoreReleasePreview(snapshot));
      }, 320);
    }
